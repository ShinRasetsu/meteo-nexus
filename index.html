<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeteoNexus | Active Telemetry HUD</title>
    
    <link rel="manifest" id="manifest-placeholder">
    <meta name="theme-color" content="#000000">
    
    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
    
    <!-- Mapping Dependencies (Leaflet & Routing Machine) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <!-- Tailwind CSS Config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        brand: { teal: '#14b8a6', blue: '#3b82f6', purple: '#a855f7', orange: '#f59e0b', red: '#ef4444', success: '#22c55e', warning: '#eab308' },
                        surface: { 900: '#111111', 800: '#1a1a1a', 700: '#2a2a2a' }
                    }
                }
            }
        }
    </script>

    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; background-color: #000000; }
        
        /* High contrast focus rings for glove operation */
        input:focus, button:focus { outline: none; box-shadow: 0 0 0 4px #14b8a6; }
        
        /* Disable text selection on UI elements for touch interfaces */
        .no-select { user-select: none; -webkit-user-select: none; }
    </style>
</head>
<body class="text-gray-100 font-sans min-h-screen p-2 md:p-6 lg:p-8 selection:bg-brand-teal selection:text-black flex flex-col gap-4 max-w-7xl mx-auto no-select">

    <!-- Header -->
    <header class="flex justify-between items-center py-2 px-2 border-b-4 border-surface-800">
        <h1 class="text-2xl md:text-3xl font-black tracking-tight text-white flex items-center gap-3">
            <i class="fa-solid fa-satellite-dish text-brand-teal text-3xl"></i> 
            METEONEXUS <span class="font-bold text-gray-500 tracking-widest text-sm hidden sm:inline">HUD</span>
        </h1>
        
        <button id="audio-btn" onclick="toggleAudio()" class="flex items-center gap-3 px-6 py-3 rounded-xl border-4 border-surface-700 bg-surface-900 text-sm md:text-base font-bold tracking-widest transition-all">
            <i class="fa-solid fa-volume-xmark text-xl" id="audio-icon"></i> 
            <span id="audio-text" class="hidden sm:block">SONAR OFF</span>
        </button>
    </header>

    <!-- Top HUD Grid (Critical Glance Data) -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-4">
        
        <!-- Primary State Banner -->
        <div id="main-status-card" class="lg:col-span-5 rounded-2xl p-6 md:p-8 flex flex-col items-center justify-center text-center transition-colors duration-300 border-4 border-surface-800 bg-surface-900 min-h-[350px] relative overflow-hidden">
            
            <div class="absolute top-4 right-4 text-right">
                <div id="location-badge" class="text-sm font-bold text-gray-300 flex items-center gap-1.5 justify-end uppercase tracking-widest">
                    <i class="fa-solid fa-circle-notch fa-spin"></i> LOCATING
                </div>
                <div class="text-sm font-mono font-bold text-gray-500 mt-1 flex items-center gap-1 justify-end">
                    <i class="fa-regular fa-clock text-brand-blue opacity-80"></i> 
                    <span id="local-time-text">--:--:--</span>
                </div>
            </div>

            <i id="status-icon" class="text-8xl md:text-9xl mb-4 fa-solid fa-circle-notch fa-spin text-gray-600"></i>
            <span id="status-text" class="text-4xl md:text-6xl font-black tracking-tight text-gray-600 uppercase">WAITING</span>
            <div id="weather-desc" class="mt-4 text-gray-300 font-mono text-sm md:text-lg font-bold bg-black/50 px-6 py-2 rounded-xl border-2 border-surface-700 uppercase">AWAITING TELEMETRY</div>
        </div>

        <!-- Vital Metrics Grid -->
        <div class="lg:col-span-7 grid grid-cols-2 md:grid-cols-3 gap-4">
            
            <!-- Temp -->
            <div class="bg-surface-900 border-4 border-surface-800 rounded-2xl p-4 flex flex-col justify-center items-center text-center relative">
                <span class="text-sm font-bold text-gray-500 uppercase tracking-widest block mb-1">Temp</span>
                <div id="metric-temp" class="font-mono text-5xl md:text-6xl font-black text-white">--</div>
                <div class="text-xs font-bold text-gray-500 mt-2 tracking-widest">FEELS <span id="metric-feels" class="text-gray-300">--</span></div>
            </div>

            <!-- Wind -->
            <div class="bg-surface-900 border-4 border-surface-800 rounded-2xl p-4 flex flex-col justify-center items-center text-center relative">
                <span class="text-sm font-bold text-gray-500 uppercase tracking-widest block mb-1">Wind (km/h)</span>
                <div id="metric-wind-speed" class="font-mono text-5xl md:text-6xl font-black text-white">--</div>
                <div id="metric-wind-dir" class="text-sm font-bold text-brand-blue mt-2 flex items-center gap-2 justify-center tracking-widest">--</div>
            </div>

            <!-- Consensus -->
            <div class="bg-brand-teal/10 border-4 border-brand-teal/30 rounded-2xl p-4 flex flex-col justify-center items-center text-center relative">
                <span class="text-sm font-bold text-brand-teal uppercase tracking-widest block mb-1">Model Sync</span>
                <div id="metric-agree" class="font-mono text-5xl md:text-6xl font-black text-brand-teal">--</div>
            </div>

            <!-- Humid -->
            <div class="bg-surface-900 border-4 border-surface-800 rounded-2xl p-4 flex flex-col justify-center items-center text-center relative">
                <span class="text-sm font-bold text-gray-500 uppercase tracking-widest block mb-1">Humidity</span>
                <div id="metric-hum" class="font-mono text-4xl md:text-5xl font-black text-white">--</div>
            </div>

            <!-- Max UV -->
            <div class="bg-surface-900 border-4 border-surface-800 rounded-2xl p-4 flex flex-col justify-center items-center text-center relative">
                <span class="text-sm font-bold text-gray-500 uppercase tracking-widest block mb-1">Max UV</span>
                <div id="metric-uv-val" class="font-mono text-4xl md:text-5xl font-black text-brand-purple">--</div>
                <div id="metric-uv-time" class="text-sm font-bold text-gray-500 mt-2 tracking-widest">--</div>
            </div>

            <!-- Health Checks -->
            <div class="bg-surface-900 border-4 border-surface-800 rounded-2xl p-4 flex flex-col justify-center">
                <span class="text-sm font-bold text-gray-500 uppercase tracking-widest block mb-3 text-center">Node Health</span>
                <div class="grid grid-cols-2 gap-2 text-center">
                    <div id="stat-eu" class="font-mono text-sm font-bold py-2 bg-surface-800 rounded-lg text-gray-600 border border-surface-700">EU</div>
                    <div id="stat-us" class="font-mono text-sm font-bold py-2 bg-surface-800 rounded-lg text-gray-600 border border-surface-700">US</div>
                    <div id="stat-de" class="font-mono text-sm font-bold py-2 bg-surface-800 rounded-lg text-gray-600 border border-surface-700">DE</div>
                    <div id="stat-jp" class="font-mono text-sm font-bold py-2 bg-surface-800 rounded-lg text-gray-600 border border-surface-700">JP</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Secondary Systems -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-4 mt-2">
        
        <!-- Chart Card (Fully Featured) -->
        <div class="lg:col-span-8 bg-surface-900 border-4 border-surface-800 rounded-2xl p-4 md:p-6 flex flex-col">
            <div class="mb-4 flex items-center justify-between">
                <span class="text-sm font-bold uppercase tracking-widest text-gray-500">Atmospheric Telemetry Plot</span>
            </div>
            <div class="flex-grow w-full relative h-[300px] md:h-[400px]">
                <canvas id="mainChart"></canvas>
            </div>
        </div>

        <!-- Geospatial Targeting (Fully Featured) -->
        <div class="lg:col-span-4 bg-surface-900 border-4 border-surface-800 rounded-2xl p-6 flex flex-col justify-between">
            <div>
                <h3 class="text-sm font-bold uppercase tracking-widest text-gray-500 mb-6 border-b-4 border-surface-800 pb-3">Geospatial Target</h3>
                
                <!-- Google Maps Import Module -->
                <div class="flex gap-4 mb-6">
                    <div class="relative w-full">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-map-location-dot text-brand-teal text-xl"></i>
                        </div>
                        <input type="text" id="gmaps-link" placeholder="PASTE GMAPS LINK..." autocomplete="off" 
                            class="w-full bg-surface-800 border-4 border-surface-700 text-white text-base font-bold rounded-xl pl-12 pr-4 py-4 focus:border-brand-teal transition-colors placeholder-gray-600 uppercase">
                    </div>
                    <!-- Lightning Button: Acts as Paste & Load -->
                    <button id="gmaps-btn" onclick="handlePasteAndLoad()" class="bg-surface-700 hover:bg-surface-600 border-4 border-surface-600 text-brand-teal font-bold py-4 px-6 rounded-xl text-lg uppercase tracking-widest transition-colors flex items-center justify-center">
                        <i class="fa-solid fa-bolt"></i>
                    </button>
                </div>

                <div class="flex flex-col gap-4 mb-6">
                    <!-- Country Search -->
                    <div id="country-wrapper" class="relative w-full">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-flag text-gray-500 text-xl"></i>
                        </div>
                        <input type="text" id="search-country" placeholder="COUNTRY" autocomplete="off" 
                            class="w-full bg-surface-800 border-4 border-surface-700 text-white text-lg font-bold rounded-xl pl-12 pr-4 py-4 focus:border-brand-teal transition-colors placeholder-gray-600 uppercase">
                        <div id="country-results" class="absolute top-full mt-2 left-0 right-0 bg-surface-800 border-4 border-brand-teal rounded-xl shadow-2xl z-50 max-h-60 overflow-y-auto hidden"></div>
                    </div>
                    
                    <!-- City Search -->
                    <div id="city-wrapper" class="relative w-full">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-magnifying-glass text-gray-500 text-xl"></i>
                        </div>
                        <input type="text" id="search-city" placeholder="LOCALITY / CITY" autocomplete="off" 
                            class="w-full bg-surface-800 border-4 border-surface-700 text-white text-lg font-bold rounded-xl pl-12 pr-4 py-4 focus:border-brand-teal transition-colors placeholder-gray-600 uppercase">
                        <div id="city-results" class="absolute top-full mt-2 left-0 right-0 bg-surface-800 border-4 border-brand-teal rounded-xl shadow-2xl z-50 max-h-60 overflow-y-auto hidden"></div>
                    </div>
                </div>

                <!-- Manual Lat/Lon -->
                <div class="flex gap-4 mb-6">
                    <input type="number" id="manual-lat" placeholder="LAT" step="any" class="w-full bg-surface-800 border-4 border-surface-700 text-white text-base font-mono font-bold rounded-xl px-4 py-4 focus:border-brand-teal text-center">
                    <input type="number" id="manual-lon" placeholder="LON" step="any" class="w-full bg-surface-800 border-4 border-surface-700 text-white text-base font-mono font-bold rounded-xl px-4 py-4 focus:border-brand-teal text-center">
                </div>
            </div>
            
            <div class="flex gap-4 mt-auto">
                <button onclick="setManualLocation()" class="flex-[2] bg-brand-teal hover:bg-teal-400 text-black font-black py-4 px-4 rounded-xl text-lg uppercase tracking-widest transition-colors">
                    Inject Coords
                </button>
                <button onclick="resetToAuto()" class="flex-1 bg-surface-700 hover:bg-surface-600 border-4 border-surface-600 text-white font-bold py-4 px-4 rounded-xl text-lg uppercase tracking-widest flex justify-center items-center gap-2 transition-colors">
                    <i class="fa-solid fa-location-crosshairs text-xl"></i> Auto
                </button>
            </div>
        </div>
    </div>

    <!-- Tactical Map & Routing Layer -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-4 mt-2 mb-8">
        <div class="lg:col-span-12 bg-surface-900 border-4 border-surface-800 rounded-2xl p-4 md:p-6 flex flex-col">
            <div class="mb-4 flex flex-col sm:flex-row sm:items-center justify-between gap-2">
                <span class="text-sm font-bold uppercase tracking-widest text-gray-500">Tactical Routing Interface</span>
                <span id="route-status" class="text-sm font-bold text-gray-600 uppercase tracking-widest bg-surface-800 px-4 py-2 rounded-lg border-2 border-surface-700">STANDBY - AWAITING WAYPOINTS</span>
            </div>
            <!-- Z-index 0 prevents overlap with search dropdowns above -->
            <div id="hud-map" class="w-full relative h-[350px] md:h-[500px] rounded-xl border-4 border-surface-700 z-0 bg-[#111111]"></div>
        </div>
    </div>

    <script>
        // Configuration
        const CONFIG = {
            weatherApi: 'https://api.open-meteo.com/v1/forecast',
            geocoderApi: 'https://geocoding-api.open-meteo.com/v1/search',
            reverseGeoApi: 'https://api.bigdatacloud.net/data/reverse-geocode-client',
            sonarThreshold: 75
        };

        // Static Country List Restored
        const GLOBAL_COUNTRIES = [
            "Afghanistan", "Albania", "Algeria", "Argentina", "Armenia", "Australia", "Austria", "Azerbaijan",
            "Bahamas", "Bahrain", "Bangladesh", "Belarus", "Belgium", "Belize", "Bolivia", "Bosnia", "Botswana", "Brazil", "Bulgaria",
            "Cambodia", "Cameroon", "Canada", "Chile", "China", "Colombia", "Costa Rica", "Croatia", "Cuba", "Cyprus", "Czech Republic",
            "Denmark", "Dominican Republic", "Ecuador", "Egypt", "El Salvador", "Estonia", "Ethiopia",
            "Finland", "France", "Georgia", "Germany", "Ghana", "Greece", "Guatemala", "Honduras", "Hungary",
            "Iceland", "India", "Indonesia", "Iran", "Iraq", "Ireland", "Israel", "Italy", "Jamaica", "Japan", "Jordan",
            "Kazakhstan", "Kenya", "Kuwait", "Latvia", "Lebanon", "Lithuania", "Luxembourg",
            "Madagascar", "Malaysia", "Maldives", "Mexico", "Moldova", "Monaco", "Mongolia", "Morocco", "Myanmar",
            "Nepal", "Netherlands", "New Zealand", "Nicaragua", "Nigeria", "Norway", "Oman",
            "Pakistan", "Panama", "Paraguay", "Peru", "Philippines", "Poland", "Portugal", "Qatar",
            "Romania", "Russia", "Saudi Arabia", "Senegal", "Serbia", "Singapore", "Slovakia", "Slovenia", "South Africa", "South Korea", "Spain", "Sri Lanka", "Sweden", "Switzerland", "Syria",
            "Taiwan", "Tanzania", "Thailand", "Tunisia", "Turkey", "Ukraine", "United Arab Emirates", "United Kingdom", "United States", "Uruguay", "Uzbekistan",
            "Venezuela", "Vietnam", "Yemen", "Zambia", "Zimbabwe"
        ];

        // Original WMO Mappings
        const WMO_CODES = {
            0: 'Clear Sky', 1: 'Mainly Clear', 2: 'Partly Cloudy', 3: 'Overcast',
            45: 'Fog', 48: 'Depositing Rime Fog', 51: 'Light Drizzle', 53: 'Moderate Drizzle', 55: 'Dense Drizzle',
            56: 'Light Freezing Drizzle', 57: 'Dense Freezing Drizzle',
            61: 'Slight Rain', 63: 'Moderate Rain', 65: 'Heavy Rain',
            66: 'Light Freezing Rain', 67: 'Heavy Freezing Rain',
            71: 'Slight Snow Fall', 73: 'Moderate Snow Fall', 75: 'Heavy Snow Fall', 77: 'Snow Grains',
            80: 'Slight Rain Showers', 81: 'Moderate Rain Showers', 82: 'Violent Rain Showers',
            85: 'Slight Snow Showers', 86: 'Heavy Snow Showers',
            95: 'Thunderstorm', 96: 'Thunderstorm + Hail', 99: 'Heavy Thunderstorm + Hail'
        };

        const WMO_ICONS = {
            0: 'fa-sun', 1: 'fa-sun', 2: 'fa-cloud-sun', 3: 'fa-cloud',
            45: 'fa-smog', 48: 'fa-smog', 51: 'fa-cloud-rain', 53: 'fa-cloud-rain', 55: 'fa-cloud-showers-heavy',
            56: 'fa-cloud-meatball', 57: 'fa-cloud-meatball',
            61: 'fa-cloud-rain', 63: 'fa-cloud-showers-heavy', 65: 'fa-cloud-showers-water',
            66: 'fa-cloud-meatball', 67: 'fa-cloud-meatball',
            71: 'fa-snowflake', 73: 'fa-snowflake', 75: 'fa-snowflake', 77: 'fa-snowflake',
            80: 'fa-cloud-rain', 81: 'fa-cloud-showers-heavy', 82: 'fa-cloud-showers-water',
            85: 'fa-snowflake', 86: 'fa-snowflake',
            95: 'fa-cloud-bolt', 96: 'fa-cloud-bolt', 99: 'fa-cloud-bolt'
        };

        function getWindDirection(deg) {
            const val = Math.floor((deg / 22.5) + 0.5);
            const arr = ["N", "NNE", "NE", "ENE", "E", "ESE", "SE", "SSE", "S", "SSW", "SW", "WSW", "W", "WNW", "NW", "NNW"];
            return arr[(val % 16)];
        }

        let state = {
            mode: localStorage.getItem('ms_mode') || 'auto',
            coords: JSON.parse(localStorage.getItem('ms_coords')) || { lat: null, lon: null },
            autoCoords: null,
            targetTimezone: null, 
            chart: null,
            audioEnabled: false,
            lastPing: 0,
            mapObj: null,
            routeCtrl: null
        };

        // --- ENHANCED: Paste and Load Engine ---
        async function handlePasteAndLoad() {
            const input = document.getElementById('gmaps-link');
            
            try {
                // Read system clipboard. Browser will ask for permission the first time.
                const clipText = await navigator.clipboard.readText();
                if (clipText && (clipText.includes('http') || clipText.includes('maps'))) {
                    input.value = clipText;
                }
            } catch (err) {
                console.warn("Clipboard access denied or unavailable. Using manual input.");
            }

            if (input.value.trim() !== '') {
                await processGMapLink();
            } else {
                input.placeholder = "PASTE LINK HERE FIRST";
            }
        }

        // --- ENHANCED: Google Maps Link Parser & Extractor ---
        async function processGMapLink() {
            const input = document.getElementById('gmaps-link');
            const btn = document.getElementById('gmaps-btn');
            const url = input.value.trim();
            
            if (!url) return;
            
            // UI Loading State
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin text-white"></i>';
            input.placeholder = "EXTRACTING TARGET...";
            
            try {
                // Route through open proxy to bypass CORS and capture raw redirect payload
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
                const response = await fetch(proxyUrl);
                const data = await response.json();
                
                // Dump entirely to a string for aggressive regex evaluation
                const payload = JSON.stringify(data);

                // Aggressive Regex Scanning: Targets standard coords, !3d/!4d query structures, and meta tags
                const coordMatch = payload.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/) 
                                || payload.match(/!3d(-?\d+\.\d+)!4d(-?\d+\.\d+)/)
                                || payload.match(/query=(-?\d+\.\d+),(-?\d+\.\d+)/) 
                                || payload.match(/ll=(-?\d+\.\d+),(-?\d+\.\d+)/)
                                || payload.match(/center=(-?\d+\.\d+)%2C(-?\d+\.\d+)/)
                                || payload.match(/destination=(-?\d+\.\d+),(-?\d+\.\d+)/);

                if (coordMatch) {
                    const lat = parseFloat(coordMatch[1]);
                    const lon = parseFloat(coordMatch[2]);
                    
                    input.value = "";
                    input.placeholder = `TARGET ACQUIRED: ${lat.toFixed(4)}, ${lon.toFixed(4)}`;
                    applyNewLocation(lat, lon, "GMAPS TACTICAL TARGET", "IMPORTED");
                } else {
                    input.value = "";
                    input.placeholder = "ERR: NO COORDS IN PAYLOAD";
                }
            } catch(e) {
                input.value = "";
                input.placeholder = "ERR: EXTRACTION FAILED";
                console.error("GMap Parser Error:", e);
            } finally {
                // STRICT FIX: Always reset the button back to the lightning bolt icon
                btn.innerHTML = '<i class="fa-solid fa-bolt"></i>';
            }
        }

        // Tactical Map Engine
        function initMap(lat = 0, lon = 0) {
            if(state.mapObj) return;
            state.mapObj = L.map('hud-map', {zoomControl: false}).setView([lat, lon], 12);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '© OSM',
                subdomains: 'abcd',
                maxZoom: 19
            }).addTo(state.mapObj);
        }

        function calculateRoute(destLat, destLon) {
            const statusEl = document.getElementById('route-status');
            
            if(!state.autoCoords) {
                statusEl.innerText = "NO GPS ORIGIN FOR ROUTING";
                statusEl.className = "text-sm font-bold text-brand-red uppercase tracking-widest bg-brand-red/10 px-4 py-2 rounded-lg border-2 border-brand-red/30";
                return;
            }

            if(!state.mapObj) initMap(state.autoCoords.lat, state.autoCoords.lon);

            if(state.routeCtrl) {
                state.mapObj.removeControl(state.routeCtrl);
            }

            statusEl.innerText = "CALCULATING TACTICAL ROUTE...";
            statusEl.className = "text-sm font-bold text-brand-warning uppercase tracking-widest bg-brand-warning/10 px-4 py-2 rounded-lg border-2 border-brand-warning/30";

            state.routeCtrl = L.Routing.control({
                waypoints: [
                    L.latLng(state.autoCoords.lat, state.autoCoords.lon),
                    L.latLng(destLat, destLon)
                ],
                router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1' }),
                lineOptions: { styles: [{ color: '#14b8a6', weight: 6, opacity: 0.9 }] },
                show: false, // Suppress default text instructions to maintain HUD UI
                addWaypoints: false,
                fitSelectedRoutes: true,
                createMarker: function(i, wp) {
                    const color = i === 0 ? 'bg-brand-blue' : 'bg-brand-red';
                    return L.marker(wp.latLng, {
                        icon: L.divIcon({
                            className: `${color} border-2 border-white rounded-full w-4 h-4 shadow-[0_0_10px_rgba(255,255,255,0.5)]`,
                            iconSize: [16, 16]
                        })
                    });
                }
            }).addTo(state.mapObj);

            state.routeCtrl.on('routesfound', function(e) {
                const summary = e.routes[0].summary;
                const distKm = (summary.totalDistance / 1000).toFixed(1);
                const timeMin = Math.round((summary.totalTime % 3600) / 60);
                const timeHr = Math.floor(summary.totalTime / 3600);
                let timeStr = timeHr > 0 ? `${timeHr}H ${timeMin}M` : `${timeMin}M`;

                statusEl.innerText = `DIST: ${distKm} KM | ETA: ${timeStr}`;
                statusEl.className = "text-sm font-bold text-brand-success uppercase tracking-widest bg-brand-success/10 px-4 py-2 rounded-lg border-2 border-brand-success/30";
            });
            
            state.routeCtrl.on('routingerror', function() {
                statusEl.innerText = "ROUTING SERVER UNAVAILABLE";
                statusEl.className = "text-sm font-bold text-brand-red uppercase tracking-widest bg-brand-red/10 px-4 py-2 rounded-lg border-2 border-brand-red/30";
            });
        }

        // Live Clock Sync
        function runLiveClock() {
            if (!state.targetTimezone) return;
            try {
                const timeString = new Date().toLocaleTimeString('en-US', {
                    timeZone: state.targetTimezone,
                    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
                });
                document.getElementById('local-time-text').innerText = timeString;
            } catch(e) {
                document.getElementById('local-time-text').innerText = "SYNC ERR";
            }
        }
        setInterval(runLiveClock, 1000);

        // Geospatial Targeting UI Logic
        const searchCountry = document.getElementById('search-country');
        const countryResults = document.getElementById('country-results');

        searchCountry.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            if (query.length < 1) { countryResults.classList.add('hidden'); return; }
            
            const filtered = GLOBAL_COUNTRIES.filter(c => c.toLowerCase().includes(query)).slice(0, 6);
            if (filtered.length > 0) {
                countryResults.innerHTML = filtered.map(c => 
                    `<div class="px-6 py-4 cursor-pointer border-b-2 border-surface-700 text-base font-bold text-gray-300 hover:bg-brand-teal hover:text-black transition-colors uppercase tracking-widest" onclick="selectCountry('${c}')">
                        <i class="fa-solid fa-flag mr-3"></i> ${c}
                    </div>`
                ).join('');
                countryResults.classList.remove('hidden');
            } else {
                countryResults.classList.add('hidden');
            }
        });

        function selectCountry(country) {
            searchCountry.value = country;
            countryResults.classList.add('hidden');
            document.getElementById('search-city').focus();
            triggerCitySearch(); 
        }

        const searchCity = document.getElementById('search-city');
        const cityResults = document.getElementById('city-results');
        let searchTimeout;

        searchCity.addEventListener('input', triggerCitySearch);

        function triggerCitySearch() {
            clearTimeout(searchTimeout);
            const cityQuery = searchCity.value.trim();
            const countryContext = searchCountry.value.trim();
            if (cityQuery.length < 3) { cityResults.classList.add('hidden'); return; }
            searchTimeout = setTimeout(() => execSearch(cityQuery, countryContext), 500);
        }

        async function execSearch(cityQuery, countryContext) {
            try {
                const res = await fetch(`${CONFIG.geocoderApi}?name=${encodeURIComponent(cityQuery)}&count=50&language=en&format=json`);
                const data = await res.json();

                if (data.results && data.results.length > 0) {
                    let results = data.results;
                    if (countryContext.length > 0) {
                        const targetCountry = countryContext.toLowerCase();
                        results = results.filter(r => r.country && r.country.toLowerCase().includes(targetCountry));
                    }
                    results = results.slice(0, 8); 

                    if (results.length > 0) {
                        cityResults.innerHTML = results.map(res => {
                            const locName = [res.name, res.admin1, res.country].filter(Boolean).join(', ');
                            return `<div class="px-6 py-4 cursor-pointer border-b-2 border-surface-700 text-base font-bold text-gray-300 hover:bg-brand-teal hover:text-black transition-colors uppercase tracking-widest" onclick="applyNewLocation(${res.latitude}, ${res.longitude}, '${res.name}', '${res.country}')">
                                        <i class="fa-solid fa-map-pin mr-3"></i> ${locName}
                                    </div>`;
                        }).join('');
                        cityResults.classList.remove('hidden');
                    } else {
                        cityResults.innerHTML = '<div class="px-6 py-4 text-brand-red text-base font-bold text-center uppercase tracking-widest">NO MATCHES FOUND</div>';
                        cityResults.classList.remove('hidden');
                    }
                } else {
                    cityResults.classList.add('hidden');
                }
            } catch (err) { console.error("Geospatial Engine error", err); }
        }

        function applyNewLocation(lat, lon, cityName, countryName) {
            state.mode = 'manual';
            state.coords = { lat, lon };
            localStorage.setItem('ms_mode', 'manual');
            localStorage.setItem('ms_coords', JSON.stringify(state.coords));
            searchCity.value = cityName;
            searchCountry.value = countryName || searchCountry.value; 
            cityResults.classList.add('hidden');
            fetchData(lat, lon, true); 
            calculateRoute(lat, lon);
        }

        document.addEventListener('click', (e) => {
            if (!e.target.closest('#country-wrapper')) countryResults.classList.add('hidden');
            if (!e.target.closest('#city-wrapper')) cityResults.classList.add('hidden');
        });

        // Audio Subsystem
        function playSonarPing() {
            if (!state.audioEnabled) return;
            if (Date.now() - state.lastPing < 60000) return; 
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.frequency.setValueAtTime(1200, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.2);
            gain.gain.setValueAtTime(0, ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
            osc.start();
            osc.stop(ctx.currentTime + 0.6);
            state.lastPing = Date.now();
        }

        function toggleAudio() {
            state.audioEnabled = !state.audioEnabled;
            const btn = document.getElementById('audio-btn');
            const icon = document.getElementById('audio-icon');
            const txt = document.getElementById('audio-text');
            
            if (state.audioEnabled) {
                btn.className = 'flex items-center gap-3 px-6 py-3 rounded-xl border-4 border-brand-red bg-brand-red/20 text-brand-red text-sm md:text-base font-bold tracking-widest transition-all';
                icon.className = 'fa-solid fa-volume-high fa-beat-fade text-xl';
                txt.innerText = "SONAR ACTIVE";
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                ctx.resume().then(() => playSonarPing());
            } else {
                btn.className = 'flex items-center gap-3 px-6 py-3 rounded-xl border-4 border-surface-700 bg-surface-900 text-gray-100 text-sm md:text-base font-bold tracking-widest transition-all';
                icon.className = 'fa-solid fa-volume-xmark text-xl';
                txt.innerText = "SONAR OFF";
            }
        }

        // PWA Manifest Injection
        const iconBase64 = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Cpath fill='%2314b8a6' d='M96 320c-53 0-96-43-96-96c0-42.5 27.2-78.5 64.5-90.8c-1-6.6-1.5-13.4-1.5-20.2C63 48.6 111.6 0 171.5 0c47.9 0 89.1 30.6 102.7 74.3c5.3-1.6 11-2.3 16.8-2.3c35.3 0 64 28.7 64 64c0 10.4-2.5 20.2-6.9 28.9c16.3 15.6 26.9 37.8 26.9 62.1c0 44-31.8 80.6-73.6 88.3L96 320z'/%3E%3C/svg%3E";
        const manifestBlob = new Blob([JSON.stringify({
            "name": "MeteoNexus HUD", "short_name": "Nexus", "start_url": window.location.href, "display": "standalone",
            "background_color": "#000000", "theme_color": "#000000",
            "icons": [{"src": iconBase64, "sizes": "512x512", "type": "image/svg+xml"}]
        })], {type: 'application/json'});
        document.getElementById('manifest-placeholder').href = URL.createObjectURL(manifestBlob);

        // Charting Engine
        function renderChart(labels, rainData, solarData, uvData, currentAgreement, hourlyAgreement) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (state.chart) state.chart.destroy();
            
            const tc = tailwind.config.theme.extend.colors;
            
            state.chart = new Chart(ctx, {
                data: {
                    labels: labels,
                    datasets: [
                        { type: 'bar', label: 'Solar (W/m²)', data: solarData, backgroundColor: tc.brand.orange + '40', borderColor: tc.brand.orange, borderWidth: 2, categoryPercentage: 0.6, barPercentage: 0.8, order: 3, yAxisID: 'y_solar', grouped: true },
                        { type: 'bar', label: 'UV Index', data: uvData, backgroundColor: tc.brand.purple + '40', borderColor: tc.brand.purple, borderWidth: 2, categoryPercentage: 0.6, barPercentage: 0.8, order: 2, yAxisID: 'y_uv', grouped: true },
                        { type: 'line', label: 'ECMWF', data: rainData.eu, borderColor: tc.brand.blue, backgroundColor: tc.brand.blue + '33', fill: true, borderWidth: 3, tension: 0.3, pointRadius: 0, order: 1, yAxisID: 'y_rain' },
                        { type: 'line', label: 'GFS', data: rainData.us, borderColor: tc.brand.teal, backgroundColor: tc.brand.teal + '33', fill: true, borderDash: [6,6], borderWidth: 3, tension: 0.3, pointRadius: 0, order: 1, yAxisID: 'y_rain' },
                        { type: 'line', label: 'ICON', data: rainData.de, borderColor: tc.brand.warning, borderWidth: 2, borderDash: [4,4], tension: 0.3, pointRadius: 0, order: 1, yAxisID: 'y_rain' },
                        { type: 'line', label: 'JMA', data: rainData.jp, borderColor: '#ec4899', borderWidth: 2, tension: 0.3, pointRadius: 0, order: 1, yAxisID: 'y_rain' }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: { 
                        legend: { display: true, labels: { color: '#9ca3af', font: {family: 'Inter', weight: 'bold', size: 12}, boxWidth: 16, usePointStyle: true }, position: 'bottom' },
                        tooltip: {
                            backgroundColor: '#000000',
                            titleColor: '#ffffff',
                            bodyColor: '#d1d5db',
                            borderColor: '#333333',
                            borderWidth: 2,
                            padding: 16,
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) { label += ': '; }
                                    if (context.parsed.y !== null) {
                                        label += context.parsed.y.toFixed(1);
                                        if (context.dataset.yAxisID === 'y_solar') label += ' W/m²';
                                        if (context.dataset.yAxisID === 'y_uv') label += ' Index';
                                        if (context.dataset.yAxisID === 'y_rain') label += ' mm';
                                    }
                                    return label;
                                },
                                footer: function(tooltipItems) {
                                    const index = tooltipItems[0].dataIndex;
                                    const ag = hourlyAgreement[index];
                                    const uv = uvData[index];
                                    const sol = solarData[index];
                                    return `\nRain Model Agreement: ${ag.toFixed(0)}%\nPeak UV: ${uv.toFixed(1)} | Solar: ${sol.toFixed(0)}W`;
                                }
                            },
                            titleFont: { family: 'JetBrains Mono', size: 14, weight: 'bold' },
                            bodyFont: { family: 'JetBrains Mono', size: 12 },
                            footerFont: { family: 'JetBrains Mono', size: 12, weight: 'bold' },
                            footerColor: tc.brand.teal
                        }
                    }, 
                    scales: {
                        x: { grid: { display: false }, ticks: { color: '#6b7280', maxTicksLimit: 12, font: {family: 'JetBrains Mono', size: 11, weight: 'bold'} } },
                        y_rain: { type: 'linear', display: true, position: 'left', title: { display: true, text: 'Precipitation (mm)', color: '#6b7280', font: {family:'Inter', size: 12, weight: 'bold'} }, grid: { color: '#2a2a2a' }, ticks: {color: '#9ca3af', font: {family: 'JetBrains Mono', size: 11, weight: 'bold'}}, suggestedMax: 2 },
                        y_solar: { type: 'linear', display: true, position: 'right', title: { display: true, text: 'Solar Irradiance', color: tc.brand.orange, font: {family:'Inter', size: 12, weight: 'bold'} }, grid: { drawOnChartArea: false }, ticks: {color: tc.brand.orange, font: {family: 'JetBrains Mono', size: 11, weight: 'bold'}}, suggestedMax: 1000 },
                        y_uv: { type: 'linear', display: false, min: 0, max: 15 }
                    }
                }
            });
        }

        // Detailed Health Status UI
        function updateHealthStatus(elementId, dataArray) {
            const el = document.getElementById(elementId);
            if (!dataArray || dataArray.length === 0 || dataArray.every(v => v === null)) {
                el.className = "font-mono text-sm font-bold py-2 bg-brand-red border-2 border-brand-red text-black rounded-lg uppercase tracking-widest";
                el.innerHTML = '<i class="fa-solid fa-triangle-exclamation mr-1"></i> ' + el.innerText.split(' ')[1];
                return false;
            } else {
                el.className = "font-mono text-sm font-bold py-2 bg-brand-success/20 border-2 border-brand-success/50 text-brand-success rounded-lg uppercase tracking-widest";
                return true;
            }
        }

        // Main Telemetry Fetch Engine
        async function fetchData(lat, lon, skipReverseGeo = false) {
            const badge = document.getElementById('location-badge');
            
            document.getElementById('manual-lat').value = lat.toFixed(5);
            document.getElementById('manual-lon').value = lon.toFixed(5);

            if (!skipReverseGeo) {
                fetch(`${CONFIG.reverseGeoApi}?latitude=${lat}&longitude=${lon}&localityLanguage=en`)
                    .then(r => r.json())
                    .then(d => {
                        const city = d.city || d.locality || d.principalSubdivision || 'Unknown';
                        let country = d.countryName || '';
                        country = country.replace(/\s*\(the\)\s*/gi, '');
                        badge.innerHTML = `<i class="fa-solid fa-location-dot"></i> ${city}`;
                        document.getElementById('search-city').value = city;
                        document.getElementById('search-country').value = country;
                    }).catch(() => {
                        badge.innerHTML = `<i class="fa-solid fa-location-dot"></i> ${lat.toFixed(2)}, ${lon.toFixed(2)}`;
                    });
            } else {
                const knownCity = document.getElementById('search-city').value;
                const knownCountry = document.getElementById('search-country').value;
                const display = [knownCity, knownCountry].filter(Boolean).join(', ');
                badge.innerHTML = `<i class="fa-solid fa-location-dot"></i> ${display}`;
            }

            const p1 = fetch(`${CONFIG.weatherApi}?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,is_day&timezone=auto`);
            const p2 = fetch(`${CONFIG.weatherApi}?latitude=${lat}&longitude=${lon}&hourly=precipitation&models=ecmwf_ifs025,gfs_seamless,icon_seamless,jma_seamless&forecast_days=2&timezone=auto`);
            const p3 = fetch(`${CONFIG.weatherApi}?latitude=${lat}&longitude=${lon}&hourly=shortwave_radiation,uv_index&forecast_days=2&timezone=auto`);

            try {
                const [resCurr, resFore, resSolar] = await Promise.all([p1, p2, p3]);
                const dCurr = await resCurr.json();
                const dFore = await resFore.json();
                const dSolar = await resSolar.json();

                if (dCurr.timezone) {
                    state.targetTimezone = dCurr.timezone;
                    runLiveClock(); 
                }

                const curr = dCurr.current;
                const h = dFore.hourly;
                const hSol = dSolar.hourly;
                
                const targetTimePrefix = curr.time.substring(0, 13);
                let nowIndex = h.time.findIndex(t => t.startsWith(targetTimePrefix));
                
                if (nowIndex === -1) {
                    try {
                        const localTargetTime = new Date(new Date().toLocaleString('en-US', { timeZone: state.targetTimezone }));
                        nowIndex = localTargetTime.getHours(); 
                    } catch(e) { nowIndex = new Date().getHours(); }
                }

                // Data Extraction
                const sliceWin = 24;
                const clean = (arr) => arr.map(v => v === null ? 0 : v);
                
                const rawEU = h.precipitation_ecmwf_ifs025; 
                const rawUS = h.precipitation_gfs_seamless;
                const rawDE = h.precipitation_icon_seamless;
                const rawJP = h.precipitation_jma_seamless;
                
                updateHealthStatus('stat-eu', rawEU);
                updateHealthStatus('stat-us', rawUS);
                updateHealthStatus('stat-de', rawDE);
                updateHealthStatus('stat-jp', rawJP);

                const rainData = {
                    eu: clean(rawEU.slice(nowIndex, nowIndex + sliceWin)),
                    us: clean(rawUS.slice(nowIndex, nowIndex + sliceWin)),
                    de: clean(rawDE.slice(nowIndex, nowIndex + sliceWin)),
                    jp: clean(rawJP.slice(nowIndex, nowIndex + sliceWin))
                };

                const uvData = hSol.uv_index.slice(nowIndex, nowIndex + sliceWin).map(v => v === null ? 0 : v);
                const solarData = clean(hSol.shortwave_radiation.slice(nowIndex, nowIndex + sliceWin));
                
                const times = h.time.slice(nowIndex, nowIndex + sliceWin).map(t => {
                    const timeStr = t.slice(11, 16);
                    if (timeStr === "00:00") return "00:00 (+1d)";
                    return timeStr;
                });

                // Telemetry Logic
                const hourlyAgreement = [];
                for (let i = 0; i < sliceWin; i++) {
                    let hVotes = 0;
                    if (rainData.eu[i] > 0.1) hVotes++;
                    if (rainData.us[i] > 0.1) hVotes++;
                    if (rainData.de[i] > 0.1) hVotes++;
                    if (rainData.jp[i] > 0.1) hVotes++;
                    hourlyAgreement.push((hVotes / 4) * 100);
                }

                const currentAgreement = hourlyAgreement[0] || 0;
                let currentVotes = (currentAgreement / 100) * 4;

                let incomingRain = false;
                for (let i = 1; i <= 3; i++) {
                    if (hourlyAgreement[i] >= 75) {
                        incomingRain = true; break;
                    }
                }

                const maxUV = Math.max(...uvData);
                const maxUVIndex = uvData.indexOf(maxUV);
                const maxUVTime = times[maxUVIndex].replace(" (+1d)", "");

                // DOM Mapping
                document.getElementById('metric-temp').innerText = Math.round(curr.temperature_2m) + '°';
                document.getElementById('metric-feels').innerText = Math.round(curr.apparent_temperature) + '°';
                document.getElementById('metric-hum').innerText = curr.relative_humidity_2m + '%';
                document.getElementById('metric-agree').innerText = `${currentAgreement.toFixed(0)}%`;
                
                document.getElementById('metric-wind-speed').innerText = Math.round(curr.wind_speed_10m);
                document.getElementById('metric-wind-dir').innerHTML = `${getWindDirection(curr.wind_direction_10m)} <i class="fa-solid fa-arrow-up" style="transform: rotate(${curr.wind_direction_10m}deg);"></i>`;
                
                document.getElementById('metric-uv-val').innerText = maxUV.toFixed(1);
                document.getElementById('metric-uv-time').innerText = "@ " + maxUVTime;
                
                const conditionStr = WMO_CODES[curr.weather_code] || `WMO Code: ${curr.weather_code}`;
                document.getElementById('weather-desc').innerText = conditionStr;

                // Status Evaluation with FontAwesome + HUD Visuals
                const mainCard = document.getElementById('main-status-card');
                const icon = document.getElementById('status-icon');
                const text = document.getElementById('status-text');
                
                let baseIconClass = WMO_ICONS[curr.weather_code] || 'fa-circle-notch fa-spin';
                if (curr.is_day === 0) {
                    if (baseIconClass === 'fa-sun') baseIconClass = 'fa-moon';
                    if (baseIconClass === 'fa-cloud-sun') baseIconClass = 'fa-cloud-moon';
                }

                mainCard.className = "lg:col-span-5 rounded-2xl p-6 md:p-8 flex flex-col items-center justify-center text-center transition-colors duration-500 border-4 min-h-[350px] relative overflow-hidden ";

                if (currentVotes >= 3) { 
                    mainCard.classList.add('bg-brand-red/20', 'border-brand-red');
                    icon.className = `text-8xl md:text-9xl mb-4 fa-solid fa-cloud-showers-heavy text-brand-red`;
                    text.className = 'text-4xl md:text-6xl font-black tracking-tight text-brand-red uppercase';
                    text.innerText = "RAIN LIKELY";
                    if (currentAgreement >= CONFIG.sonarThreshold) playSonarPing();
                } else if (incomingRain) {
                    mainCard.classList.add('bg-brand-warning/20', 'border-brand-warning');
                    icon.className = `text-8xl md:text-9xl mb-4 fa-solid fa-cloud-showers-heavy text-brand-warning`;
                    text.className = 'text-4xl md:text-6xl font-black tracking-tight text-brand-warning uppercase';
                    text.innerText = "INCOMING RAIN (1-3H)";
                } else if (currentVotes >= 1) {
                    mainCard.classList.add('bg-brand-warning/10', 'border-brand-warning/50');
                    icon.className = `text-8xl md:text-9xl mb-4 fa-solid fa-cloud-sun-rain text-brand-warning`;
                    text.className = 'text-4xl md:text-6xl font-black tracking-tight text-brand-warning uppercase';
                    text.innerText = "RAIN POSSIBLE";
                } else {
                    mainCard.classList.add('bg-brand-success/10', 'border-brand-success/50');
                    icon.className = `text-8xl md:text-9xl mb-4 fa-solid ${baseIconClass} text-brand-success`;
                    text.className = 'text-4xl md:text-6xl font-black tracking-tight text-brand-success uppercase';
                    text.innerText = "STABLE";
                }

                renderChart(times, rainData, solarData, uvData, currentAgreement, hourlyAgreement);
            } catch (e) { console.error(e); }
        }

        // Init System
        function runApp() {
            if (state.mode === 'manual' && state.coords.lat) {
                fetchData(state.coords.lat, state.coords.lon, false); 
            } else {
                if (state.autoCoords) {
                    fetchData(state.autoCoords.lat, state.autoCoords.lon, false);
                    if(!state.mapObj) initMap(state.autoCoords.lat, state.autoCoords.lon);
                } else if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        p => { 
                            state.autoCoords = { lat: p.coords.latitude, lon: p.coords.longitude };
                            fetchData(p.coords.latitude, p.coords.longitude, false); 
                            if(!state.mapObj) initMap(state.autoCoords.lat, state.autoCoords.lon);
                        },
                        () => {
                            const mainCard = document.getElementById('main-status-card');
                            mainCard.className = "lg:col-span-5 rounded-2xl p-6 md:p-8 flex flex-col items-center justify-center text-center border-4 border-brand-orange/50 bg-brand-orange/10 min-h-[350px] relative overflow-hidden";
                            
                            document.getElementById('status-icon').className = 'text-8xl md:text-9xl mb-4 fa-solid fa-map-location-dot text-brand-orange';
                            document.getElementById('status-text').innerText = "SEARCH LOCATION";
                            document.getElementById('status-text').className = "text-4xl md:text-5xl font-black tracking-tight text-brand-orange uppercase";
                            
                            document.getElementById('weather-desc').innerText = "GPS BLOCKED. PLEASE USE GEOSPATIAL TARGETING BELOW.";
                            document.getElementById('location-badge').innerHTML = `<i class="fa-solid fa-location-crosshairs text-brand-red"></i> GPS BLOCKED`;
                            document.getElementById('local-time-text').innerText = "--:--:--";
                        },
                        { timeout: 10000, enableHighAccuracy: true }
                    );
                }
            }
        }

        function setManualLocation() {
            const lat = parseFloat(document.getElementById('manual-lat').value);
            const lon = parseFloat(document.getElementById('manual-lon').value);
            if(lat && lon) {
                state.mode = 'manual'; state.coords = { lat, lon };
                localStorage.setItem('ms_mode', 'manual');
                localStorage.setItem('ms_coords', JSON.stringify(state.coords));
                fetchData(lat, lon, false);
                calculateRoute(lat, lon);
            }
        }

        function resetToAuto() {
            localStorage.removeItem('ms_mode');
            state.mode = 'auto';
            state.autoCoords = null; 
            document.getElementById('search-city').value = "";
            document.getElementById('search-country').value = "";
            runApp();
        }

        runApp();
        setInterval(runApp, 60000); 
    </script>
