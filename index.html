<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeteoNexus | Active Telemetry</title>
    
    <link rel="preconnect" href="https://api.open-meteo.com">
    <link rel="preconnect" href="https://api.opencagedata.com">
    
    <link rel="manifest" id="manifest-placeholder">
    <meta name="theme-color" content="#0f172a">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f172a; --card-bg: #1e293b; --card-border: #334155;
            --text-primary: #f8fafc; --text-secondary: #94a3b8;
            --accent-teal: #14b8a6; --accent-blue: #3b82f6; 
            --accent-purple: #a855f7; --accent-orange: #f59e0b; 
            --accent-red: #ef4444; --accent-pink: #ec4899; 
            --success-color: #22c55e;
            --font-ui: 'Inter', sans-serif; --font-mono: 'JetBrains Mono', monospace;
        }
        * { box-sizing: border-box; outline: none; }
        body {
            font-family: var(--font-ui); background-color: var(--bg-color);
            color: var(--text-primary); margin: 0; padding: 20px; min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .dashboard-wrapper { max-width: 1400px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }

        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid var(--card-border); }
        h1 { margin: 0; font-size: 1.5rem; font-weight: 700; color: var(--text-primary); }
        
        .grid-container { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 1024px) { .grid-container { grid-template-columns: 350px 1fr; } }
        
        .card {
            background-color: var(--card-bg); border: 1px solid var(--card-border);
            border-radius: 12px; padding: 24px; position: relative;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            transition: transform 0.2s ease;
        }

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .card-title { font-size: 0.85rem; text-transform: uppercase; font-weight: 600; color: var(--text-secondary); }
        .main-status { text-align: center; padding: 30px 0; }
        .status-icon { font-size: 4rem; margin-bottom: 15px; display: block; }
        .status-text { font-size: 2rem; font-weight: 800; display: block; }
        
        .status-clear { color: var(--success-color); }
        .status-rain { color: var(--accent-blue); }
        .status-warn { color: #facc15; }
        .status-alert { color: var(--accent-red); }

        .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .metric-item { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 8px; text-align: center; }
        .metric-label { font-size: 0.75rem; color: var(--text-secondary); display: block; margin-bottom: 5px; }
        .metric-value { font-family: var(--font-mono); font-size: 1.1rem; font-weight: 700; }

        .audio-toggle {
            cursor: pointer; background: rgba(255,255,255,0.05); 
            padding: 8px 12px; border-radius: 20px; display: flex; align-items: center; gap: 8px;
            font-size: 0.8rem; border: 1px solid var(--card-border); transition: 0.2s;
        }
        .audio-toggle.active { background: rgba(239, 68, 68, 0.2); border-color: var(--accent-red); color: var(--accent-red); }

        .telemetry-panel { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 768px) { .telemetry-panel { grid-template-columns: 1fr 1fr; } }
        .data-table { width: 100%; font-family: var(--font-mono); font-size: 0.85rem; border-collapse: collapse; }
        .data-table td { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .data-val { text-align: right; color: var(--text-primary); }
        
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--card-border); color: var(--text-primary); padding: 10px; border-radius: 6px; font-family: var(--font-mono); }
        button { border: none; padding: 10px 20px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        .btn-primary { background: var(--accent-teal); color: #000; }
    </style>
</head>
<body>

    <div class="dashboard-wrapper">
        <header>
            <div><h1><i class="fa-solid fa-satellite-dish"></i> MeteoNexus</h1></div>
            <div id="audio-btn" class="audio-toggle" onclick="toggleAudio()">
                <i class="fa-solid fa-volume-xmark" id="audio-icon"></i> <span id="audio-text">ALERTS OFF</span>
            </div>
        </header>

        <div class="grid-container">
            <div id="status-card" class="card">
                <div class="card-header">
                    <span class="card-title">Live Consensus</span>
                    <div id="location-badge" style="font-size: 0.9rem; color: var(--accent-teal);">
                        <i class="fa-solid fa-location-crosshairs"></i> Locating...
                    </div>
                </div>

                <div class="main-status">
                    <i id="status-icon" class="status-icon fa-solid fa-circle-notch fa-spin"></i>
                    <span id="status-text" class="status-text">INITIALIZING</span>
                    <div id="weather-desc" style="margin-top:10px; color:var(--text-secondary);">Syncing GPS...</div>
                </div>

                <div class="metrics-grid">
                    <div class="metric-item"><span class="metric-label">Temp</span><div id="metric-temp" class="metric-value">--</div></div>
                    <div class="metric-item"><span class="metric-label">Feels Like</span><div id="metric-feels" class="metric-value">--</div></div>
                    <div class="metric-item"><span class="metric-label">Wind</span><div id="metric-wind" class="metric-value">--</div></div>
                    <div class="metric-item"><span class="metric-label">Agreement</span><div id="metric-agree" class="metric-value" style="color:var(--accent-teal)">--</div></div>
                </div>
            </div>

            <div class="card">
                <div class="card-header"><span class="card-title">Atmospheric Fusion Chart</span></div>
                <div style="height: 400px; width: 100%;"><canvas id="mainChart"></canvas></div>
            </div>
        </div>

        <div class="telemetry-panel">
            <div class="card">
                <div class="card-header"><span class="card-title">Model Health</span></div>
                <table class="data-table" id="health-table">
                    <tr><td>ECMWF (EU)</td><td class="data-val" id="stat-eu">--</td></tr>
                    <tr><td>GFS (US)</td><td class="data-val" id="stat-us">--</td></tr>
                    <tr><td>ICON (DE)</td><td class="data-val" id="stat-de">--</td></tr>
                    <tr><td>JMA (JP)</td><td class="data-val" id="stat-jp">--</td></tr>
                </table>
            </div>

            <div class="card">
                <div class="card-header"><span class="card-title">Manual Override</span></div>
                <div class="input-group">
                    <input type="number" id="manual-lat" placeholder="Latitude" step="any">
                    <input type="number" id="manual-lon" placeholder="Longitude" step="any">
                </div>
                <div style="display:flex; gap:10px;">
                    <button class="btn-primary" onclick="setManualLocation()">Apply</button>
                    <button style="background:var(--card-border); color:white;" onclick="resetToAuto()">Auto GPS</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            weatherApi: 'https://api.open-meteo.com/v1/forecast',
            geoApi: 'https://api.opencagedata.com/geocode/v1/json',
            geoKey: 'dd1af4b5321540b682b1683b61e8c640',
            sonarThreshold: 75,
            geoTimeout: 10000 // 10s Reliability Timeout
        };

        let state = {
            mode: localStorage.getItem('ms_mode') || 'auto',
            coords: JSON.parse(localStorage.getItem('ms_coords')) || { lat: null, lon: null },
            chart: null,
            audioEnabled: false,
            lastPing: 0
        };

        // Reliability: DOM Cache
        const DOM = {
            statusIcon: document.getElementById('status-icon'),
            statusText: document.getElementById('status-text'),
            weatherDesc: document.getElementById('weather-desc'),
            locBadge: document.getElementById('location-badge')
        };

        function playSonarPing() {
            if (!state.audioEnabled || (Date.now() - state.lastPing < 60000)) return;
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.frequency.setValueAtTime(1200, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.2);
            gain.gain.setValueAtTime(0, ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
            osc.start(); osc.stop(ctx.currentTime + 0.6);
            state.lastPing = Date.now();
        }

        function toggleAudio() {
            state.audioEnabled = !state.audioEnabled;
            const btn = document.getElementById('audio-btn');
            const icon = document.getElementById('audio-icon');
            btn.classList.toggle('active', state.audioEnabled);
            icon.className = state.audioEnabled ? 'fa-solid fa-volume-high fa-beat-fade' : 'fa-solid fa-volume-xmark';
            document.getElementById('audio-text').innerText = state.audioEnabled ? "SONAR ACTIVE" : "ALERTS OFF";
        }

        async function fetchData(lat, lon) {
            try {
                // Reverse Geocoding
                fetch(`${CONFIG.geoApi}?q=${lat}+${lon}&key=${CONFIG.geoKey}&no_annotations=1`)
                    .then(r => r.json())
                    .then(d => {
                        const c = d.results[0].components;
                        DOM.locBadge.innerHTML = `<i class="fa-solid fa-location-dot"></i> ${c.city || c.town || 'Nearby'}`;
                    });

                const [resCurr, resFore, resSolar] = await Promise.all([
                    fetch(`${CONFIG.weatherApi}?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&timezone=auto`),
                    fetch(`${CONFIG.weatherApi}?latitude=${lat}&longitude=${lon}&hourly=precipitation&models=ecmwf_ifs025,gfs_seamless,icon_seamless,jma_seamless&forecast_days=2&timezone=auto`),
                    fetch(`${CONFIG.weatherApi}?latitude=${lat}&longitude=${lon}&hourly=shortwave_radiation,uv_index&forecast_days=2&timezone=auto`)
                ]);

                const dCurr = await resCurr.json();
                const dFore = await resFore.json();
                const dSolar = await resSolar.json();

                document.getElementById('metric-temp').innerText = dCurr.current.temperature_2m + '°C';
                document.getElementById('metric-feels').innerText = dCurr.current.apparent_temperature + '°C';
                document.getElementById('metric-wind').innerText = dCurr.current.wind_speed_10m + ' km/h';

                const h = dFore.hourly;
                const nowHour = new Date().getHours();
                const clean = (arr) => arr.map(v => v || 0);

                const votes = [h.precipitation_ecmwf_ifs025[nowHour], h.precipitation_gfs_seamless[nowHour], h.precipitation_icon_seamless[nowHour], h.precipitation_jma_seamless[nowHour]].filter(v => v > 0.1).length;
                const agreement = (votes / 4) * 100;
                document.getElementById('metric-agree').innerText = `${agreement}%`;

                if (votes >= 3) {
                    DOM.statusIcon.className = 'status-icon fa-solid fa-cloud-showers-heavy status-alert';
                    DOM.statusText.innerText = "RAIN LIKELY";
                    DOM.statusText.className = "status-text status-alert";
                    if (agreement >= CONFIG.sonarThreshold) playSonarPing();
                } else if (votes >= 1) {
                    DOM.statusIcon.className = 'status-icon fa-solid fa-cloud-sun-rain status-warn';
                    DOM.statusText.innerText = "RAIN POSSIBLE";
                    DOM.statusText.className = "status-text status-warn";
                } else {
                    DOM.statusIcon.className = 'status-icon fa-solid fa-sun status-clear';
                    DOM.statusText.innerText = "ALL CLEAR";
                    DOM.statusText.className = "status-text status-clear";
                }
                DOM.weatherDesc.innerText = `WMO Code: ${dCurr.current.weather_code}`;

                renderChart(h.time.slice(nowHour, nowHour+24).map(t => t.slice(11,16)), {
                    eu: clean(h.precipitation_ecmwf_ifs025.slice(nowHour, nowHour+24)),
                    us: clean(h.precipitation_gfs_seamless.slice(nowHour, nowHour+24)),
                    de: clean(h.precipitation_icon_seamless.slice(nowHour, nowHour+24)),
                    jp: clean(h.precipitation_jma_seamless.slice(nowHour, nowHour+24))
                }, clean(dSolar.hourly.shortwave_radiation.slice(nowHour, nowHour+24)));

            } catch (e) {
                DOM.statusText.innerText = "SYNC ERROR";
                console.error(e);
            }
        }

        function renderChart(labels, rain, solar) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (state.chart) state.chart.destroy();
            state.chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'ECMWF', data: rain.eu, borderColor: '#3b82f6', tension: 0.4, pointRadius: 0 },
                        { label: 'Solar (W/m²)', data: solar, type: 'bar', backgroundColor: 'rgba(255,165,0,0.2)', yAxisID: 'y1' }
                    ]
                },
                options: { 
                    responsive: true, maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true }, y1: { position: 'right', grid: { display: false } } }
                }
            });
        }

        // Reliability: Optimized Boot Logic
        function runApp() {
            if (state.mode === 'manual' && state.coords.lat) {
                fetchData(state.coords.lat, state.coords.lon);
            } else {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        p => fetchData(p.coords.latitude, p.coords.longitude),
                        () => {
                            DOM.statusText.innerText = "USE MANUAL";
                            DOM.weatherDesc.innerText = "GPS Blocked/Timed Out";
                            DOM.statusIcon.className = "status-icon fa-solid fa-location-dot status-warn";
                        },
                        { timeout: CONFIG.geoTimeout, enableHighAccuracy: true }
                    );
                }
            }
        }

        function setManualLocation() {
            const lat = parseFloat(document.getElementById('manual-lat').value);
            const lon = parseFloat(document.getElementById('manual-lon').value);
            if (!lat || !lon) return;
            state.mode = 'manual'; state.coords = { lat, lon };
            localStorage.setItem('ms_mode', 'manual');
            localStorage.setItem('ms_coords', JSON.stringify(state.coords));
            runApp();
        }

        function resetToAuto() {
            localStorage.removeItem('ms_mode');
            state.mode = 'auto';
            runApp();
        }

        runApp();
        setInterval(runApp, 600000); // 10 min refresh
    </script>
</body>
</html>
