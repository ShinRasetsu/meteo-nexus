<script type="module">
    import { RadarCard } from './UI_RadarCard.js';
    import { WeatherChart } from './UI_WeatherChart.js';
    import { FuelModal } from './UI_FuelModal.js';

    // ==========================================
    // GLOBAL BINDINGS (Transitional Interface)
    // Ensures ES6 modules can access legacy core 
    // functions without scope failures.
    // ==========================================
    window.state = state; 
    window.DOM = DOM;
    window.__METEO_CORE_STATE = __METEO_CORE_STATE;
    window.updateText = updateText;
    window.updateClass = updateClass;
    window.updateHTML = updateHTML;
    window.sanitizeHTML = sanitizeHTML;
    window.fetchWithRetry = fetchWithRetry;
    window.fastDistance = fastDistance;
    window.BRAND_LINKS = BRAND_LINKS;
    window.VARIANT_OSM_MAP = VARIANT_OSM_MAP;
    window.FUEL_CATALOG = FUEL_CATALOG;
    window.closeModal = closeModal;
    window.initRoute = initRoute;
    window.activateLiveNavigation = activateLiveNavigation;

    // Instantiate Modules
    window.fuelManagerInstance = new FuelModal();
    const radar = new RadarCard('radar-hud-container');
    const weatherChart = new WeatherChart('weather-chart-container');

    // ==========================================
    // PRESERVED LEGACY CORE FUNCTIONS
    // ==========================================

    function syncClock() {
        const now = new Date();
        if (state.targetTimezone) {
            try {
                const timeStr = now.toLocaleTimeString('en-US', {
                    timeZone: state.targetTimezone, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
                });
                requestAnimationFrame(() => updateText(DOM.localTimeText, timeStr));
            } catch(e) {}
        }
        setTimeout(syncClock, 1000 - (now.getTime() % 1000));
    }
    syncClock();

    function getWindDirection(deg) {
        const arr = ["N", "NNE", "NE", "ENE", "E", "ESE", "SE", "SSE", "S", "SSW", "SW", "WSW", "W", "WNW", "NW", "NNW"];
        return arr[Math.floor((deg / 22.5) + 0.5) % 16];
    }

    window.purgeSystem = function() {
        DOM.modals.custom.classList.remove('hidden');
    }

    window.closeModal = function(modalId) {
        document.getElementById(modalId).classList.add('hidden');
    }

    window.executePurge = async function() {
        try {
            localStorage.clear();
            sessionStorage.clear();
            if (window.localforage) await window.localforage.clear();
            
            if ('caches' in window) {
                const cacheNames = await caches.keys();
                await Promise.all(cacheNames.map(name => caches.delete(name)));
            }
            
            if ('serviceWorker' in navigator) {
                const registrations = await navigator.serviceWorker.getRegistrations();
                for (let registration of registrations) {
                    await registration.unregister();
                }
            }
        } catch(e) {
            console.error('Purge partially failed:', e);
        } finally {
            window.location.reload(true);
        }
    }

    async function enforcePersistentStorage() {
        if (navigator.storage && navigator.storage.persist) {
            const isPersisted = await navigator.storage.persisted();
            if (!isPersisted) await navigator.storage.persist();
        }
    }
    enforcePersistentStorage();

    window.toggleAudio = function() {
        state.audioEnabled = !state.audioEnabled;
        const ctx = getAudioContext();
        
        if (state.audioEnabled) {
            updateClass(DOM.audio.btn, 'flex items-center gap-3 px-4 py-2 md:px-6 md:py-3 rounded-xl border-4 border-brand-red bg-brand-red/20 text-brand-red text-sm md:text-base font-bold tracking-widest transition-all');
            updateClass(DOM.audio.icon, 'fa-solid fa-volume-high fa-beat-fade text-xl');
            updateText(DOM.audio.text, "SONAR ACTIVE");
            
            if (ctx.state === 'suspended') ctx.resume();
            ctx.resume().then(() => playSonarPing());
        } else {
            updateClass(DOM.audio.btn, 'flex items-center gap-3 px-4 py-2 md:px-6 md:py-3 rounded-xl border-4 border-surface-700 bg-surface-900 text-gray-100 text-sm md:text-base font-bold tracking-widest transition-all');
            updateClass(DOM.audio.icon, 'fa-solid fa-volume-xmark text-xl');
            updateText(DOM.audio.text, "SONAR OFF");
            
            if (ctx.state === 'running') ctx.suspend();
        }
    }

    function playSonarPing() {
        if (!state.audioEnabled) return;
        if (Date.now() - state.lastPing < 60000) return; 
        
        const ctx = getAudioContext(); 
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.setValueAtTime(1200, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.2);
        gain.gain.setValueAtTime(0, ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
        osc.start(); osc.stop(ctx.currentTime + 0.6);
        state.lastPing = Date.now();
    }

    // Proxy adapter mapping legacy telemetry payloads to the decoupled UI module
    window.renderChart = function(labels, rainData, solarData, uvData, hourlyAgreement) {
        weatherChart.update(labels, rainData, solarData, uvData, hourlyAgreement);
    }

    function normalizeTelemetryData(dCurr, dFore, dSolar, isOffline) {
        if (dCurr.timezone) state.targetTimezone = dCurr.timezone;
        let curr = dCurr.current; 
        const h = dFore.hourly; 
        const hSol = dSolar.hourly;
        
        const currentUnixMs = Date.now();
        let nowIndex = 0;
        let minDiff = Infinity;
        
        if (h && h.time) {
            h.time.forEach((t, i) => {
                const diff = Math.abs((t * 1000) - currentUnixMs);
                if (diff < minDiff) { minDiff = diff; nowIndex = i; }
            });
        }
        
        if (isOffline || !curr) {
            curr = {
                temperature_2m: h.temperature_2m ? h.temperature_2m[nowIndex] : 0,
                apparent_temperature: h.apparent_temperature ? h.apparent_temperature[nowIndex] : (h.temperature_2m ? h.temperature_2m[nowIndex] : 0), 
                relative_humidity_2m: h.relative_humidity_2m ? h.relative_humidity_2m[nowIndex] : 50, 
                weather_code: h.weather_code ? h.weather_code[nowIndex] : 0,
                wind_speed_10m: h.wind_speed_10m ? h.wind_speed_10m[nowIndex] : 0,
                wind_direction_10m: h.wind_direction_10m ? h.wind_direction_10m[nowIndex] : 0,
                is_day: (new Date().getHours() > 6 && new Date().getHours() < 18) ? 1 : 0
            };
        }

        const checkHealth = (rawArr) => {
            if (!rawArr || !Array.isArray(rawArr)) return false;
            if (rawArr.every(v => v === null)) return false;
            return true;
        };

        const nodeHealth = [
            checkHealth(h.precipitation_ecmwf_ifs025),
            checkHealth(h.precipitation_gfs_seamless),
            checkHealth(h.precipitation_icon_seamless),
            checkHealth(h.precipitation_jma_seamless)
        ];
        
        const clean = (arr) => {
            const limit = h.time.length;
            const src = arr || new Array(limit).fill(0);
            const result = new Array(limit);
            for (let i = 0; i < limit; i++) {
                result[i] = src[i] === null ? 0 : src[i];
            }
            return result;
        };
        const rEU = clean(h.precipitation_ecmwf_ifs025);
        const rUS = clean(h.precipitation_gfs_seamless);
        const rDE = clean(h.precipitation_icon_seamless);
        const rJP = clean(h.precipitation_jma_seamless);
        
        const maxSlice = Math.min(nowIndex + 24, h.time.length);
        
        const rainData = { 
            eu: rEU.slice(nowIndex, maxSlice), 
            us: rUS.slice(nowIndex, maxSlice), 
            de: rDE.slice(nowIndex, maxSlice), 
            jp: rJP.slice(nowIndex, maxSlice) 
        };
        
        const uvArr = hSol.uv_index || new Array(h.time.length).fill(0);
        
        const uvData = new Array(maxSlice - nowIndex);
        for (let i = 0, j = nowIndex; j < maxSlice; i++, j++) {
            uvData[i] = uvArr[j] === null ? 0 : uvArr[j];
        }
        const solarData = clean(hSol.shortwave_radiation).slice(nowIndex, maxSlice);
        
        const times = new Array(maxSlice - nowIndex);
        for (let i = 0, j = nowIndex; j < maxSlice; i++, j++) {
            const date = new Date(h.time[j] * 1000);
            const s = date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
            times[i] = (s === "00:00" || s === "24:00") ? "00:00 (+1d)" : s;
        }
        
        const hourlyAgreement = new Array(rainData.eu.length);
        for (let i = 0; i < rainData.eu.length; i++) {
            let v = 0; 
            if(rainData.eu[i]>0.1)v++; 
            if(rainData.us[i]>0.1)v++; 
            if(rainData.de[i]>0.1)v++; 
            if(rainData.jp[i]>0.1)v++;
            hourlyAgreement[i] = (v/4)*100;
        }
        
        const currentAgreement = hourlyAgreement[0] || 0;
        let currentVotes = (currentAgreement / 100) * 4;
        let incomingRain = false; 
        for (let i=1; i<=3 && i < hourlyAgreement.length; i++) { 
            if (hourlyAgreement[i] >= 75) { incomingRain = true; break; } 
        }

        return { curr, rEU, rUS, rDE, rJP, rainData, uvData, solarData, times, hourlyAgreement, currentAgreement, currentVotes, incomingRain, nodeHealth };
    }

    function renderTelemetryUI(data, isOffline) {
        const { curr, currentAgreement, currentVotes, incomingRain, uvData, times, nodeHealth } = data;

        ['eu','us','de','jp'].forEach((id, idx) => {
            const el = document.getElementById(`stat-${id}`);
            const isHealthy = nodeHealth ? nodeHealth[idx] : true; 

            if(!isHealthy) { 
                updateClass(el, "font-bold px-2 py-0.5 bg-brand-red border border-brand-red text-black rounded flex-1 md:flex-none text-center uppercase tracking-widest"); 
                updateHTML(el, `<i class="fa-solid fa-triangle-exclamation mr-1"></i> ${id.toUpperCase()}`); 
            } else { 
                updateClass(el, "font-bold px-2 py-0.5 bg-brand-success/20 border border-brand-success/50 text-brand-success rounded flex-1 md:flex-none text-center uppercase tracking-widest"); 
                updateHTML(el, id.toUpperCase()); 
            }
        });

        updateText(DOM.metricTemp, Math.round(curr.temperature_2m) + '°');
        updateText(DOM.metricFeels, Math.round(curr.apparent_temperature) + '°');
        updateText(DOM.metricHum, curr.relative_humidity_2m + '%');
        updateText(DOM.metricAgree, `${currentAgreement.toFixed(0)}%`);
        updateText(DOM.metricWindSpeed, Math.round(curr.wind_speed_10m));
        
        updateHTML(DOM.metricWindDir, `${getWindDirection(curr.wind_direction_10m)} <i class="fa-solid fa-arrow-up" style="transform: rotate(${curr.wind_direction_10m + 180}deg);"></i>`);
        
        const maxUV = uvData.length > 0 ? Math.max(...uvData) : 0;
        updateText(DOM.metricUvVal, maxUV.toFixed(1));
        
        const uvIdx = uvData.indexOf(maxUV);
        if (uvIdx >= 0 && times[uvIdx]) {
            updateText(DOM.metricUvTime, "@ " + times[uvIdx].replace(" (+1d)", ""));
        } else {
            updateText(DOM.metricUvTime, "--");
        }
        
        let bIcon = WMO_ICONS[curr.weather_code] || 'fa-circle-notch fa-spin'; 
        if (curr.is_day === 0) bIcon = bIcon.replace('sun', 'moon'); 
        
        updateClass(DOM.mainCard, "lg:col-span-5 rounded-2xl p-4 md:p-6 flex flex-col items-center justify-center text-center transition-colors duration-500 border-4 min-h-[200px] md:min-h-[250px] relative overflow-hidden ");
        
        if (currentVotes >= 3) { 
            DOM.mainCard.classList.add('bg-brand-red/20', 'border-brand-red'); 
            updateClass(DOM.statusIcon, `text-6xl md:text-7xl mb-2 fa-solid fa-cloud-showers-heavy text-brand-red`); 
            updateClass(DOM.statusText, 'text-3xl md:text-4xl font-black tracking-tight text-brand-red uppercase'); 
            updateText(DOM.statusText, "RAIN LIKELY");
            if (currentAgreement >= CONFIG.sonarThreshold && !isOffline) playSonarPing();
        } else if (incomingRain) {
            DOM.mainCard.classList.add('bg-brand-warning/20', 'border-brand-warning'); 
            updateClass(DOM.statusIcon, `text-6xl md:text-7xl mb-2 fa-solid fa-cloud-showers-heavy text-brand-warning`); 
            updateClass(DOM.statusText, 'text-3xl md:text-4xl font-black tracking-tight text-brand-warning uppercase'); 
            updateText(DOM.statusText, "INCOMING RAIN (1-3H)");
        } else if (currentVotes >= 1) {
            DOM.mainCard.classList.add('bg-brand-warning/10', 'border-brand-warning/50'); 
            updateClass(DOM.statusIcon, `text-6xl md:text-7xl mb-2 fa-solid fa-cloud-sun-rain text-brand-warning`); 
            updateClass(DOM.statusText, 'text-3xl md:text-4xl font-black tracking-tight text-brand-warning uppercase'); 
            updateText(DOM.statusText, "RAIN POSSIBLE");
        } else {
            DOM.mainCard.classList.add('bg-brand-success/10', 'border-brand-success/50'); 
            updateClass(DOM.statusIcon, `text-6xl md:text-7xl mb-2 fa-solid ${bIcon} text-brand-success`); 
            updateClass(DOM.statusText, 'text-3xl md:text-4xl font-black tracking-tight text-brand-success uppercase'); 
            updateText(DOM.statusText, "STABLE");
        }

        if (isOffline) {
            updateText(DOM.weatherDesc, "OFFLINE: RTC INTERPOLATION");
            DOM.weatherDesc.classList.remove("text-gray-300");
            DOM.weatherDesc.classList.add("text-brand-orange");
        } else {
            updateText(DOM.weatherDesc, WMO_CODES[curr.weather_code] || `Code: ${curr.weather_code}`);
            DOM.weatherDesc.classList.remove("text-brand-orange");
            DOM.weatherDesc.classList.add("text-gray-300");
        }
    }

    async function processTelemetryPayload(dCurr, dFore, dSolar, isOffline = false) {
        if (dCurr && dCurr.current) {
            if (dCurr.current.wind_direction_10m !== undefined) window.__METEO_CORE_STATE.windDir = dCurr.current.wind_direction_10m;
            if (dCurr.current.wind_speed_10m !== undefined) window.__METEO_CORE_STATE.windSpeed = dCurr.current.wind_speed_10m;
            if (dCurr.current.wind_gusts_10m !== undefined) window.__METEO_CORE_STATE.windGust = dCurr.current.wind_gusts_10m;
        }
        if (dCurr && dCurr.elevation !== undefined) {
            window.__METEO_CORE_STATE.topoAltitude = dCurr.elevation;
        }

        const data = normalizeTelemetryData(dCurr, dFore, dSolar, isOffline);
        renderTelemetryUI(data, isOffline);
        window.renderChart(data.times, data.rainData, data.solarData, data.uvData, data.hourlyAgreement);
    }

    async function fetchData(lat, lon, skipReverseGeo = false) {
        state.lastHudLat = lat; state.lastHudLon = lon;
        state.telemetryCache.timestamp = Date.now();
        state.telemetryCache.lat = lat;
        state.telemetryCache.lon = lon;
        
        if (!skipReverseGeo && navigator.onLine) {
            fetchWithRetry(`${CONFIG.reverseGeoApi}?latitude=${lat}&longitude=${lon}&localityLanguage=en`, { priority: 'high', timeout: 10000 }, 2, 500)
                .then(r => r.json())
                .then(d => {
                    const city = d.city || d.locality || d.principalSubdivision || 'Unknown';
                    updateHTML(DOM.locationBadge, `<i class="fa-solid fa-location-dot"></i> ${sanitizeHTML(city)}`);
                }).catch(() => {});
        }
        try {
            if (!navigator.onLine) throw new Error("Browser is offline.");

            const [rCurr, rFore, rSolar] = await Promise.all([
                fetchWithRetry(`${CONFIG.weatherApi}?latitude=${lat}&longitude=${lon}&elevation=nan&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,wind_gusts_10m,is_day&timezone=auto&timeformat=unixtime`, { priority: 'high', timeout: 15000 }, 3, 1000),
                fetchWithRetry(`${CONFIG.weatherApi}?latitude=${lat}&longitude=${lon}&hourly=precipitation,temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m&models=ecmwf_ifs025,gfs_seamless,icon_seamless,jma_seamless&forecast_days=2&timezone=auto&timeformat=unixtime`, { priority: 'high', timeout: 15000 }, 3, 1000),
                fetchWithRetry(`${CONFIG.weatherApi}?latitude=${lat}&longitude=${lon}&hourly=shortwave_radiation,uv_index&forecast_days=2&timezone=auto&timeformat=unixtime`, { priority: 'high', timeout: 15000 }, 3, 1000)
            ]);
            
            const dCurr = await rCurr.json(); const dFore = await rFore.json(); const dSolar = await rSolar.json();
            
            await localforage.setItem('telemetry_payload', { dCurr, dFore, dSolar, timestamp: Date.now() });
            processTelemetryPayload(dCurr, dFore, dSolar, false);

        } catch (e) { 
            console.warn("Network Error. Failing over to IndexedDB LocalForage cache.", e);
            try {
                const cached = await localforage.getItem('telemetry_payload');
                if (cached) {
                    processTelemetryPayload(cached.dCurr, cached.dFore, cached.dSolar, true);
                }
            } catch (cacheErr) {
                console.error("Cache Read Failed:", cacheErr);
            }
        }
    }

    window.resetToAuto = function() {
        if (state.intelFetchAbortController) {
            state.intelFetchAbortController.abort();
            state.intelFetchAbortController = null;
        }

        if (state.routeCtrl && state.mapObj) { state.mapObj.removeControl(state.routeCtrl); state.routeCtrl = null; }
        state.targetCoords = null; 
        state.customRouteWaypoints = null;
        state.routeNodes = null;
        state.originalRouteNodes = null;

        if (state.fuelMarkers && state.fuelMarkers.length > 0) {
            state.fuelMarkers.forEach(m => state.mapObj.removeLayer(m));
            state.fuelMarkers = [];
        }

        for (let item of state.interceptMarkers) {
            if (item.marker) state.mapObj.removeLayer(item.marker);
        }
        state.interceptMarkers = [];
        
        state.lastIntelFetch = 0; 
        state.currentRouteCoords = null; 
        state.isFuelOnlyRoute = false;
        
        updateHTML(DOM.statusEl, `<i class="fa-solid fa-satellite fa-fade mr-2"></i> GPS ACTIVE`);
        updateClass(DOM.statusEl, "text-xs md:text-sm font-bold text-brand-success uppercase tracking-widest bg-brand-success/10 px-2 py-1 md:px-3 md:py-1.5 rounded-lg border-2 border-brand-success/50 whitespace-nowrap");
        DOM.navBtn.classList.add('hidden');
        
        if (state.focusedSection === 'sec-intel') toggleFocus('sec-intel');
        DOM.secIntel.classList.add('hidden');
        
        state.mode = 'auto'; 
        state.tacticalMode = 1;
        window.applyTacticalMode();
    }

    async function runApp() {
        requestWakeLock();
        startBackgroundTracking();
        
        // Wait for Fuel Modal config to load and UI to bind
        await window.fuelManagerInstance.init(); 
        
        requestAnimationFrame(smoothVisualsLoop);
        
        if (state.mode === 'manual' && state.coords && state.coords.lat) {
            initMap(state.coords.lat, state.coords.lon); 
            fetchData(state.coords.lat, state.coords.lon, false); 
        } else if (state.autoCoords) {
            initMap(state.autoCoords.lat, state.autoCoords.lon); 
            if (state.isMapLocked) {
                window.applyTacticalMode();
            }
            fetchData(state.autoCoords.lat, state.autoCoords.lon, false);
        } else if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(p => { 
                state.autoCoords = { lat: p.coords.latitude, lon: p.coords.longitude };
                initMap(p.coords.latitude, p.coords.longitude); 
                fetchData(p.coords.latitude, p.coords.longitude, false); 
            }, () => {
                updateClass(DOM.mainCard, "lg:col-span-5 rounded-2xl p-4 md:p-6 flex flex-col items-center justify-center text-center border-4 border-brand-orange/50 bg-brand-orange/10 min-h-[200px] md:min-h-[250px] relative overflow-hidden");
                updateClass(DOM.statusIcon, 'text-6xl md:text-7xl mb-2 fa-solid fa-map-location-dot text-brand-orange');
                updateText(DOM.statusText, "SEARCH LOCATION");
                updateClass(DOM.statusText, "text-3xl md:text-4xl font-black tracking-tight text-brand-orange uppercase");
                updateText(DOM.weatherDesc, "GPS BLOCKED.");
                updateHTML(DOM.locationBadge, `<i class="fa-solid fa-location-crosshairs text-brand-red"></i> GPS BLOCKED`);
            }, { timeout: 10000, enableHighAccuracy: true });
        }
    }

    function checkDependenciesAndRun() {
        if (typeof localforage === 'undefined' || typeof Chart === 'undefined' || typeof L === 'undefined' || typeof L.Routing === 'undefined') {
            setTimeout(checkDependenciesAndRun, 50);
            return;
        }
        if (state.targetCoords) { window.activateLiveNavigation(state.targetCoords.lat, state.targetCoords.lon); }
        runApp(); 
    }

    // --- PWA SERVICE WORKER REGISTRATION ---
    (function initPWA() {
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js', { scope: './' })
                    .then(registration => {
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    newWorker.postMessage({ type: 'SKIP_WAITING' });
                                }
                            });
                        });
                    })
                    .catch(err => console.warn('ServiceWorker registration failed: ', err));
            });
            
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) {
                    refreshing = true;
                    window.location.reload();
                }
            });
        }

        let deferredPrompt;
        const installBtn = document.getElementById('pwa-install-btn');
        if(installBtn) {
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault(); deferredPrompt = e; installBtn.classList.remove('hidden'); installBtn.classList.add('flex');
            });

            installBtn.addEventListener('click', async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') { installBtn.classList.add('hidden'); installBtn.classList.remove('flex'); }
                    deferredPrompt = null;
                }
            });
        }
    })();

    // ==========================================
    // UI COMPONENT MOUNT ENGINE
    // ==========================================
    if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', () => {
            radar.mount();
            weatherChart.mount();
            checkDependenciesAndRun();
        });
    } else {
        radar.mount();
        weatherChart.mount();
        checkDependenciesAndRun();
    }

</script>
