<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeteoNexus | Active Telemetry</title>
    <link rel="manifest" id="manifest-placeholder">
    <meta name="theme-color" content="#0f172a">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a; --card-bg: #1e293b; --card-border: #334155;
            --text-primary: #f8fafc; --text-secondary: #94a3b8;
            --accent-teal: #14b8a6; --accent-blue: #3b82f6;
            --accent-purple: #a855f7; --accent-orange: #f59e0b;
            --accent-red: #ef4444; --accent-pink: #ec4899;
            --success-color: #22c55e;
            --font-ui: 'Inter', sans-serif; --font-mono: 'JetBrains Mono', monospace;
        }
        * { box-sizing: border-box; }
        body { font-family: var(--font-ui); background-color: var(--bg-color); color: var(--text-primary); margin: 0; padding: 20px; min-height: 100vh; }

        #auth-overlay { position: fixed; inset: 0; background: var(--bg-color); display: flex; align-items: center; justify-content: center; z-index: 9999; padding: 20px; }
        .auth-card { width: 100%; max-width: 400px; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 30px; text-align: center; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5); }
        .auth-icon { width: 48px; height: 48px; background: rgba(20,184,166,0.1); color: var(--accent-teal); border: 1px solid var(--accent-teal); border-radius: 12px; display: inline-flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 15px; }
        .auth-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 8px; color: var(--text-primary); }
        .auth-sub { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 24px; font-family: var(--font-mono); }
        .google-btn { width: 100%; display: flex; align-items: center; justify-content: center; gap: 12px; background: #fff; color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; font-family: var(--font-ui); }
        .google-btn:hover { background: #f1f1f1; transform: translateY(-1px); }
        .google-btn svg { width: 18px; height: 18px; }
        #auth-error { display: none; margin-top: 15px; padding: 10px; background: rgba(239,68,68,0.1); border: 1px solid var(--accent-red); border-radius: 6px; color: var(--accent-red); font-size: 0.8rem; font-family: var(--font-mono); word-wrap: break-word; text-align: left; }

        .user-profile { display: flex; align-items: center; gap: 10px; background: var(--card-bg); border: 1px solid var(--card-border); padding: 6px 12px; border-radius: 30px; font-size: 0.85rem; }
        .logout-btn { background: transparent; color: var(--accent-red); border: 1px solid var(--accent-red); padding: 4px 10px; border-radius: 4px; font-size: 0.75rem; margin-left: 8px; cursor: pointer; }
        .logout-btn:hover { background: rgba(239,68,68,0.1); }

        .dashboard-wrapper { max-width: 1400px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid var(--card-border); }
        h1 { margin: 0; font-size: 1.5rem; font-weight: 700; color: var(--text-primary); }

        .grid-container { display: flex; flex-wrap: wrap; gap: 20px; }
        .grid-container > * { width: 100%; }
        .telemetry-panel { display: flex; flex-wrap: wrap; gap: 20px; width: 100%; }
        .telemetry-panel > * { width: 100%; }
        @media (min-width: 768px) { .telemetry-panel > * { width: calc(50% - 10px); } }
        @media (min-width: 1024px) { .grid-container > #status-card { width: 350px; flex-shrink: 0; } .grid-container > .telemetry-panel { width: calc(100% - 370px); } }
        @supports (display: grid) {
            .grid-container { display: grid; grid-template-columns: 1fr; gap: 20px; }
            .grid-container > * { width: auto; flex: none; }
            @media (min-width: 1024px) { .grid-container { grid-template-columns: 350px 1fr; } }
            .telemetry-panel { display: grid; grid-template-columns: 1fr; gap: 20px; width: auto; }
            .telemetry-panel > * { width: auto; }
            @media (min-width: 768px) { .telemetry-panel { grid-template-columns: 1fr 1fr; } }
        }

        .card { background-color: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 24px; position: relative; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .card-title { font-size: 0.85rem; text-transform: uppercase; font-weight: 600; color: var(--text-secondary); margin-top: 2px; }

        .main-status { text-align: center; padding: 30px 0; }
        .status-icon { font-size: 4rem; margin-bottom: 15px; display: block; }
        .status-text { font-size: 2rem; font-weight: 800; display: block; }
        .status-clear { color: var(--success-color); }
        .status-rain { color: var(--accent-blue); }
        .status-warn { color: #facc15; }
        .status-alert { color: var(--accent-red); }

        .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .metric-item { background: rgba(255,255,255,0.03); padding: 12px 5px; border-radius: 8px; text-align: center; }
        .metric-label { font-size: 0.70rem; color: var(--text-secondary); display: block; margin-bottom: 5px; text-transform: uppercase; }
        .metric-value { font-family: var(--font-mono); font-size: 1rem; font-weight: 700; }

        .audio-toggle { cursor: pointer; background: rgba(255,255,255,0.05); padding: 8px 12px; border-radius: 20px; display: flex; align-items: center; gap: 8px; font-size: 0.8rem; border: 1px solid var(--card-border); transition: 0.2s; }
        .audio-toggle.active { background: rgba(239,68,68,0.2); border-color: var(--accent-red); color: var(--accent-red); }
        .audio-toggle:hover { background: rgba(255,255,255,0.1); }

        .data-table { width: 100%; font-family: var(--font-mono); font-size: 0.85rem; border-collapse: collapse; }
        .data-table td { padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .data-val { text-align: right; color: var(--text-primary); }
        .status-ok { color: var(--success-color); font-weight: 700; }
        .status-fail { color: var(--accent-red); font-weight: 700; }
        .status-wait { color: var(--text-secondary); }

        .input-group { display: flex; gap: 10px; margin-bottom: 15px; width: 100%; }
        input { background: rgba(0,0,0,0.2); border: 1px solid var(--card-border); color: var(--text-primary); padding: 10px; border-radius: 6px; font-family: var(--font-mono); font-size: 0.85rem; width: 100%; }
        input:focus { border-color: var(--accent-teal); outline: none; }
        button { border: none; padding: 10px 20px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--accent-teal); color: #000; }
        .btn-primary:hover { filter: brightness(1.1); }

        .time-display { display: inline-flex; align-items: center; gap: 6px; margin-top: 6px; font-family: var(--font-mono); font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); justify-content: flex-end; width: 100%; }
        .time-display i { color: var(--accent-blue); opacity: 0.8; }
    </style>
</head>
<body>

<svg style="display:none;">
    <symbol id="icon-google" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 6.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </symbol>
</svg>

<div id="auth-overlay">
    <div class="auth-card">
        <div class="auth-icon"><i class="fa-solid fa-satellite-dish"></i></div>
        <div class="auth-title">METEONEXUS TERMINAL</div>
        <div class="auth-sub">ENCRYPTED TELEMETRY ACCESS</div>
        <button type="button" class="google-btn" onclick="signInWithGoogle()">
            <svg><use href="#icon-google"></use></svg>
            Continue with Google
        </button>
        <div id="auth-error"></div>
    </div>
</div>

<div id="app-content" style="display:none;">
    <div class="dashboard-wrapper">
        <header>
            <div><h1><i class="fa-solid fa-satellite-dish"></i> MeteoNexus <span style="font-weight:300;opacity:0.6;">Active Telemetry</span></h1></div>
            <div style="display:flex;align-items:center;gap:15px;">
                <div id="profile-chip" class="user-profile"></div>
                <div id="audio-btn" class="audio-toggle" onclick="toggleAudio()">
                    <i class="fa-solid fa-volume-xmark" id="audio-icon"></i>
                    <span id="audio-text">ALERTS OFF</span>
                </div>
            </div>
        </header>

        <div class="grid-container">
            <div id="status-card" class="card">
                <div class="card-header">
                    <span class="card-title">Live Consensus</span>
                    <div style="text-align:right;">
                        <div id="location-badge" style="font-size:0.9rem;color:var(--accent-teal);">
                            <i class="fa-solid fa-location-crosshairs"></i> Locating...
                        </div>
                        <div class="time-display">
                            <i class="fa-regular fa-clock"></i> <span id="local-time-text">--:--:--</span>
                        </div>
                    </div>
                </div>
                <div class="main-status">
                    <i id="status-icon" class="status-icon fa-solid fa-circle-notch fa-spin"></i>
                    <span id="status-text" class="status-text">WAITING</span>
                    <div id="weather-desc" style="margin-top:10px;color:var(--text-secondary);font-family:var(--font-mono);font-size:0.9rem;">--</div>
                </div>
                <div class="metrics-grid">
                    <div class="metric-item"><span class="metric-label">Temp</span><span class="metric-value" id="val-temp">--</span></div>
                    <div class="metric-item"><span class="metric-label">Wind</span><span class="metric-value" id="val-wind">--</span></div>
                    <div class="metric-item"><span class="metric-label">Rain (1h)</span><span class="metric-value" id="val-rain">--</span></div>
                </div>
            </div>

            <div class="telemetry-panel">
                <div class="card">
                    <div class="card-header"><span class="card-title">Precipitation Trend</span></div>
                    <div style="height:250px;"><canvas id="rainChart"></canvas></div>
                </div>
                <div class="card">
                    <div class="card-header"><span class="card-title">Geospatial Targeting</span></div>
                    <div class="input-group">
                        <input type="number" id="manual-lat" placeholder="Latitude" step="0.0001">
                        <input type="number" id="manual-lon" placeholder="Longitude" step="0.0001">
                    </div>
                    <div style="display:flex;gap:10px;">
                        <button class="btn-primary" style="flex:1;" onclick="setManualLocation()">Lock Coordinates</button>
                        <button class="btn-primary" style="background:var(--card-border);color:#fff;" onclick="resetToAuto()"><i class="fa-solid fa-rotate-left"></i></button>
                    </div>
                    <table class="data-table" style="margin-top:25px;">
                        <tr><td>Data Source</td><td class="data-val">Open-Meteo AIFS</td></tr>
                        <tr><td>Telemetry Link</td><td class="data-val" id="link-status"><span class="status-wait">STANDBY</span></td></tr>
                        <tr><td>Packet Latency</td><td class="data-val" id="val-ping">--</td></tr>
                        <tr><td>Last Fetch</td><td class="data-val" id="val-update">--</td></tr>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // CONFIG
    const SB_URL = 'https://myhcnbqzafygqnfxykdd.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im15aGNuYnF6YWZ5Z3FuZnh5a2RkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MzMwMDMsImV4cCI6MjA5MTQwOTAwM30.UhE9uQ3bkw3b1HLoHVB1uQilysYzbcXyYlIwmxTl1G0';

    // FIX: window.supabase = the CDN module object — naming our client 'supabase' collides with it
    // Use sbClient for the instantiated client throughout
    const sbClient = window.supabase.createClient(SB_URL, SB_KEY);

    // STATE
    let clockInterval = null;
    let gpsDenied = false;
    let chartInstance = null;
    let state = {
        mode: localStorage.getItem('ms_mode') || 'auto',
        coords: JSON.parse(localStorage.getItem('ms_coords')) || null,
        audioEnabled: false
    };

    // AUTH
    async function signInWithGoogle() {
        const errorBox = document.getElementById('auth-error');
        errorBox.style.display = 'none';
        try {
            const { data, error } = await sbClient.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: window.location.origin + window.location.pathname,
                    queryParams: { access_type: 'offline', prompt: 'consent' }
                }
            });
            if (error) throw error;
            if (data?.url) window.location.assign(data.url);
        } catch (err) {
            console.error("AUTH_FATAL:", err);
            errorBox.innerText = `ACCESS_DENIED: ${err.message}`;
            errorBox.style.display = 'block';
        }
    }

    async function signOut() {
        await sbClient.auth.signOut();
        window.location.reload();
    }

    // SESSION HANDLER
    function handleAuthStateChange(session) {
        const overlay = document.getElementById('auth-overlay');
        const content = document.getElementById('app-content');
        const profile = document.getElementById('profile-chip');

        if (session) {
            overlay.style.display = 'none';
            content.style.display = 'block';
            const user = session.user;
            profile.innerHTML = `
                <span style="font-family:var(--font-mono)">${user.email}</span>
                <button class="logout-btn" onclick="signOut()"><i class="fa-solid fa-right-from-bracket"></i> EXIT</button>
            `;
            if (!clockInterval) {
                clockInterval = setInterval(() => {
                    const el = document.getElementById('local-time-text');
                    if (el) el.innerText = new Date().toLocaleTimeString('en-US', { hour12: false });
                }, 1000);
            }
            runApp();
            setInterval(runApp, 60000);
        } else {
            overlay.style.display = 'flex';
            content.style.display = 'none';
            if (clockInterval) clearInterval(clockInterval);
        }
    }

    // FIX: all auth calls use sbClient — not window.supabase, not supabase
    // Handle session on every load — including post-OAuth redirect
    // Supabase v2 writes access_token into the URL hash after redirect
    // onAuthStateChange fires SIGNED_IN automatically when it detects the hash
    sbClient.auth.onAuthStateChange((event, session) => {
        console.log("AUTH_EVENT:", event, session?.user?.email);
        if (event === 'SIGNED_IN' || event === 'INITIAL_SESSION') {
            handleAuthStateChange(session);
        } else if (event === 'SIGNED_OUT') {
            handleAuthStateChange(null);
        }
    });

    // Fallback: manually exchange hash tokens if onAuthStateChange misses them
    window.addEventListener('DOMContentLoaded', async () => {
        // If URL has access_token in hash, let Supabase exchange it
        if (window.location.hash.includes('access_token')) {
            // exchangeCodeForSession not needed for implicit flow —
            // getSession() after hash presence is enough
            await new Promise(r => setTimeout(r, 300)); // brief wait for Supabase to parse hash
        }
        const { data: { session } } = await sbClient.auth.getSession();
        handleAuthStateChange(session);
        // Clean the hash from URL without reload
        if (window.location.hash) history.replaceState(null, '', window.location.pathname);
    });

    // UI CONTROLS
    function toggleAudio() {
        state.audioEnabled = !state.audioEnabled;
        const btn = document.getElementById('audio-btn');
        const icon = document.getElementById('audio-icon');
        const text = document.getElementById('audio-text');
        if (state.audioEnabled) {
            btn.classList.add('active');
            icon.className = 'fa-solid fa-volume-high';
            text.innerText = "ALERTS ON";
        } else {
            btn.classList.remove('active');
            icon.className = 'fa-solid fa-volume-xmark';
            text.innerText = "ALERTS OFF";
        }
    }

    // DATA FETCH
    async function fetchData(lat, lon, isAuto) {
        const start = performance.now();
        try {
            document.getElementById('link-status').innerHTML = '<span class="status-wait">FETCHING...</span>';
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,precipitation,weather_code,wind_speed_10m&minutely_15=precipitation&timezone=auto`;
            const res = await fetch(url);
            const data = await res.json();
            const ping = Math.round(performance.now() - start);
            updateUI(data.current, data.minutely_15, lat, lon, isAuto, ping);
        } catch (e) {
            console.error("DATA_FETCH_ERR:", e);
            document.getElementById('link-status').innerHTML = '<span class="status-fail">FAILED</span>';
        }
    }

    // UI UPDATE
    function updateUI(current, minutely, lat, lon, isAuto, ping) {
        document.getElementById('link-status').innerHTML = '<span class="status-ok">SECURE</span>';
        document.getElementById('val-ping').innerText = `${ping}ms`;
        document.getElementById('val-update').innerText = new Date().toLocaleTimeString('en-US', { hour12: false });

        document.getElementById('location-badge').innerHTML = isAuto
            ? `<i class="fa-solid fa-location-crosshairs"></i> GPS LOCK [${lat.toFixed(4)}, ${lon.toFixed(4)}]`
            : `<i class="fa-solid fa-thumbtack" style="color:var(--accent-orange)"></i> MANUAL [${lat.toFixed(4)}, ${lon.toFixed(4)}]`;

        document.getElementById('val-temp').innerText = `${current.temperature_2m}°C`;
        document.getElementById('val-wind').innerText = `${current.wind_speed_10m} km/h`;
        document.getElementById('val-rain').innerText = `${current.precipitation} mm`;

        const wmo = current.weather_code;
        let status = 'CLEAR', icon = 'fa-sun', sClass = 'status-clear', desc = 'Conditions Optimal';
        if      (wmo >= 95)              { status = 'STORM';  icon = 'fa-bolt';       sClass = 'status-alert'; desc = 'Severe Weather Alert'; }
        else if (wmo >= 71 && wmo <= 77) { status = 'SNOW';   icon = 'fa-snowflake';  sClass = 'status-rain';  desc = 'Freezing Conditions'; }
        else if (wmo >= 51 && wmo <= 67) { status = 'RAIN';   icon = 'fa-cloud-rain'; sClass = 'status-rain';  desc = 'Precipitation Detected'; }
        else if (wmo >= 1  && wmo <= 3)  { status = 'CLOUDY'; icon = 'fa-cloud';      sClass = 'status-clear'; desc = 'Partial Obscuration'; }

        document.getElementById('status-icon').className = `status-icon fa-solid ${icon} ${sClass}`;
        document.getElementById('status-text').innerText = status;
        document.getElementById('status-text').className = `status-text ${sClass}`;
        document.getElementById('weather-desc').innerText = desc;

        updateChart(minutely.time.slice(0, 8), minutely.precipitation.slice(0, 8));
    }

    // CHART
    function updateChart(times, rainData) {
        const ctx = document.getElementById('rainChart').getContext('2d');
        const labels = times.map(t => new Date(t).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false }));
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels,
                datasets: [{ label: 'Precipitation (mm)', data: rainData, backgroundColor: '#3b82f6', borderRadius: 4 }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94a3b8' } },
                    x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { family: "'JetBrains Mono', monospace", size: 10 } } }
                }
            }
        });
    }

    // MAIN LOOP
    function runApp() {
        if (state.mode === 'manual' && state.coords) {
            fetchData(state.coords.lat, state.coords.lon, false);
            document.getElementById('manual-lat').value = state.coords.lat;
            document.getElementById('manual-lon').value = state.coords.lon;
        } else {
            if ("geolocation" in navigator && !gpsDenied) {
                navigator.geolocation.getCurrentPosition(
                    pos => {
                        gpsDenied = false;
                        fetchData(pos.coords.latitude, pos.coords.longitude, true);
                    },
                    err => {
                        gpsDenied = true;
                        document.getElementById('status-icon').className = "status-icon fa-solid fa-triangle-exclamation status-alert";
                        document.getElementById('status-text').innerText = "ERROR";
                        document.getElementById('status-text').className = "status-text status-alert";
                        document.getElementById('weather-desc').innerText = "GPS blocked. Use Geospatial Targeting below.";
                        document.getElementById('location-badge').innerHTML = `<i class="fa-solid fa-location-crosshairs" style="color:var(--accent-red)"></i> GPS BLOCKED`;
                    },
                    { timeout: 10000, enableHighAccuracy: true }
                );
            }
        }
    }

    // FUNCTIONS
    function setManualLocation() {
        const lat = parseFloat(document.getElementById('manual-lat').value);
        const lon = parseFloat(document.getElementById('manual-lon').value);
        if (lat && lon) {
            state.mode = 'manual';
            state.coords = { lat, lon };
            localStorage.setItem('ms_mode', 'manual');
            localStorage.setItem('ms_coords', JSON.stringify(state.coords));
            gpsDenied = false;
            fetchData(lat, lon, false);
        }
    }

    function resetToAuto() {
        localStorage.removeItem('ms_mode');
        localStorage.removeItem('ms_coords');
        state.mode = 'auto';
        state.coords = null;
        document.getElementById('manual-lat').value = "";
        document.getElementById('manual-lon').value = "";
        gpsDenied = false;
        runApp();
    }
</script>
</body>
</html>
