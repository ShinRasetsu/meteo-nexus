<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeteoNexus | Active Telemetry HUD</title>
    
    <link rel="manifest" id="manifest-placeholder">
    <meta name="theme-color" content="#000000">
    
    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
    
    <!-- Mapping Dependencies (Leaflet & Routing Machine) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <!-- Tailwind CSS Config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        brand: { teal: '#14b8a6', blue: '#3b82f6', purple: '#a855f7', orange: '#f59e0b', red: '#ef4444', success: '#22c55e', warning: '#eab308' },
                        surface: { 900: '#111111', 800: '#1a1a1a', 700: '#2a2a2a' }
                    }
                }
            }
        }
    </script>

    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; background-color: #000000; }
        
        /* High contrast focus rings for glove operation */
        input:focus, button:focus { outline: none; box-shadow: 0 0 0 4px #14b8a6; }
        
        /* Disable text selection on UI elements for touch interfaces */
        .no-select { user-select: none; -webkit-user-select: none; }

        /* Leaflet specific overrides for HUD look */
        .leaflet-routing-container { display: none !important; } /* Hide default text directions */
        .leaflet-control-scale-line { background: rgba(17, 17, 17, 0.9) !important; color: #14b8a6 !important; border: 1px solid #2a2a2a !important; border-top: none !important; text-shadow: none !important; box-shadow: none !important; border-bottom: 2px solid #14b8a6 !important; border-left: 2px solid #14b8a6 !important; border-right: 2px solid #14b8a6 !important; border-radius: 0 0 4px 4px; font-weight: bold; font-family: 'JetBrains Mono', monospace; }
        
        /* Smooth transition for HUD cards */
        .hud-card { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="text-gray-100 font-sans min-h-screen p-2 md:p-6 lg:p-8 selection:bg-brand-teal selection:text-black flex flex-col gap-4 max-w-7xl mx-auto no-select">

    <!-- Header -->
    <header class="flex justify-between items-center py-2 px-2 border-b-4 border-surface-800">
        <h1 class="text-2xl md:text-3xl font-black tracking-tight text-white flex items-center gap-3">
            <i class="fa-solid fa-satellite-dish text-brand-teal text-3xl"></i> 
            METEONEXUS <span class="font-bold text-gray-500 tracking-widest text-sm hidden sm:inline">HUD</span>
        </h1>
        
        <button id="audio-btn" onclick="toggleAudio()" class="flex items-center gap-3 px-6 py-3 rounded-xl border-4 border-surface-700 bg-surface-900 text-sm md:text-base font-bold tracking-widest transition-all">
            <i class="fa-solid fa-volume-xmark text-xl" id="audio-icon"></i> 
            <span id="audio-text" class="hidden sm:block">SONAR OFF</span>
        </button>
    </header>

    <!-- SECTION 1: LOCAL TELEMETRY -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-4">
        
        <!-- Main Status Card -->
        <div id="main-status-card" class="hud-card lg:col-span-5 rounded-2xl p-6 md:p-8 flex flex-col items-center justify-center text-center border-4 border-surface-800 bg-surface-900 min-h-[350px] relative overflow-hidden">
            <div class="absolute top-4 left-4">
                <span class="text-[10px] font-black text-brand-teal tracking-[0.3em] uppercase opacity-60">Local Telemetry</span>
            </div>
            <div class="absolute top-4 right-4 text-right">
                <div id="location-badge" class="text-sm font-bold text-gray-300 flex items-center gap-1.5 justify-end uppercase tracking-widest">
                    <i class="fa-solid fa-circle-notch fa-spin"></i> LOCATING
                </div>
                <div class="text-[10px] font-mono font-bold text-gray-500 mt-1 flex items-center gap-1 justify-end uppercase tracking-widest">
                    <i class="fa-regular fa-clock text-brand-blue opacity-80"></i> 
                    <span id="local-time-text">--:--:--</span>
                </div>
            </div>

            <i id="status-icon" class="text-8xl md:text-9xl mb-4 fa-solid fa-circle-notch fa-spin text-gray-600"></i>
            <span id="status-text" class="text-4xl md:text-6xl font-black tracking-tight text-gray-600 uppercase">WAITING</span>
            <div id="weather-desc" class="mt-4 text-gray-300 font-mono text-sm md:text-lg font-bold bg-black/50 px-6 py-2 rounded-xl border-2 border-surface-700 uppercase">AWAITING SATELLITE</div>
        </div>

        <!-- REFACTORED: Unified Vital Metrics Panel (Grid Removed) -->
        <div class="lg:col-span-7 bg-surface-900 border-4 border-surface-800 rounded-2xl p-6 md:p-8 flex flex-col justify-around gap-6">
            
            <!-- Row 1: Core Temperature & Sync -->
            <div class="flex justify-between items-end border-b-2 border-surface-800 pb-4">
                <div>
                    <span class="text-sm font-bold text-gray-500 uppercase tracking-widest block mb-1">Temperature</span>
                    <div class="flex items-baseline gap-3">
                        <div id="metric-temp" class="font-mono text-6xl md:text-7xl font-black text-white leading-none">--</div>
                        <div class="text-sm font-bold text-gray-500 uppercase">Feels <span id="metric-feels" class="text-gray-300">--</span></div>
                    </div>
                </div>
                <div class="text-right">
                    <span class="text-sm font-bold text-brand-teal uppercase tracking-widest block mb-1">Model Sync</span>
                    <div id="metric-agree" class="font-mono text-5xl md:text-6xl font-black text-brand-teal leading-none">--</div>
                </div>
            </div>

            <!-- Row 2: Wind, Humidity & UV -->
            <div class="flex justify-between items-end border-b-2 border-surface-800 pb-4">
                <div>
                    <span class="text-sm font-bold text-gray-500 uppercase tracking-widest block mb-1">Wind & Humidity</span>
                    <div class="flex items-baseline gap-4">
                        <div class="flex items-baseline gap-1">
                            <span id="metric-wind-speed" class="font-mono text-4xl md:text-5xl font-black text-white leading-none">--</span>
                            <span class="text-xs font-bold text-gray-500 uppercase">km/h</span>
                        </div>
                        <div id="metric-hum" class="font-mono text-3xl md:text-4xl font-black text-brand-blue leading-none">--</div>
                    </div>
                    <div id="metric-wind-dir" class="text-sm font-bold text-brand-blue mt-2 flex items-center gap-2 uppercase tracking-widest">--</div>
                </div>
                <div class="text-right">
                    <span class="text-sm font-bold text-gray-500 uppercase tracking-widest block mb-1">Max UV</span>
                    <div id="metric-uv-val" class="font-mono text-4xl md:text-5xl font-black text-brand-purple leading-none">--</div>
                    <div id="metric-uv-time" class="text-sm font-bold text-gray-500 mt-2 uppercase tracking-widest">--</div>
                </div>
            </div>

            <!-- Row 3: Node Health Server Status -->
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <span class="text-sm font-bold text-gray-500 uppercase tracking-widest">Global Node Health</span>
                <div class="flex flex-wrap gap-2 md:gap-3 font-mono text-sm md:text-base w-full md:w-auto">
                    <div id="stat-eu" class="font-bold px-3 py-1 bg-surface-800 rounded border border-surface-700 flex-1 md:flex-none text-center">EU</div>
                    <div id="stat-us" class="font-bold px-3 py-1 bg-surface-800 rounded border border-surface-700 flex-1 md:flex-none text-center">US</div>
                    <div id="stat-de" class="font-bold px-3 py-1 bg-surface-800 rounded border border-surface-700 flex-1 md:flex-none text-center">DE</div>
                    <div id="stat-jp" class="font-bold px-3 py-1 bg-surface-800 rounded border border-surface-700 flex-1 md:flex-none text-center">JP</div>
                </div>
            </div>

        </div>
    </div>

    <!-- SECTION 2: TACTICAL MAP -->
    <div class="w-full bg-surface-900 border-4 border-surface-800 rounded-2xl p-4 md:p-6 flex flex-col mt-2">
        <div class="mb-4 flex flex-col lg:flex-row lg:items-center justify-between gap-4">
            <div class="flex flex-col sm:flex-row gap-3 items-start sm:items-center">
                <span class="text-sm font-bold uppercase tracking-widest text-gray-500 whitespace-nowrap"><i class="fa-solid fa-crosshairs text-brand-teal"></i> Live Tracking</span>
                <span id="route-status" class="text-sm font-bold text-gray-600 uppercase tracking-widest bg-surface-800 px-4 py-2 rounded-lg border-2 border-surface-700 whitespace-nowrap">STANDBY</span>
            </div>
            
            <div class="flex flex-wrap items-center gap-2">
                <button id="gmaps-paste-btn" onclick="handlePasteAndLoad()" class="bg-surface-800 hover:bg-surface-700 border-2 border-surface-700 text-brand-teal font-bold py-2 px-4 rounded-xl text-sm uppercase tracking-widest transition-all flex items-center gap-2 shadow-sm">
                    <i class="fa-solid fa-bolt"></i> <span>Paste Target</span>
                </button>
                
                <button onclick="resetToAuto()" class="bg-surface-800 hover:bg-surface-700 border-2 border-surface-700 text-white font-bold py-2 px-4 rounded-xl text-sm uppercase tracking-widest transition-all flex items-center gap-2 shadow-sm">
                    <i class="fa-solid fa-xmark"></i> <span>Clear</span>
                </button>
                
                <button id="native-nav-btn" class="hidden text-sm font-bold bg-brand-blue/20 border-2 border-brand-blue text-brand-blue hover:bg-brand-blue hover:text-white px-4 py-2 rounded-xl transition-all uppercase tracking-widest shadow-sm flex items-center gap-2">
                    <i class="fa-solid fa-diamond-turn-right"></i> <span>External Nav</span>
                </button>
            </div>
        </div>
        
        <!-- Map Container Decoupled for 3D Track-Up Rotation -->
        <div class="w-full relative h-[450px] md:h-[600px] rounded-xl border-4 border-surface-700 z-0 bg-[#111111] overflow-hidden">
            <div id="hud-map" class="w-full h-full absolute inset-0 transition-transform duration-500 ease-linear origin-center"></div>
            
            <!-- Tactical View Controls stay outside rotating canvas -->
            <div class="absolute bottom-6 right-6 z-[1000] flex flex-col gap-3 items-center pointer-events-auto">
                <button onclick="toggleTacticalMode()" id="tactical-btn" class="bg-surface-800 border-4 border-brand-teal text-brand-teal w-12 h-12 md:w-14 md:h-14 rounded-full flex items-center justify-center shadow-[0_0_15px_rgba(20,184,166,0.3)] transition-all font-mono" title="Tactical View Control">
                    <span class="text-xs md:text-sm font-black tracking-tighter">200m</span>
                </button>
            </div>
        </div>
    </div>

    <!-- SECTION 3: ROUTE INTELLIGENCE -->
    <div id="route-timeline-card" class="hidden w-full bg-surface-900 border-4 border-surface-800 rounded-2xl p-4 md:p-6 flex flex-col mt-2">
        <div class="mb-4 flex items-center justify-between">
            <span class="text-sm font-bold uppercase tracking-widest text-brand-teal"><i class="fa-solid fa-route mr-2"></i> En-Route Intelligence (Vertical Tactical Stack)</span>
        </div>
        <div id="timeline-container" class="pb-2 no-select">
            <!-- Intercept Nodes injected here -->
        </div>
    </div>

    <!-- SECTION 4: TELEMETRY PLOT -->
    <div class="w-full bg-surface-900 border-4 border-surface-800 rounded-2xl p-4 md:p-6 flex flex-col mt-2 mb-8">
        <div class="mb-4 flex items-center justify-between">
            <span class="text-sm font-bold uppercase tracking-widest text-gray-500">Atmospheric Telemetry Plot</span>
        </div>
        <div class="flex-grow w-full relative h-[350px]">
            <canvas id="mainChart"></canvas>
        </div>
    </div>

    <!-- CORE ENGINE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- CLOUD INIT ---
        let app, auth, db;
        let isCloudActive = false;
        let appId = 'default-app-id';

        try {
            const configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
            if (configStr) {
                const firebaseConfig = JSON.parse(configStr);
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                isCloudActive = true;
            }
        } catch (e) { console.warn("MeteoNexus: Cloud Connection Failed.", e); }

        // --- GLOBAL STATE & CONFIG ---
        const CONFIG = {
            weatherApi: 'https://api.open-meteo.com/v1/forecast',
            reverseGeoApi: 'https://api.bigdatacloud.net/data/reverse-geocode-client',
            sonarThreshold: 75,
            edgeProxy: 'https://gmaps-proxy.strikefreedomnine.workers.dev' 
        };

        const WMO_CODES = {
            0: 'Clear Sky', 1: 'Mainly Clear', 2: 'Partly Cloudy', 3: 'Overcast',
            45: 'Fog', 48: 'Depositing Rime Fog', 51: 'Light Drizzle', 53: 'Moderate Drizzle', 55: 'Dense Drizzle',
            56: 'Light Freezing Drizzle', 57: 'Dense Freezing Drizzle',
            61: 'Slight Rain', 63: 'Moderate Rain', 65: 'Heavy Rain',
            66: 'Light Freezing Rain', 67: 'Heavy Freezing Rain',
            71: 'Slight Snow Fall', 73: 'Moderate Snow Fall', 75: 'Heavy Snow Fall', 77: 'Snow Grains',
            80: 'Slight Rain Showers', 81: 'Moderate Rain Showers', 82: 'Violent Rain Showers',
            85: 'Slight Snow Showers', 86: 'Heavy Snow Showers',
            95: 'Thunderstorm', 96: 'Thunderstorm + Hail', 99: 'Heavy Thunderstorm + Hail'
        };

        const WMO_ICONS = {
            0: 'fa-sun', 1: 'fa-sun', 2: 'fa-cloud-sun', 3: 'fa-cloud',
            45: 'fa-smog', 48: 'fa-smog', 51: 'fa-cloud-rain', 53: 'fa-cloud-rain', 55: 'fa-cloud-showers-heavy',
            56: 'fa-cloud-meatball', 57: 'fa-cloud-meatball',
            61: 'fa-cloud-rain', 63: 'fa-cloud-showers-heavy', 65: 'fa-cloud-showers-water',
            66: 'fa-cloud-meatball', 67: 'fa-cloud-meatball',
            71: 'fa-snowflake', 73: 'fa-snowflake', 75: 'fa-snowflake', 77: 'fa-snowflake',
            80: 'fa-cloud-rain', 81: 'fa-cloud-showers-heavy', 82: 'fa-cloud-showers-water',
            85: 'fa-snowflake', 86: 'fa-snowflake',
            95: 'fa-cloud-bolt', 96: 'fa-cloud-bolt', 99: 'fa-cloud-bolt'
        };

        let state = {
            mode: localStorage.getItem('ms_mode') || 'auto',
            autoCoords: null,
            targetCoords: JSON.parse(localStorage.getItem('ms_targetCoords')) || null,
            coords: JSON.parse(localStorage.getItem('ms_coords')) || {}, 
            isMapLocked: true,  
            lastHudLat: 0,
            lastHudLon: 0,
            cumulativeHeading: 0, // Prevents 360-degree spin-back bug on map rotation
            lastHeading: 0,
            targetTimezone: null, 
            chart: null,
            audioEnabled: false,
            lastPing: 0,
            mapObj: null,
            routeCtrl: null,
            gpsWatchId: null, 
            userMarker: null, 
            interceptMarkers: [], 
            userAuth: null,
            lastIntelFetch: 0, 
            lastCheckpoints: [],
            tacticalMode: 1, // 0: Route View, 1: 200m, 2: 100m, 3: 50m, 4: 20m
            scaleCtrl: null,
            currentRouteCoords: null
        };

        // --- AUTHENTICATION ---
        async function initAuth() {
            if (!isCloudActive) return;
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token).catch(e => signInAnonymously(auth));
            } else {
                await signInAnonymously(auth).catch(console.error);
            }
        }
        
        if (isCloudActive) {
            initAuth();
            onAuthStateChanged(auth, (user) => { state.userAuth = user; });
        }

        // --- WAKE LOCK ---
        let wakeLock = null;
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {
                if (err.name === 'NotAllowedError') {
                    console.warn('MeteoNexus: Screen Wake Lock restricted.');
                }
            }
        }

        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible') { requestWakeLock(); }
        });

        // --- BACKGROUND TRACKING ---
        function startBackgroundTracking() {
            if (state.gpsWatchId) return; 
            const statusEl = document.getElementById('route-status');

            state.gpsWatchId = navigator.geolocation.watchPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    const heading = pos.coords.heading;
                    const speed = pos.coords.speed;
                    state.autoCoords = { lat, lon };

                    if (!state.mapObj) {
                        initMap(lat, lon);
                    } else {
                        // Delta check to avoid unnecessary rapid API calls
                        const distMoved = Math.sqrt(Math.pow(lat - state.lastHudLat, 2) + Math.pow(lon - state.lastHudLon, 2));
                        if (distMoved > 0.002 || state.lastHudLat === 0) {
                            fetchData(lat, lon, false);
                        }
                        
                        // Process heading safely to prevent backwards 360 map spinning
                        const isMoving = heading !== null && !isNaN(heading) && speed > 0.5;
                        if (heading !== null && !isNaN(heading)) {
                            let delta = heading - state.lastHeading;
                            if (delta > 180) delta -= 360;
                            if (delta < -180) delta += 360;
                            state.cumulativeHeading += delta;
                            state.lastHeading = heading;
                        }

                        // Shape-Shifting Marker Logic
                        if (state.userMarker) {
                            state.userMarker.setLatLng([lat, lon]);
                            const markerEl = state.userMarker.getElement();
                            if (markerEl) {
                                const wrapper = markerEl.querySelector('#user-dir-wrapper');
                                const dot = markerEl.querySelector('#user-dot');
                                const arrow = markerEl.querySelector('#user-arrow');
                                
                                if (wrapper && dot && arrow) {
                                    wrapper.style.transform = `rotate(${state.cumulativeHeading}deg)`;
                                    
                                    if (isMoving) {
                                        // Morph to Tracking Chevron
                                        dot.classList.add('opacity-0', 'scale-50');
                                        arrow.classList.remove('opacity-0', 'scale-50');
                                        arrow.classList.add('opacity-100', 'scale-100');
                                    } else {
                                        // Morph to Stationary Dot
                                        dot.classList.remove('opacity-0', 'scale-50');
                                        arrow.classList.remove('opacity-100', 'scale-100');
                                        arrow.classList.add('opacity-0', 'scale-50');
                                    }
                                }
                            }
                        }

                        if (state.targetCoords) {
                            if (!state.routeCtrl) {
                                initRoute();
                                state.lastCheckpoints = [{ lat, lon }]; // Initialize past tracking on route start
                            } else {
                                const waypoints = state.routeCtrl.getWaypoints();
                                if(waypoints.length > 0 && waypoints[0]) {
                                    waypoints[0].latLng = L.latLng(lat, lon);
                                    state.routeCtrl.setWaypoints(waypoints);
                                }
                                // Update past checkpoints memory every 5km
                                if (state.lastCheckpoints.length > 0) {
                                    const lastCp = state.lastCheckpoints[state.lastCheckpoints.length - 1];
                                    const distToLast = L.latLng(lat, lon).distanceTo(L.latLng(lastCp.lat, lastCp.lon));
                                    if (distToLast >= 5000) {
                                        state.lastCheckpoints.push({ lat, lon });
                                        if (state.lastCheckpoints.length > 2) state.lastCheckpoints.shift();
                                    }
                                }
                            }
                        } else {
                            state.lastCheckpoints = []; // Reset if no route
                        }
                        
                        // Map Orientation & Centering Logic
                        if (state.isMapLocked && state.tacticalMode > 0) {
                            const targetZoom = [0, 16, 17, 18, 19][state.tacticalMode];
                            
                            // FIX: Disable animation for smooth rapid live tracking and prevent map jumpiness
                            state.mapObj.setView([lat, lon], targetZoom, { animate: false }); 
                            
                            const mapEl = document.getElementById('hud-map');
                            if (state.tacticalMode === 4) { 
                                // 20m Tactical zoom -> Engage Track-Up Map Rotation
                                // Scale 1.5 prevents black corners from showing when square map is rotated
                                mapEl.style.transform = `scale(1.5) rotate(${-state.cumulativeHeading}deg)`;
                            } else {
                                // Standard North-Up
                                mapEl.style.transform = `scale(1) rotate(0deg)`;
                            }
                            
                            if (!state.targetCoords) {
                                statusEl.innerHTML = `<i class="fa-solid fa-satellite fa-fade mr-2"></i> GPS ACTIVE`;
                                statusEl.className = "text-sm font-bold text-brand-success uppercase tracking-widest bg-brand-success/10 px-4 py-2 rounded-lg border-2 border-brand-success/50";
                            }
                        }
                    }
                },
                (err) => {
                    statusEl.innerText = "GPS SIGNAL LOST";
                    statusEl.className = "text-sm font-bold text-brand-red uppercase tracking-widest bg-brand-red/10 px-4 py-2 rounded-lg border-2 border-brand-red/30";
                },
                { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
            );
        }

        // TACTICAL UI: Master Button Cycler
        window.toggleTacticalMode = function() {
            if (!state.mapObj) return;

            // If map is unlocked (user dragged it), snap back to the current locked mode instead of cycling
            if (!state.isMapLocked) {
                if (state.tacticalMode === 0) state.tacticalMode = 1; // Default to 200m if returning from route overview
                window.applyTacticalMode();
                return;
            }

            // Cycle: 1 (200m) -> 2 (100m) -> 3 (50m) -> 4 (20m) -> 0 (Route Overview) -> 1...
            state.tacticalMode = (state.tacticalMode + 1) % 5;
            window.applyTacticalMode();
        }

        window.applyTacticalMode = function() {
            if (!state.mapObj) return;
            const btn = document.getElementById('tactical-btn');
            const mapEl = document.getElementById('hud-map');
            
            if (state.tacticalMode > 0) {
                // Tracking Mode (Locked)
                state.isMapLocked = true;
                if (state.scaleCtrl) state.scaleCtrl.addTo(state.mapObj);
                
                const targetZoom = [0, 16, 17, 18, 19][state.tacticalMode];
                const scaleLabels = ["", "200m", "100m", "50m", "20m"];
                
                btn.innerHTML = `<span class="text-xs md:text-sm font-black tracking-tighter">${scaleLabels[state.tacticalMode]}</span>`;
                btn.className = "bg-surface-800 border-4 border-brand-teal text-brand-teal w-12 h-12 md:w-14 md:h-14 rounded-full flex items-center justify-center shadow-[0_0_15px_rgba(20,184,166,0.3)] transition-all font-mono";
                
                if (state.tacticalMode === 4) {
                    mapEl.style.transform = `scale(1.5) rotate(${-state.cumulativeHeading}deg)`;
                } else {

                if (state.autoCoords) {
                    state.mapObj.setView([state.autoCoords.lat, state.autoCoords.lon], targetZoom, {animate: false});
                }
            } else {
                // Route Overview Mode (Unlocked)
                state.isMapLocked = false;
                if (state.scaleCtrl) state.scaleCtrl.remove();
                
                mapEl.style.transform = `scale(1) rotate(0deg)`; // Revert to North-Up
                
                btn.innerHTML = `<i class="fa-solid fa-route text-lg md:text-xl"></i>`;
                btn.className = "bg-surface-800 border-4 border-brand-purple text-brand-purple w-12 h-12 md:w-14 md:h-14 rounded-full flex items-center justify-center shadow-[0_0_15px_rgba(168,85,247,0.3)] transition-all font-mono";

                if (state.currentRouteCoords && state.currentRouteCoords.length > 0) {
                    const bounds = L.latLngBounds(state.currentRouteCoords);
                    state.mapObj.fitBounds(bounds, { padding: [50, 50], animate: true });
                } else if (state.autoCoords) {
                    state.mapObj.setView([state.autoCoords.lat, state.autoCoords.lon], 14, {animate: true});

            }

        function initMap(lat = 0, lon = 0) {

                    iconSize: [32, 32]

        function initRoute() {
            if (!state.autoCoords || !state.targetCoords || !state.mapObj) return;
            state.routeCtrl = L.Routing.control({
                waypoints: [ L.latLng(state.autoCoords.lat, state.autoCoords.lon), L.latLng(state.targetCoords.lat, state.targetCoords.lon) ],
                router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1' }),
                lineOptions: { styles: [{ color: '#3b82f6', weight: 6, opacity: 0.9 }] },
                show: false, addWaypoints: false, 
                // FIX: Disabled fitSelectedRoutes to prevent the routing engine from forcefully zooming out the map every single GPS tick
                fitSelectedRoutes: false, 
                createMarker: function(i, wp) {
                    if (i === 0) return null; 
                    return L.marker(wp.latLng, {
                        icon: L.divIcon({
                            className: 'bg-brand-red border-2 border-white rounded-full w-5 h-5 shadow-[0_0_15px_rgba(239,68,68,0.8)] animate-pulse',
                            iconSize: [20, 20]
                        })
                    });
                }
            }).addTo(state.mapObj);
            state.routeCtrl.on('routesfound', updateRouteStatus);
            state.routeCtrl.on('routingerror', handleRouteError);
        }

        // --- MAP MARKER UTILS ---
        function clearInterceptMarkers() {
            if (state.interceptMarkers && state.mapObj) {
                state.interceptMarkers.forEach(marker => state.mapObj.removeLayer(marker));
                state.interceptMarkers = [];
            }
        }

        // --- PASTE & AUTO-LOAD ENGINE ---
        window.handlePasteAndLoad = async function() {
            const statusEl = document.getElementById('route-status');
            const btn = document.getElementById('gmaps-paste-btn');
            
            try {
                const clipText = await navigator.clipboard.readText();
                if (clipText && (clipText.includes('http') || clipText.includes('maps'))) {
                    btn.classList.add('animate-pulse');
                    await processGMapLink(clipText);
                    btn.classList.remove('animate-pulse');
                } else {
                    statusEl.innerText = "NO LINK IN CLIPBOARD";
                    statusEl.className = "text-sm font-bold text-brand-warning uppercase tracking-widest bg-brand-warning/10 px-4 py-2 rounded-lg border-2 border-brand-warning/30";
                }
            } catch (err) {
                console.warn("Clipboard Access Error:", err);
                statusEl.innerText = "CLIPBOARD PERMISSION DENIED";
                statusEl.className = "text-sm font-bold text-brand-red uppercase tracking-widest bg-brand-red/10 px-4 py-2 rounded-lg border-2 border-brand-red/30";
            }
        }

        async function processGMapLink(url) {
            const statusEl = document.getElementById('route-status');
            statusEl.innerText = "DECRYPTING TARGET...";
            statusEl.className = "text-sm font-bold text-brand-blue uppercase tracking-widest bg-brand-blue/10 px-4 py-2 rounded-lg border-2 border-brand-blue/30 animate-pulse";

            try {
                const res = await fetch(`${CONFIG.edgeProxy}?url=${encodeURIComponent(url)}`);
                const payloadData = await res.json();
                if (payloadData.error) throw new Error(payloadData.error);

                let rawUrl = payloadData.url || "";
                try { rawUrl = decodeURIComponent(rawUrl); } catch(e) {}
                let rawHtml = payloadData.html || "";
                try { rawHtml = decodeURIComponent(rawHtml); } catch(e) {}

                let cleanPayload = (rawUrl + " \n" + rawHtml).replace(/%2C/gi, ',').replace(/,\s+/g, ',');
                let cleanUrl = rawUrl.replace(/%2C/gi, ',').replace(/,\s+/g, ',');

                let lat = null, lon = null;
                const num = "([+-]?\\d+(?:\\.\\d+)?)"; 

                let originLat = null, originLon = null;
                const originMatch = cleanUrl.match(new RegExp(`\\/dir\\/${num},${num}\\/`, 'i'));
                if (originMatch) {
                    originLat = parseFloat(originMatch[1]);
                    originLon = parseFloat(originMatch[2]);
                }

                const isValid = (tLat, tLon) => {
                    if (tLat === null || tLon === null || isNaN(tLat) || isNaN(tLon)) return false;
                    if (tLat === 0 && tLon === 0) return false;
                    if (tLat < -90 || tLat > 90 || tLon < -180 || tLon > 180) return false;
                    if (originLat !== null && originLon !== null) {
                        if (Math.abs(tLat - originLat) < 0.0001 && Math.abs(tLon - originLon) < 0.0001) return false; 
                    }
                    return true;
                };

                let candidates = [];
                let destMatch = cleanPayload.match(new RegExp(`destination=${num},${num}`, 'i'));
                if (destMatch) candidates.push({ lat: parseFloat(destMatch[1]), lon: parseFloat(destMatch[2]), priority: 100 });

                const markerMatch = cleanPayload.match(/markers=([^"&>]+)/i);
                if (markerMatch) {
                    const markersList = markerMatch[1].split(/%7C|\|/i);
                    const validCoords = markersList.map(p => {
                        let m = p.match(new RegExp(`^${num},${num}`));
                        return m ? { lat: parseFloat(m[1]), lon: parseFloat(m[2]) } : null;
                    }).filter(c => c !== null);
                    if (validCoords.length > 0) candidates.push({ ...validCoords[validCoords.length - 1], priority: 90 });
                }

                const pbExact = new RegExp(`!([13])d${num}!([24])d${num}`, 'g');
                const pbMatches = [...cleanPayload.matchAll(pbExact)];
                if (pbMatches.length > 0) {
                    let pbCoords = pbMatches.map(m => {
                        if (m[1] === '1') return { lat: parseFloat(m[4]), lon: parseFloat(m[2]) }; 
                        if (m[1] === '3') return { lat: parseFloat(m[2]), lon: parseFloat(m[4]) }; 
                        return null;
                    }).filter(c => c !== null);
                    if (pbCoords.length > 0) candidates.push({ ...pbCoords[pbCoords.length - 1], priority: 80 });
                }

                const fallbacks = [
                    new RegExp(`(?:search|loc)\\/${num},${num}`, 'i'),
                    new RegExp(`(?:query|q)=loc:${num},${num}`, 'i'),
                    new RegExp(`(?:query|q)=${num},${num}`, 'i'),
                    new RegExp(`place\\/.*?\\/@${num},${num}`, 'i'),
                    new RegExp(`ll=${num},${num}`, 'i'),
                    new RegExp(`@${num},${num}`, 'i')
                ];

                let fbPriority = 70;
                for (let rx of fallbacks) {
                    const match = cleanPayload.match(rx);
                    if (match) candidates.push({ lat: parseFloat(match[1]), lon: parseFloat(match[2]), priority: fbPriority });
                    fbPriority--;
                }

                candidates.sort((a, b) => b.priority - a.priority);
                for (let c of candidates) {
                    if (isValid(c.lat, c.lon)) { lat = c.lat; lon = c.lon; break; }
                }

                if (lat === null && originLat !== null && originLon !== null) { lat = originLat; lon = originLon; }

                if (lat !== null && lon !== null) {
                    window.activateLiveNavigation(lat, lon);
                } else {
                    statusEl.innerText = "ERR: PIN NOT FOUND";
                    statusEl.className = "text-sm font-bold text-brand-red uppercase tracking-widest bg-brand-red/10 px-4 py-2 rounded-lg border-2 border-brand-red/30";
                }
            } catch(e) {
                statusEl.innerText = "ERR: DECRYPTION FAILED";
                statusEl.className = "text-sm font-bold text-brand-red uppercase tracking-widest bg-brand-red/10 px-4 py-2 rounded-lg border-2 border-brand-red/30";
                console.error("Payload Extraction Failed:", e);
            }
        }

        window.activateLiveNavigation = function(destLat, destLon) {
            state.targetCoords = { lat: destLat, lon: destLon }; 
            localStorage.setItem('ms_targetCoords', JSON.stringify(state.targetCoords)); 
            
            const statusEl = document.getElementById('route-status');
            const navBtn = document.getElementById('native-nav-btn');
            
            navBtn.classList.remove('hidden');
            navBtn.onclick = () => {
                const originStr = state.autoCoords ? `${state.autoCoords.lat},${state.autoCoords.lon}` : '';
                const url = `https://www.google.com/maps/dir/?api=1&origin=${originStr}&destination=${destLat},${destLon}&travelmode=driving`;
                window.open(url, '_blank');
            };

            if (state.autoCoords) {
                statusEl.innerText = "CALCULATING TACTICAL INTERCEPT...";
                statusEl.className = "text-sm font-bold text-brand-blue uppercase tracking-widest bg-brand-blue/10 px-4 py-2 rounded-lg border-2 border-brand-blue/30 animate-pulse";
                if (!state.routeCtrl) { initRoute(); } 
                else { state.routeCtrl.setWaypoints([ L.latLng(state.autoCoords.lat, state.autoCoords.lon), L.latLng(destLat, destLon) ]); }
            } else {
                statusEl.innerText = "AWAITING SATELLITE LOCK...";
                statusEl.className = "text-sm font-bold text-brand-warning uppercase tracking-widest bg-brand-warning/10 px-4 py-2 rounded-lg border-2 border-brand-warning/30 animate-pulse";
            }
        }

        function updateRouteStatus(e) {
            const route = e.routes[0];
            const summary = route.summary;
            const distKm = (summary.totalDistance / 1000).toFixed(1);
            const timeMin = Math.round((summary.totalTime % 3600) / 60);
            const timeHr = Math.floor(summary.totalTime / 3600);
            let timeStr = timeHr > 0 ? `${timeHr}H ${timeMin}M` : `${timeMin}M`;

            const statusEl = document.getElementById('route-status');
            statusEl.innerHTML = `<i class="fa-solid fa-satellite fa-fade mr-2"></i> INTERCEPT | DIST: ${distKm} KM | ETA: ${timeStr}`;
            statusEl.className = "text-sm font-bold text-brand-success uppercase tracking-widest bg-brand-success/10 px-4 py-2 rounded-lg border-2 border-brand-success/50 shadow-[0_0_15px_rgba(34,197,94,0.2)]";

            // Store route coordinates for the Route View bounding box
            state.currentRouteCoords = route.coordinates;

            // Prevent API spam: Update Intelligence only every 5 minutes (300000ms)
            const now = Date.now();
            if (!state.lastIntelFetch || now - state.lastIntelFetch > 300000) {
                state.lastIntelFetch = now;
                fetchRouteIntelligence(route);
            }
        }

        function handleRouteError() {
            const statusEl = document.getElementById('route-status');
            statusEl.innerText = "ROUTING SERVER UNAVAILABLE";
            statusEl.className = "text-sm font-bold text-brand-red uppercase tracking-widest bg-brand-red/10 px-4 py-2 rounded-lg border-2 border-brand-red/30";
        }

        // --- EN-ROUTE FORECASTING (VERTICAL TACTICAL STACK & FULL MAP) ---
        async function fetchRouteIntelligence(route) {
            const container = document.getElementById('timeline-container');
            document.getElementById('route-timeline-card').classList.remove('hidden');
            
            document.querySelector('#route-timeline-card span').innerHTML = `<i class="fa-solid fa-route mr-2"></i> En-Route Intelligence (Vertical Tactical Stack)`
            
            container.innerHTML = `<div class="w-full text-center py-8 text-gray-500 font-bold uppercase tracking-widest animate-pulse"><i class="fa-solid fa-microchip mr-3"></i> Processing Route Telemetry...</div>`;

            clearInterceptMarkers();

            const totalDistance = route.summary.totalDistance;
            const coords = route.coordinates;
            
            const intervalDist = 5000; // 5KM Intervals
            
            // Calculate ALL future nodes to the end of the route
            const totalFutureNodesCount = Math.floor(totalDistance / intervalDist); 
            const allUpcomingWaypoints = [];
            
            for (let i = 1; i <= totalFutureNodesCount; i++) {
                const targetDist = i * intervalDist;
                if (targetDist > totalDistance) break;
                
                let currentDist = 0;
                let foundPoint = coords[0];

                for (let j = 0; j < coords.length - 1; j++) {
                    const p1 = coords[j];
                    const p2 = coords[j+1];
                    const d = p1.distanceTo(p2);
                    
                    if (currentDist + d >= targetDist) {
                        const ratio = (targetDist - currentDist) / d;
                        foundPoint = L.latLng(
                            p1.lat + (p2.lat - p1.lat) * ratio,
                            p1.lng + (p2.lng - p1.lng) * ratio
                        );
                        break;
                    }
                    currentDist += d;
                }
                
                // Track physical Node Index
                allUpcomingWaypoints.push({ lat: foundPoint.lat, lon: foundPoint.lng, offsetKm: (targetDist / 1000).toFixed(0), nodeIndex: i, type: 'upcoming' });
            }

            // PLOT ENTIRE ROUTE ON MAP
            allUpcomingWaypoints.forEach(wp => {
                const marker = L.marker([wp.lat, wp.lon], {
                    icon: L.divIcon({
                        className: 'bg-transparent',
                        html: `
                            <div class="relative flex items-center justify-center -ml-3 -mt-3">
                                <div class="absolute w-4 h-4 bg-brand-teal rounded-full animate-ping opacity-60"></div>
                                <div class="relative z-10 w-2 h-2 bg-brand-teal rounded-full border border-black shadow-[0_0_8px_rgba(20,184,166,1)]"></div>
                                <div class="absolute top-4 bg-surface-900 border border-brand-teal text-brand-teal text-[10px] font-black px-1.5 py-0.5 rounded shadow-lg whitespace-nowrap opacity-90">N-${wp.nodeIndex}</div>
                            </div>
                        `,
                        iconSize: [0, 0]
                    }),
                    zIndexOffset: 500
                }).addTo(state.mapObj);
                state.interceptMarkers.push(marker);
            });

            // RESTRICT UI STACK & WEATHER API TO CLOSEST 4 NODES
            const upcomingWaypointsStack = allUpcomingWaypoints.slice(0, 4);

            // Reverse the array. Top = Furthest Future.
            upcomingWaypointsStack.reverse();

            // Inject Current Node
            const currentWaypoint = { lat: coords[0].lat, lon: coords[0].lng, offsetKm: 0, type: 'current' };

            // Inject Past Nodes dynamically tracked from GPS memory
            const pastWaypoints = [];
            const reversedPast = [...state.lastCheckpoints].reverse();
            let pastIndex = 1;
            reversedPast.forEach(cp => {
                const dist = L.latLng(coords[0].lat, coords[0].lng).distanceTo(L.latLng(cp.lat, cp.lon));
                if (dist > 1500) { // Only show if we actually drove past it (>1.5KM)
                    pastWaypoints.push({ lat: cp.lat, lon: cp.lon, offsetKm: (dist/1000).toFixed(0), nodeIndex: pastIndex++, type: 'past' });
                }
            });

            // Final Render Array: [Future Stack (Max 4)] -> [Current] -> [Past]
            const waypoints = [...upcomingWaypointsStack, currentWaypoint, ...pastWaypoints];

            if (waypoints.length <= 1) {
                container.innerHTML = `<div class="w-full text-center py-4 text-gray-600 uppercase tracking-widest font-bold">Target Reached In < 5 KM</div>`;
                return;
            }

            try {
                // Batch query WEATHER API - fetching base metrics AND the 4-Model consensus for EVERY tactical node
                const lats = waypoints.map(w => w.lat).join(',');
                const lons = waypoints.map(w => w.lon).join(',');
                
                // Parallel fetch to ensure tactical nodes use the exact same 4-model consensus as the main local telemetry
                const [baseRes, modelRes] = await Promise.all([
                    fetch(`${CONFIG.weatherApi}?latitude=${lats}&longitude=${lons}&current=temperature_2m&hourly=temperature_2m,weather_code,precipitation,uv_index&timezone=auto`),
                    fetch(`${CONFIG.weatherApi}?latitude=${lats}&longitude=${lons}&hourly=precipitation&models=ecmwf_ifs025,gfs_seamless,icon_seamless,jma_seamless&timezone=auto`)
                ]);
                
                const baseData = await baseRes.json();
                const modelData = await modelRes.json();
                
                const weatherPoints = Array.isArray(baseData) ? baseData : [baseData];
                const modelPoints = Array.isArray(modelData) ? modelData : [modelData];
                
                container.innerHTML = '<div class="flex flex-col items-center w-full px-1 md:px-4">';
                
                weatherPoints.forEach((p, idx) => {
                    const wp = waypoints[idx];
                    const m = modelPoints[idx]; // Matching 4-model data
                    
                    // Strict lock to CURRENT hour using API's native local time string to prevent UTC offsets
                    const apiCurrentTime = p.current ? p.current.time.substring(0, 13) : null;
                    let baseNowIndex = apiCurrentTime ? p.hourly.time.findIndex(t => t.startsWith(apiCurrentTime)) : -1;
                    if (baseNowIndex === -1) baseNowIndex = new Date().getHours();
                    const safeIdx = Math.min(baseNowIndex, p.hourly.time.length - 1);
                    
                    // Extract precise intelligence for the current hour at that location
                    const code = p.hourly.weather_code[safeIdx];
                    const icon = WMO_ICONS[code] || 'fa-cloud';
                    const temp = Math.round(p.hourly.temperature_2m[safeIdx]);
                    const prec = p.hourly.precipitation[safeIdx] || 0;
                    const uv = (p.hourly.uv_index[safeIdx] || 0).toFixed(1);
                    
                    // NEW: Calculate Rain Probability using 4-Model Consensus Engine (EU, US, DE, JP)
                    const rEU = m.hourly.precipitation_ecmwf_ifs025[safeIdx] || 0;
                    const rUS = m.hourly.precipitation_gfs_seamless[safeIdx] || 0;
                    const rDE = m.hourly.precipitation_icon_seamless[safeIdx] || 0;
                    const rJP = m.hourly.precipitation_jma_seamless[safeIdx] || 0;
                    
                    let votes = 0;
                    if (rEU > 0.1) votes++;
                    if (rUS > 0.1) votes++;
                    if (rDE > 0.1) votes++;
                    if (rJP > 0.1) votes++;
                    
                    const rainProb = (votes / 4) * 100;
                    
                    // Tactical Classifications (High-Contrast Styling Applied)
                    const isWet = prec > 0 || rainProb > 40;
                    const pathText = isWet ? 'WET TARMAC' : 'DRY TARMAC';
                    const pathColor = isWet ? 'text-brand-blue font-black drop-shadow-md' : 'text-brand-success drop-shadow-md';
                    const pathIcon = isWet ? 'fa-water' : 'fa-road';
                    const uvColor = uv >= 8 ? 'text-brand-red font-black drop-shadow-md' : (uv >= 5 ? 'text-brand-orange drop-shadow-md' : 'text-brand-purple drop-shadow-md');
                    
                    let bgClass = "bg-surface-800";
                    let textClass = "text-gray-400";
                    let iconClass = "text-gray-300";
                    let borderLeft = "border-surface-600";
                    
                    let displayPrimary = "";
                    let displayLabel = "";
                    let titleBadge = "";
                    let glow = "";

                    if (wp.type === 'upcoming') {
                        borderLeft = "border-brand-teal";
                        displayPrimary = `NODE ${wp.nodeIndex}`;
                        displayLabel = `${wp.offsetKm} KM AHEAD`;
                        // Flag the immediate next node visually
                        if (idx === upcomingWaypointsStack.length - 1) {
                            titleBadge = `<span class="bg-brand-teal text-black text-[10px] font-black px-2 py-0.5 rounded-sm uppercase tracking-widest mb-1 self-start">Next Node</span>`;
                            glow = "ring-1 ring-brand-teal/30 shadow-[0_0_20px_rgba(20,184,166,0.15)]";
                        }
                        if (prec > 0.1 || rainProb >= 50) { // Upgraded danger detection
                            bgClass = "bg-brand-red/10";
                            textClass = "text-brand-red";
                            iconClass = "text-brand-red";
                            borderLeft = "border-brand-red";
                        }
                    } else if (wp.type === 'current') {
                        // Current Position gets massive visual priority in the middle of the stack
                        bgClass = "bg-brand-blue/10";
                        borderLeft = "border-brand-blue";
                        titleBadge = `<span class="bg-brand-blue text-black text-[10px] font-black px-2 py-0.5 rounded-sm uppercase tracking-widest mb-1 self-start"><i class="fa-solid fa-crosshairs"></i> Current Pos</span>`;
                        glow = "ring-2 ring-brand-blue shadow-[0_0_25px_rgba(59,130,246,0.25)] scale-[1.02] my-2";
                        iconClass = "text-brand-blue";
                        textClass = "text-brand-blue";
                        displayPrimary = "LIVE";
                        displayLabel = "POSITION";
                    } else if (wp.type === 'past') {
                        // Past gets greyed out
                        bgClass = "bg-surface-900";
                        borderLeft = "border-surface-700";
                        glow = "opacity-60 grayscale";
                        displayPrimary = `NODE ${wp.nodeIndex} PAST`;
                        displayLabel = `${wp.offsetKm} KM BEHIND`;
                    }

                    // REFACTORED: Density Optimization - Larger text packed into smaller padding footprint
                    container.innerHTML += `
                        <div class="w-full ${bgClass} border-l-[8px] ${borderLeft} rounded-r-2xl shadow-2xl transition-all ${glow} z-10 p-3 md:p-4 flex flex-col lg:flex-row items-center justify-between gap-2 md:gap-4 overflow-hidden my-1">
                            
                            <!-- TOP/LEFT BLOCK: Core Metrics & Spatial Identification -->
                            <div class="flex items-center justify-between w-full lg:w-auto gap-3">
                                <div class="flex items-center gap-3 shrink-0">
                                    <div class="w-16 h-16 md:w-20 md:h-20 rounded-full bg-surface-900 flex items-center justify-center border-2 border-surface-700 shrink-0 shadow-inner">
                                        <i class="fa-solid ${icon} ${iconClass} text-3xl md:text-4xl"></i>
                                    </div>
                                    <div class="flex flex-col text-left">
                                        ${titleBadge}
                                        <div class="flex items-baseline gap-2 mt-1">
                                            <span class="text-4xl md:text-5xl font-black text-white font-mono leading-none">${temp}°</span>
                                            <span class="text-base md:text-xl font-black ${textClass} uppercase tracking-tighter">
                                                ${prec > 0 ? `<i class="fa-solid fa-droplet"></i> ${prec}mm` : 'CLEAR'}
                                            </span>
                                        </div>
                                    </div>
                                </div>
                                
                                <!-- Mobile Spatial Navigation (Right aligned on mobile) -->
                                <div class="text-right flex flex-col items-end justify-center lg:hidden shrink-0">
                                     <span class="text-2xl md:text-3xl font-black uppercase tracking-widest text-white whitespace-nowrap">${displayPrimary}</span>
                                     <span class="text-sm font-black uppercase tracking-widest text-gray-300">${displayLabel}</span>
                                </div>
                            </div>
                            
                            <!-- BOTTOM/MIDDLE BLOCK: Advanced Telemetry -->
                            <div class="w-full lg:w-auto flex-1 flex items-center justify-between lg:justify-center gap-4 lg:gap-8 text-base md:text-xl font-mono font-black uppercase tracking-widest pt-2 lg:pt-0 border-t border-surface-700/30 lg:border-none mt-1 lg:mt-0">
                                 <span class="${pathColor} flex items-center gap-2"><i class="fa-solid ${pathIcon} text-xl md:text-2xl opacity-90"></i> <span class="hidden sm:inline">${isWet ? 'WET TARMAC' : 'DRY TARMAC'}</span><span class="sm:hidden">${isWet ? 'WET' : 'DRY'}</span></span>
                                 <span class="${rainProb >= 40 ? 'text-brand-blue font-black drop-shadow-md' : 'text-white drop-shadow-md'} flex items-center gap-2"><i class="fa-solid fa-cloud-rain text-xl md:text-2xl opacity-90"></i> ${Math.round(rainProb)}%</span>
                                 <span class="${uvColor} flex items-center gap-2"><i class="fa-solid fa-sun text-xl md:text-2xl opacity-90"></i> UV ${uv}</span>
                            </div>

                            <!-- RIGHT BLOCK: Desktop Spatial Navigation -->
                            <div class="hidden lg:flex text-right flex-col items-end justify-center w-auto shrink-0">
                                 <span class="text-3xl font-black uppercase tracking-widest text-white whitespace-nowrap">${displayPrimary}</span>
                                 <span class="text-base font-black uppercase tracking-widest text-gray-300">${displayLabel}</span>
                            </div>
                            
                        </div>
                    `;

                    // Inject vertical timeline connector lines
                    if (idx < weatherPoints.length - 1) {
                        let lineCol = wp.type === 'upcoming' ? 'bg-brand-teal/50' : 'bg-surface-600';
                        if (wp.type === 'current') lineCol = 'bg-brand-blue/50';
                        container.innerHTML += `<div class="w-2 h-6 ${lineCol} -my-1 z-0 rounded-full shadow-[0_0_10px_rgba(0,0,0,0.5)]"></div>`;
                    }
                });
                
                container.innerHTML += '</div>';

            } catch (err) {
                container.innerHTML = `<div class="w-full text-center text-brand-red font-bold uppercase tracking-widest py-4">Intelligence Data Fetch Failed</div>`;
            }
        }

        // --- CLOCK CONTROLLER ---
        setInterval(() => {
            if (!state.targetTimezone) return;
            try {
                document.getElementById('local-time-text').innerText = new Date().toLocaleTimeString('en-US', {
                    timeZone: state.targetTimezone, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
                });
            } catch(e) {}
        }, 1000);

        function getWindDirection(deg) {
            const arr = ["N", "NNE", "NE", "ENE", "E", "ESE", "SE", "SSE", "S", "SSW", "SW", "WSW", "W", "WNW", "NW", "NNW"];
            return arr[Math.floor((deg / 22.5) + 0.5) % 16];
        }

        // --- AUDIO ENGINE ---
        window.toggleAudio = function() {
            state.audioEnabled = !state.audioEnabled;
            const btn = document.getElementById('audio-btn');
            const icon = document.getElementById('audio-icon');
            const txt = document.getElementById('audio-text');
            if (state.audioEnabled) {
                btn.className = 'flex items-center gap-3 px-6 py-3 rounded-xl border-4 border-brand-red bg-brand-red/20 text-brand-red text-sm md:text-base font-bold tracking-widest transition-all';
                icon.className = 'fa-solid fa-volume-high fa-beat-fade text-xl';
                txt.innerText = "SONAR ACTIVE";
                new (window.AudioContext || window.webkitAudioContext)().resume().then(() => playSonarPing());
            } else {
                btn.className = 'flex items-center gap-3 px-6 py-3 rounded-xl border-4 border-surface-700 bg-surface-900 text-gray-100 text-sm md:text-base font-bold tracking-widest transition-all';
                icon.className = 'fa-solid fa-volume-xmark text-xl';
                txt.innerText = "SONAR OFF";
            }
        }

        function playSonarPing() {
            if (!state.audioEnabled) return;
            if (Date.now() - state.lastPing < 60000) return; 
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator(); const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.frequency.setValueAtTime(1200, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.2);
            gain.gain.setValueAtTime(0, ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
            osc.start(); osc.stop(ctx.currentTime + 0.6);
            state.lastPing = Date.now();
        }

        // --- CHARTING ENGINE ---
        function renderChart(labels, rainData, solarData, uvData, hourlyAgreement) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (state.chart) state.chart.destroy();
            const tc = tailwind.config.theme.extend.colors;
            state.chart = new Chart(ctx, {
                data: {
                    labels: labels,
                    datasets: [
                        { type: 'bar', label: 'Solar (W/m²)', data: solarData, backgroundColor: tc.brand.orange + '40', borderColor: tc.brand.orange, borderWidth: 2, categoryPercentage: 0.6, barPercentage: 0.8, order: 3, yAxisID: 'y_solar', grouped: true },
                        { type: 'bar', label: 'UV Index', data: uvData, backgroundColor: tc.brand.purple + '40', borderColor: tc.brand.purple, borderWidth: 2, categoryPercentage: 0.6, barPercentage: 0.8, order: 2, yAxisID: 'y_uv', grouped: true },
                        { type: 'line', label: 'ECMWF', data: rainData.eu, borderColor: tc.brand.blue, backgroundColor: tc.brand.blue + '33', fill: true, borderWidth: 3, tension: 0.3, pointRadius: 0, order: 1, yAxisID: 'y_rain' },
                        { type: 'line', label: 'GFS', data: rainData.us, borderColor: tc.brand.teal, backgroundColor: tc.brand.teal + '33', fill: true, borderDash: [6,6], borderWidth: 3, tension: 0.3, pointRadius: 0, order: 1, yAxisID: 'y_rain' },
                        { type: 'line', label: 'ICON', data: rainData.de, borderColor: tc.brand.warning, borderWidth: 2, borderDash: [4,4], tension: 0.3, pointRadius: 0, order: 1, yAxisID: 'y_rain' },
                        { type: 'line', label: 'JMA', data: rainData.jp, borderColor: '#ec4899', borderWidth: 2, tension: 0.3, pointRadius: 0, order: 1, yAxisID: 'y_rain' }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: { 
                        legend: { display: true, labels: { color: '#9ca3af', font: {family: 'Inter', weight: 'bold', size: 12}, boxWidth: 16, usePointStyle: true }, position: 'bottom' },
                        tooltip: { backgroundColor: '#000', titleColor: '#fff', bodyColor: '#d1d5db', borderColor: '#333', borderWidth: 2, padding: 16, 
                            callbacks: {
                                label: function(c) { let l = c.dataset.label + ': ' || ''; if(c.parsed.y !== null) { l += c.parsed.y.toFixed(1); if(c.dataset.yAxisID==='y_solar') l+=' W/m²'; else if(c.dataset.yAxisID==='y_uv') l+=' Index'; else l+=' mm'; } return l; },
                                footer: function(t) { const i = t[0].dataIndex; return `\nRain Model Agreement: ${hourlyAgreement[i].toFixed(0)}%\nPeak UV: ${uvData[i].toFixed(1)} | Solar: ${solarData[i].toFixed(0)}W`; }
                            }, titleFont: { family: 'JetBrains Mono', size: 14, weight: 'bold' }, bodyFont: { family: 'JetBrains Mono', size: 12 }, footerFont: { family: 'JetBrains Mono', size: 12, weight: 'bold' }, footerColor: tc.brand.teal
                        }
                    }, 
                    scales: {
                        x: { grid: { display: false }, ticks: { color: '#6b7280', maxTicksLimit: 12, font: {family: 'JetBrains Mono', size: 11, weight: 'bold'} } },
                        y_rain: { type: 'linear', display: true, position: 'left', title: { display: true, text: 'Precipitation (mm)', color: '#6b7280', font: {family:'Inter', size: 12, weight: 'bold'} }, grid: { color: '#2a2a2a' }, ticks: {color: '#9ca3af', font: {family: 'JetBrains Mono', size: 11, weight: 'bold'}}, suggestedMax: 2 },
                        y_solar: { type: 'linear', display: true, position: 'right', title: { display: true, text: 'Solar Irradiance', color: tc.brand.orange, font: {family:'Inter', size: 12, weight: 'bold'} }, grid: { drawOnChartArea: false }, ticks: {color: tc.brand.orange, font: {family: 'JetBrains Mono', size: 11, weight: 'bold'}}, suggestedMax: 1000 },
                        y_uv: { type: 'linear', display: false, min: 0, max: 15 }
                    }
                }
            });
        }

        // --- LOCAL DATA FETCHING ---
        async function fetchData(lat, lon, skipReverseGeo = false) {
            state.lastHudLat = lat; state.lastHudLon = lon;
            
            if (!skipReverseGeo) {
                fetch(`${CONFIG.reverseGeoApi}?latitude=${lat}&longitude=${lon}&localityLanguage=en`)
                    .then(r => r.json())
                    .then(d => {
                        const city = d.city || d.locality || d.principalSubdivision || 'Unknown';
                        document.getElementById('location-badge').innerHTML = `<i class="fa-solid fa-location-dot"></i> ${city}`;
                    }).catch(() => {});
            }
            try {
                const [rCurr, rFore, rSolar] = await Promise.all([
                    fetch(`${CONFIG.weatherApi}?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,is_day&timezone=auto`),
                    fetch(`${CONFIG.weatherApi}?latitude=${lat}&longitude=${lon}&hourly=precipitation&models=ecmwf_ifs025,gfs_seamless,icon_seamless,jma_seamless&forecast_days=2&timezone=auto`),
                    fetch(`${CONFIG.weatherApi}?latitude=${lat}&longitude=${lon}&hourly=shortwave_radiation,uv_index&forecast_days=2&timezone=auto`)
                ]);
                const dCurr = await rCurr.json(); const dFore = await rFore.json(); const dSolar = await rSolar.json();
                if (dCurr.timezone) state.targetTimezone = dCurr.timezone;
                const curr = dCurr.current; const h = dFore.hourly; const hSol = dSolar.hourly;
                let nowIndex = h.time.findIndex(t => t.startsWith(curr.time.substring(0, 13)));
                if (nowIndex === -1) nowIndex = new Date().getHours();
                const clean = (arr) => arr.map(v => v === null ? 0 : v);
                const rEU = h.precipitation_ecmwf_ifs025; const rUS = h.precipitation_gfs_seamless;
                const rDE = h.precipitation_icon_seamless; const rJP = h.precipitation_jma_seamless;
                
                // REFACTORED: Updated padding on status badges to match new unified panel design
                ['eu','us','de','jp'].forEach((id, idx) => {
                    const el = document.getElementById(`stat-${id}`);
                    const arr = [rEU, rUS, rDE, rJP][idx];
                    if(!arr || arr.every(v=>v===null)) { el.className="font-bold px-3 py-1 bg-brand-red border border-brand-red text-black rounded flex-1 md:flex-none text-center uppercase tracking-widest"; el.innerHTML = `<i class="fa-solid fa-triangle-exclamation mr-1"></i> ${id.toUpperCase()}`; }
                    else { el.className="font-bold px-3 py-1 bg-brand-success/20 border border-brand-success/50 text-brand-success rounded flex-1 md:flex-none text-center uppercase tracking-widest"; el.innerHTML = id.toUpperCase(); }
                });

                const rainData = { eu: clean(rEU.slice(nowIndex, nowIndex + 24)), us: clean(rUS.slice(nowIndex, nowIndex + 24)), de: clean(rDE.slice(nowIndex, nowIndex + 24)), jp: clean(rJP.slice(nowIndex, nowIndex + 24)) };
                const uvData = hSol.uv_index.slice(nowIndex, nowIndex + 24).map(v => v === null ? 0 : v);
                const solarData = clean(hSol.shortwave_radiation.slice(nowIndex, nowIndex + 24));
                const times = h.time.slice(nowIndex, nowIndex + 24).map(t => { let s = t.slice(11, 16); return s === "00:00" ? "00:00 (+1d)" : s; });
                
                const hourlyAgreement = [];
                for (let i = 0; i < 24; i++) {
                    let v = 0; if(rainData.eu[i]>0.1)v++; if(rainData.us[i]>0.1)v++; if(rainData.de[i]>0.1)v++; if(rainData.jp[i]>0.1)v++;
                    hourlyAgreement.push((v/4)*100);
                }
                const currentAgreement = hourlyAgreement[0] || 0;
                let currentVotes = (currentAgreement / 100) * 4;
                let incomingRain = false; for (let i=1; i<=3; i++) { if (hourlyAgreement[i] >= 75) { incomingRain = true; break; } }

                document.getElementById('metric-temp').innerText = Math.round(curr.temperature_2m) + '°';
                document.getElementById('metric-feels').innerText = Math.round(curr.apparent_temperature) + '°';
                document.getElementById('metric-hum').innerText = curr.relative_humidity_2m + '%';
                document.getElementById('metric-agree').innerText = `${currentAgreement.toFixed(0)}%`;
                document.getElementById('metric-wind-speed').innerText = Math.round(curr.wind_speed_10m);
                document.getElementById('metric-wind-dir').innerHTML = `${getWindDirection(curr.wind_direction_10m)} <i class="fa-solid fa-arrow-up" style="transform: rotate(${curr.wind_direction_10m}deg);"></i>`;
                const maxUV = Math.max(...uvData);
                document.getElementById('metric-uv-val').innerText = maxUV.toFixed(1);
                document.getElementById('metric-uv-time').innerText = "@ " + times[uvData.indexOf(maxUV)].replace(" (+1d)", "");
                document.getElementById('weather-desc').innerText = WMO_CODES[curr.weather_code] || `Code: ${curr.weather_code}`;

                const mainCard = document.getElementById('main-status-card'); const icon = document.getElementById('status-icon'); const text = document.getElementById('status-text');
                let bIcon = WMO_ICONS[curr.weather_code] || 'fa-circle-notch fa-spin'; if (curr.is_day === 0) { bIcon = bIcon.replace('sun', 'moon'); }
                mainCard.className = "lg:col-span-5 rounded-2xl p-6 md:p-8 flex flex-col items-center justify-center text-center transition-colors duration-500 border-4 min-h-[350px] relative overflow-hidden ";
                
                if (currentVotes >= 3) { 
                    mainCard.classList.add('bg-brand-red/20', 'border-brand-red'); icon.className = `text-8xl md:text-9xl mb-4 fa-solid fa-cloud-showers-heavy text-brand-red`; text.className = 'text-4xl md:text-6xl font-black tracking-tight text-brand-red uppercase'; text.innerText = "RAIN LIKELY";
                    if (currentAgreement >= CONFIG.sonarThreshold) playSonarPing();
                } else if (incomingRain) {
                    mainCard.classList.add('bg-brand-warning/20', 'border-brand-warning'); icon.className = `text-8xl md:text-9xl mb-4 fa-solid fa-cloud-showers-heavy text-brand-warning`; text.className = 'text-4xl md:text-6xl font-black tracking-tight text-brand-warning uppercase'; text.innerText = "INCOMING RAIN (1-3H)";
                } else if (currentVotes >= 1) {
                    mainCard.classList.add('bg-brand-warning/10', 'border-brand-warning/50'); icon.className = `text-8xl md:text-9xl mb-4 fa-solid fa-cloud-sun-rain text-brand-warning`; text.className = 'text-4xl md:text-6xl font-black tracking-tight text-brand-warning uppercase'; text.innerText = "RAIN POSSIBLE";
                } else {
                    mainCard.classList.add('bg-brand-success/10', 'border-brand-success/50'); icon.className = `text-8xl md:text-9xl mb-4 fa-solid ${bIcon} text-brand-success`; text.className = 'text-4xl md:text-6xl font-black tracking-tight text-brand-success uppercase'; text.innerText = "STABLE";
                }
                
                renderChart(times, rainData, solarData, uvData, hourlyAgreement);
            } catch (e) { console.error(e); }
        }

        window.resetToAuto = function() {
            if (state.routeCtrl && state.mapObj) { state.mapObj.removeControl(state.routeCtrl); state.routeCtrl = null; }
            state.targetCoords = null; 
            localStorage.removeItem('ms_targetCoords'); 
            clearInterceptMarkers(); // Wipe markers on reset
            state.lastIntelFetch = 0; // Reset throttle
            state.lastCheckpoints = []; // Reset tracked past history
            state.currentRouteCoords = null; // Clear cached full bounds
            
            document.getElementById('route-status').innerHTML = `<i class="fa-solid fa-satellite fa-fade mr-2"></i> GPS ACTIVE`;
            document.getElementById('route-status').className = "text-sm font-bold text-brand-success uppercase tracking-widest bg-brand-success/10 px-4 py-2 rounded-lg border-2 border-brand-success/50";
            document.getElementById('native-nav-btn').classList.add('hidden');
            document.getElementById('route-timeline-card').classList.add('hidden');
            localStorage.removeItem('ms_mode'); state.mode = 'auto'; 
            
            // Re-engage GPS Lock
            state.tacticalMode = 1;
            window.applyTacticalMode();
            
            runApp();
        }

        // --- CORE RUN LOOP ---
        function runApp() {
            requestWakeLock();
            startBackgroundTracking();
            
            if (state.mode === 'manual' && state.coords && state.coords.lat) {
                initMap(state.coords.lat, state.coords.lon); 
                fetchData(state.coords.lat, state.coords.lon, false); 
            } else if (state.autoCoords) {
                initMap(state.autoCoords.lat, state.autoCoords.lon); 
                if (state.isMapLocked) {
                    window.applyTacticalMode();
                }
                fetchData(state.autoCoords.lat, state.autoCoords.lon, false);
            } else if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(p => { 
                    state.autoCoords = { lat: p.coords.latitude, lon: p.coords.longitude };
                    initMap(p.coords.latitude, p.coords.longitude); 
                    fetchData(p.coords.latitude, p.coords.longitude, false); 
                }, () => {
                    document.getElementById('main-status-card').className = "lg:col-span-5 rounded-2xl p-6 md:p-8 flex flex-col items-center justify-center text-center border-4 border-brand-orange/50 bg-brand-orange/10 min-h-[350px] relative overflow-hidden";
                    document.getElementById('status-icon').className = 'text-8xl md:text-9xl mb-4 fa-solid fa-map-location-dot text-brand-orange';
                    document.getElementById('status-text').innerText = "SEARCH LOCATION";
                    document.getElementById('status-text').className = "text-4xl md:text-5xl font-black tracking-tight text-brand-orange uppercase";
                    document.getElementById('weather-desc').innerText = "GPS BLOCKED.";
                    document.getElementById('location-badge').innerHTML = `<i class="fa-solid fa-location-crosshairs text-brand-red"></i> GPS BLOCKED`;
                }, { timeout: 10000, enableHighAccuracy: true });
            }
        }

        if (state.targetCoords) { window.activateLiveNavigation(state.targetCoords.lat, state.targetCoords.lon); }
        
        runApp(); 

        // RESTORED: Fixed the interval to fetch data safely using cached coordinates without prompting GPS again.
        setInterval(() => { 
            if (state.autoCoords) { 
                fetchData(state.autoCoords.lat, state.autoCoords.lon, true); 
            } 
        }, 60000); 

    </script>
</body>
