<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeteoNexus | Active Telemetry HUD</title>
    
    <link rel="manifest" id="manifest-placeholder">
    <meta name="theme-color" content="#000000">
    
    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
    
    <!-- Mapping Dependencies (Leaflet & Routing Machine) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <!-- Tailwind CSS Config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        brand: { teal: '#14b8a6', blue: '#3b82f6', purple: '#a855f7', orange: '#f59e0b', red: '#ef4444', success: '#22c55e', warning: '#eab308' },
                        surface: { 900: '#111111', 800: '#1a1a1a', 700: '#2a2a2a' }
                    }
                }
            }
        }
    </script>

    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; background-color: #000000; }
        .no-select { user-select: none; -webkit-user-select: none; }
        .leaflet-routing-container { display: none !important; }
        
        /* Smooth transition for HUD cards */
        .hud-card { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="text-gray-100 font-sans min-h-screen p-2 md:p-6 lg:p-8 selection:bg-brand-teal selection:text-black flex flex-col gap-4 max-w-7xl mx-auto no-select">

    <!-- Header -->
    <header class="flex justify-between items-center py-2 px-2 border-b-4 border-surface-800">
        <h1 class="text-2xl md:text-3xl font-black tracking-tight text-white flex items-center gap-3">
            <i class="fa-solid fa-satellite-dish text-brand-teal text-3xl"></i> 
            METEONEXUS <span class="font-bold text-gray-500 tracking-widest text-sm hidden sm:inline">HUD</span>
        </h1>
        
        <button id="audio-btn" onclick="toggleAudio()" class="flex items-center gap-3 px-6 py-3 rounded-xl border-4 border-surface-700 bg-surface-900 text-sm md:text-base font-bold tracking-widest transition-all">
            <i class="fa-solid fa-volume-xmark text-xl" id="audio-icon"></i> 
            <span id="audio-text" class="hidden sm:block">SONAR OFF</span>
        </button>
    </header>

    <!-- SECTION 1: LOCAL TELEMETRY -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-4">
        <!-- Main Status Card -->
        <div id="main-status-card" class="hud-card lg:col-span-5 rounded-2xl p-6 md:p-8 flex flex-col items-center justify-center text-center border-4 border-surface-800 bg-surface-900 min-h-[350px] relative overflow-hidden">
            <div class="absolute top-4 left-4">
                <span class="text-[10px] font-black text-brand-teal tracking-[0.3em] uppercase opacity-60">Local Telemetry</span>
            </div>
            <div class="absolute top-4 right-4 text-right">
                <div id="location-badge" class="text-sm font-bold text-gray-300 flex items-center gap-1.5 justify-end uppercase tracking-widest">
                    <i class="fa-solid fa-circle-notch fa-spin"></i> LOCATING
                </div>
                <div class="text-[10px] font-mono font-bold text-gray-500 mt-1 flex items-center gap-1 justify-end uppercase tracking-widest">
                    <i class="fa-regular fa-clock text-brand-blue opacity-80"></i> 
                    <span id="local-time-text">--:--:--</span>
                </div>
            </div>

            <i id="status-icon" class="text-8xl md:text-9xl mb-4 fa-solid fa-circle-notch fa-spin text-gray-600"></i>
            <span id="status-text" class="text-4xl md:text-6xl font-black tracking-tight text-gray-600 uppercase">WAITING</span>
            <div id="weather-desc" class="mt-4 text-gray-300 font-mono text-sm md:text-lg font-bold bg-black/50 px-6 py-2 rounded-xl border-2 border-surface-700 uppercase">AWAITING SATELLITE</div>
        </div>

        <!-- Vital Metrics Grid -->
        <div class="lg:col-span-7 grid grid-cols-2 md:grid-cols-3 gap-4">
            <div class="bg-surface-900 border-4 border-surface-800 rounded-2xl p-4 flex flex-col justify-center items-center text-center">
                <span class="text-sm font-bold text-gray-500 uppercase tracking-widest block mb-1">Temp</span>
                <div id="metric-temp" class="font-mono text-5xl md:text-6xl font-black text-white">--</div>
                <div class="text-xs font-bold text-gray-500 mt-2 tracking-widest uppercase">Feels <span id="metric-feels" class="text-gray-300">--</span></div>
            </div>
            <div class="bg-surface-900 border-4 border-surface-800 rounded-2xl p-4 flex flex-col justify-center items-center text-center">
                <span class="text-sm font-bold text-gray-500 uppercase tracking-widest block mb-1">Wind (km/h)</span>
                <div id="metric-wind-speed" class="font-mono text-5xl md:text-6xl font-black text-white">--</div>
                <div id="metric-wind-dir" class="text-sm font-bold text-brand-blue mt-2 flex items-center gap-2 justify-center tracking-widest uppercase">--</div>
            </div>
            <div class="bg-brand-teal/10 border-4 border-brand-teal/30 rounded-2xl p-4 flex flex-col justify-center items-center text-center">
                <span class="text-sm font-bold text-brand-teal uppercase tracking-widest block mb-1">Model Sync</span>
                <div id="metric-agree" class="font-mono text-5xl md:text-6xl font-black text-brand-teal">--</div>
            </div>
            <div class="bg-surface-900 border-4 border-surface-800 rounded-2xl p-4 flex flex-col justify-center items-center text-center">
                <span class="text-sm font-bold text-gray-500 uppercase tracking-widest block mb-1">Humidity</span>
                <div id="metric-hum" class="font-mono text-4xl md:text-5xl font-black text-white">--</div>
            </div>
            <div class="bg-surface-900 border-4 border-surface-800 rounded-2xl p-4 flex flex-col justify-center items-center text-center">
                <span class="text-sm font-bold text-gray-500 uppercase tracking-widest block mb-1">Max UV</span>
                <div id="metric-uv-val" class="font-mono text-4xl md:text-5xl font-black text-brand-purple">--</div>
                <div id="metric-uv-time" class="text-sm font-bold text-gray-500 mt-2 tracking-widest uppercase">--</div>
            </div>
            <div class="bg-surface-900 border-4 border-surface-800 rounded-2xl p-4 flex flex-col justify-center">
                <span class="text-sm font-bold text-gray-500 uppercase tracking-widest block mb-3 text-center">Node Health</span>
                <div class="grid grid-cols-2 gap-2 text-center font-mono text-xs">
                    <div id="stat-eu" class="font-bold py-1 bg-surface-800 rounded border border-surface-700">EU</div>
                    <div id="stat-us" class="font-bold py-1 bg-surface-800 rounded border border-surface-700">US</div>
                    <div id="stat-de" class="font-bold py-1 bg-surface-800 rounded border border-surface-700">DE</div>
                    <div id="stat-jp" class="font-bold py-1 bg-surface-800 rounded border border-surface-700">JP</div>
                </div>
            </div>
        </div>
    </div>

    <!-- SECTION 2: TACTICAL MAP -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-4 mt-2">
        <div class="lg:col-span-12 bg-surface-900 border-4 border-surface-800 rounded-2xl p-4 md:p-6 flex flex-col">
            <div class="mb-4 flex flex-col lg:flex-row lg:items-center justify-between gap-4">
                <div class="flex flex-col sm:flex-row gap-3 items-start sm:items-center">
                    <span class="text-sm font-bold uppercase tracking-widest text-gray-500 whitespace-nowrap"><i class="fa-solid fa-crosshairs text-brand-teal"></i> Live Tracking</span>
                    <span id="route-status" class="text-sm font-bold text-gray-600 uppercase tracking-widest bg-surface-800 px-4 py-2 rounded-lg border-2 border-surface-700 whitespace-nowrap">STANDBY</span>
                </div>
                <div class="flex flex-wrap items-center gap-2">
                    <button id="gmaps-paste-btn" onclick="handlePasteAndLoad()" class="bg-surface-800 hover:bg-surface-700 border-2 border-surface-700 text-brand-teal font-bold py-2 px-4 rounded-xl text-sm uppercase tracking-widest transition-all flex items-center gap-2 shadow-sm">
                        <i class="fa-solid fa-bolt"></i> <span>Paste Target</span>
                    </button>
                    <button onclick="resetToAuto()" class="bg-surface-800 hover:bg-surface-700 border-2 border-surface-700 text-white font-bold py-2 px-4 rounded-xl text-sm uppercase tracking-widest transition-all flex items-center gap-2 shadow-sm">
                        <i class="fa-solid fa-xmark"></i> <span>Clear</span>
                    </button>
                    <button id="native-nav-btn" class="hidden text-sm font-bold bg-brand-blue/20 border-2 border-brand-blue text-brand-blue hover:bg-brand-blue hover:text-white px-4 py-2 rounded-xl transition-all uppercase tracking-widest shadow-sm flex items-center gap-2">
                        <i class="fa-solid fa-diamond-turn-right"></i> <span>External Nav</span>
                    </button>
                </div>
            </div>
            <div id="hud-map" class="w-full relative h-[450px] md:h-[600px] rounded-xl border-4 border-surface-700 z-0 bg-[#111111] overflow-hidden">
                <button onclick="toggleMapLock()" id="map-lock-btn" class="absolute bottom-6 right-6 z-[1000] bg-surface-800 border-4 border-brand-teal text-brand-teal p-3 md:p-4 rounded-full shadow-[0_0_15px_rgba(20,184,166,0.3)] hover:bg-brand-teal hover:text-black transition-all group">
                    <i class="fa-solid fa-location-crosshairs text-xl md:text-2xl group-hover:scale-110 transition-transform"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- SECTION 3: ROUTE INTELLIGENCE -->
    <div id="route-timeline-card" class="hidden lg:col-span-12 bg-surface-900 border-4 border-surface-800 rounded-2xl p-4 md:p-6 flex flex-col mt-2">
        <div class="mb-4 flex items-center justify-between">
            <span class="text-sm font-black uppercase tracking-[0.2em] text-brand-teal"><i class="fa-solid fa-route mr-2"></i> Route Intelligence (Future Path)</span>
        </div>
        <div id="timeline-container" class="flex overflow-x-auto gap-4 pb-4 no-select scroll-smooth"></div>
    </div>

    <!-- SECTION 4: TELEMETRY PLOT -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-4 mt-2 mb-8">
        <div class="lg:col-span-12 bg-surface-900 border-4 border-surface-800 rounded-2xl p-4 md:p-6 flex flex-col">
            <div class="mb-4 flex items-center justify-between">
                <span class="text-sm font-bold uppercase tracking-widest text-gray-500">Atmospheric Telemetry Plot (Local)</span>
            </div>
            <div class="flex-grow w-full relative h-[350px]">
                <canvas id="mainChart"></canvas>
            </div>
        </div>
    </div>

    <!-- CORE ENGINE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- CLOUD INIT ---
        let app, auth, db, isCloudActive = false;
        try {
            const configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
            if (configStr) {
                const firebaseConfig = JSON.parse(configStr);
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                isCloudActive = true;
            }
        } catch (e) { console.warn("Cloud components operating in Local-Only mode."); }

        // --- GLOBAL CONFIGS ---
        const CONFIG = {
            weatherApi: 'https://api.open-meteo.com/v1/forecast',
            reverseGeoApi: 'https://api.bigdatacloud.net/data/reverse-geocode-client',
            sonarThreshold: 75,
            edgeProxy: 'https://gmaps-proxy.strikefreedomnine.workers.dev' 
        };

        const WMO_CODES = { 0: 'Clear Sky', 1: 'Mainly Clear', 2: 'Partly Cloudy', 3: 'Overcast', 45: 'Fog', 48: 'Depositing Rime Fog', 51: 'Light Drizzle', 53: 'Moderate Drizzle', 55: 'Dense Drizzle', 56: 'Light Freezing Drizzle', 57: 'Dense Freezing Drizzle', 61: 'Slight Rain', 63: 'Moderate Rain', 65: 'Heavy Rain', 66: 'Light Freezing Rain', 67: 'Heavy Freezing Rain', 71: 'Slight Snow Fall', 73: 'Moderate Snow Fall', 75: 'Heavy Snow Fall', 77: 'Snow Grains', 80: 'Slight Rain Showers', 81: 'Moderate Rain Showers', 82: 'Violent Rain Showers', 85: 'Slight Snow Showers', 86: 'Heavy Snow Showers', 95: 'Thunderstorm', 96: 'Thunderstorm + Hail', 99: 'Heavy Thunderstorm + Hail' };
        const WMO_ICONS = { 0: 'fa-sun', 1: 'fa-sun', 2: 'fa-cloud-sun', 3: 'fa-cloud', 45: 'fa-smog', 48: 'fa-smog', 51: 'fa-cloud-rain', 53: 'fa-cloud-rain', 55: 'fa-cloud-showers-heavy', 56: 'fa-cloud-meatball', 57: 'fa-cloud-meatball', 61: 'fa-cloud-rain', 63: 'fa-cloud-showers-heavy', 65: 'fa-cloud-showers-water', 66: 'fa-cloud-meatball', 67: 'fa-cloud-meatball', 71: 'fa-snowflake', 73: 'fa-snowflake', 75: 'fa-snowflake', 77: 'fa-snowflake', 80: 'fa-cloud-rain', 81: 'fa-cloud-showers-heavy', 82: 'fa-cloud-showers-water', 85: 'fa-snowflake', 86: 'fa-snowflake', 95: 'fa-cloud-bolt', 96: 'fa-cloud-bolt', 99: 'fa-cloud-bolt' };

        let state = {
            autoCoords: null,
            targetCoords: JSON.parse(localStorage.getItem('ms_targetCoords')) || null, 
            isMapLocked: true, lastHudLat: 0, lastHudLon: 0,
            targetTimezone: null, chart: null, audioEnabled: false, lastPing: 0,
            mapObj: null, routeCtrl: null, gpsWatchId: null, userMarker: null
        };

        // --- AUTH & PERSISTENCE ---
        async function initAuth() {
            if (!isCloudActive) return;
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) { await signInWithCustomToken(auth, __initial_auth_token).catch(() => signInAnonymously(auth)); } 
            else { await signInAnonymously(auth).catch(console.error); }
        }
        if (isCloudActive) { initAuth(); onAuthStateChanged(auth, (user) => {}); }

        let wakeLock = null;
        async function requestWakeLock() {
            try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
        }
        document.addEventListener('visibilitychange', () => { if (wakeLock !== null && document.visibilityState === 'visible') requestWakeLock(); });

        // --- TELEMETRY TRACKING ---
        function startBackgroundTracking() {
            if (state.gpsWatchId) return;
            const statusEl = document.getElementById('route-status');
            state.gpsWatchId = navigator.geolocation.watchPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    state.autoCoords = { lat, lon };

                    // Refresh local HUD if moved more than ~200m
                    const distMoved = Math.sqrt(Math.pow(lat - state.lastHudLat, 2) + Math.pow(lon - state.lastHudLon, 2));
                    if (distMoved > 0.002 || state.lastHudLat === 0) {
                        fetchData(lat, lon);
                    }

                    if (!state.mapObj) { initMap(lat, lon); } 
                    else {
                        if (state.userMarker) {
                            state.userMarker.setLatLng([lat, lon]);
                            const markerEl = state.userMarker.getElement();
                            if (markerEl) {
                                const wrapper = markerEl.querySelector('#user-dir-wrapper');
                                const icon = markerEl.querySelector('#user-dir-icon');
                                if (pos.coords.heading !== null && pos.coords.speed > 0.5) {
                                    wrapper.style.transform = `rotate(${pos.coords.heading}deg)`;
                                    icon.classList.replace('opacity-0', 'opacity-100');
                                } else { icon.classList.replace('opacity-100', 'opacity-0'); }
                            }
                        }
                        if (state.targetCoords) {
                            if (!state.routeCtrl) initRoute();
                            else {
                                const wps = state.routeCtrl.getWaypoints();
                                if (wps[0]) { wps[0].latLng = L.latLng(lat, lon); state.routeCtrl.setWaypoints(wps); }
                            }
                        }
                        if (state.isMapLocked) {
                            state.mapObj.panTo([lat, lon], { animate: true, duration: 1 });
                            if (!state.targetCoords) {
                                statusEl.innerHTML = `<i class="fa-solid fa-satellite fa-fade mr-2"></i> GPS ACTIVE`;
                                statusEl.className = "text-sm font-bold text-brand-success uppercase tracking-widest bg-brand-success/10 px-4 py-2 rounded-lg border-2 border-brand-success/50";
                            }
                        }
                    }
                },
                (err) => { statusEl.innerText = "GPS SIGNAL LOST"; statusEl.className = "text-sm font-bold text-brand-red uppercase tracking-widest bg-brand-red/10 px-4 py-2 rounded-lg border-2 border-brand-red/30"; },
                { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
            );
        }

        window.toggleMapLock = function() {
            state.isMapLocked = true;
            document.getElementById('map-lock-btn').classList.add('border-brand-teal', 'text-brand-teal');
            if (state.autoCoords && state.mapObj) state.mapObj.setView([state.autoCoords.lat, state.autoCoords.lon], 16, {animate: true});
        };

        function initMap(lat, lon) {
            state.mapObj = L.map('hud-map', {zoomControl: false}).setView([lat, lon], 14);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '© OSM' }).addTo(state.mapObj);
            state.mapObj.on('dragstart', () => {
                state.isMapLocked = false;
                document.getElementById('map-lock-btn').classList.remove('border-brand-teal', 'text-brand-teal');
            });
            state.userMarker = L.marker([lat, lon], {
                icon: L.divIcon({ className: 'bg-transparent', html: `<div id="user-dir-wrapper" class="relative flex items-center justify-center w-6 h-6 transition-transform duration-500 ease-linear"><div class="absolute bg-brand-success border-2 border-white rounded-full w-5 h-5 shadow-[0_0_15px_rgba(34,197,94,0.8)] z-10 flex items-center justify-center"><i id="user-dir-icon" class="fa-solid fa-location-arrow text-[10px] text-black -rotate-45 opacity-0"></i></div></div>`, iconSize: [24, 24] }),
                zIndexOffset: 1000
            }).addTo(state.mapObj);
        }

        function initRoute() {
            if (!state.autoCoords || !state.targetCoords) return;
            state.routeCtrl = L.Routing.control({
                waypoints: [ L.latLng(state.autoCoords.lat, state.autoCoords.lon), L.latLng(state.targetCoords.lat, state.targetCoords.lon) ],
                router: L.Routing.osrmv1({ serviceUrl: 'https://router.project-osrm.org/route/v1' }),
                lineOptions: { styles: [{ color: '#3b82f6', weight: 6, opacity: 0.9 }] },
                show: false, createMarker: (i, wp) => i === 0 ? null : L.marker(wp.latLng, { icon: L.divIcon({ className: 'bg-brand-red border-2 border-white rounded-full w-5 h-5 shadow-[0_0_15px_rgba(239,68,68,0.8)] animate-pulse', iconSize: [20, 20] }) })
            }).addTo(state.mapObj);
            state.routeCtrl.on('routesfound', (e) => {
                const route = e.routes[0];
                const distKm = (route.summary.totalDistance / 1000).toFixed(1);
                const timeStr = route.summary.totalTime > 3600 ? Math.floor(route.summary.totalTime/3600)+"H "+Math.round((route.summary.totalTime%3600)/60)+"M" : Math.round(route.summary.totalTime/60)+"M";
                document.getElementById('route-status').innerHTML = `<i class="fa-solid fa-satellite fa-fade mr-2"></i> INTERCEPT | DIST: ${distKm} KM | ETA: ${timeStr}`;
                document.getElementById('route-status').className = "text-sm font-bold text-brand-success uppercase tracking-widest bg-brand-success/10 px-4 py-2 rounded-lg border-2 border-brand-success/50";
                
                // Trigger 10-min Route Intelligence Update
                fetchRouteIntelligence(route);
            });
        }

        // --- LINK DECRYPTION ---
        window.handlePasteAndLoad = async function() {
            const btn = document.getElementById('gmaps-paste-btn');
            try {
                const text = await navigator.clipboard.readText();
                if (text.includes('http') || text.includes('maps')) {
                    btn.classList.add('animate-pulse');
                    await processGMapLink(text);
                    btn.classList.remove('animate-pulse');
                }
            } catch (err) {}
        };

        async function processGMapLink(url) {
            const statusEl = document.getElementById('route-status');
            statusEl.innerText = "DECRYPTING TARGET...";
            try {
                const res = await fetch(`${CONFIG.edgeProxy}?url=${encodeURIComponent(url)}`);
                const data = await res.json();
                let cleanUrl = decodeURIComponent(data.url || "");
                const num = "([+-]?\\d+(?:\\.\\d+)?)";
                let match = cleanUrl.match(new RegExp(`destination=${num},${num}`, 'i')) || cleanUrl.match(new RegExp(`@${num},${num}`, 'i'));
                if (match) {
                    state.targetCoords = { lat: parseFloat(match[1]), lon: parseFloat(match[2]) };
                    localStorage.setItem('ms_targetCoords', JSON.stringify(state.targetCoords));
                    window.activateLiveNavigation(state.targetCoords.lat, state.targetCoords.lon);
                }
            } catch (e) { console.error(e); }
        }

        window.activateLiveNavigation = function(lat, lon) {
            document.getElementById('native-nav-btn').classList.remove('hidden');
            document.getElementById('native-nav-btn').onclick = () => window.open(`https://www.google.com/maps/dir/?api=1&origin=${state.autoCoords?.lat},${state.autoCoords?.lon}&destination=${lat},${lon}`, '_blank');
            if (state.autoCoords) {
                if (!state.routeCtrl) initRoute();
                else state.routeCtrl.setWaypoints([ L.latLng(state.autoCoords.lat, state.autoCoords.lon), L.latLng(lat, lon) ]);
            }
        };

        // --- EN-ROUTE FORECASTING (10-Min Intervals) ---
        async function fetchRouteIntelligence(route) {
            const container = document.getElementById('timeline-container');
            document.getElementById('route-timeline-card').classList.remove('hidden');
            container.innerHTML = `<div class="w-full text-center py-8 text-gray-500 animate-pulse uppercase tracking-widest font-black">Scanning Path...</div>`;
            const interval = 600; // 600 seconds = 10 minutes
            const waypoints = [];
            
            // Generate up to 6 nodes (max 60 mins ahead) based on current route path
            for (let i = 1; i <= 6; i++) {
                const targetTime = i * interval;
                if (targetTime > route.summary.totalTime) break;
                
                const targetDist = (targetTime / route.summary.totalTime) * route.summary.totalDistance;
                let curD = 0, p = route.coordinates[0];
                for (let j = 0; j < route.coordinates.length - 1; j++) {
                    const d = route.coordinates[j].distanceTo(route.coordinates[j+1]);
                    if (curD + d >= targetDist) {
                        const r = (targetDist - curD) / d;
                        p = L.latLng(
                            route.coordinates[j].lat + (route.coordinates[j+1].lat - route.coordinates[j].lat) * r, 
                            route.coordinates[j].lng + (route.coordinates[j+1].lng - route.coordinates[j].lng) * r
                        );
                        break;
                    } 
                    curD += d;
                }
                waypoints.push({ lat: p.lat, lon: p.lng, offset: i * 10 });
            }
            
            if (waypoints.length === 0) {
                container.innerHTML = `<div class="w-full text-center py-4 text-gray-600 uppercase tracking-widest font-bold">Target Reached In < 10 Mins</div>`;
                return;
            }

            try {
                // Batch query all waypoints in a single network request
                const res = await fetch(`${CONFIG.weatherApi}?latitude=${waypoints.map(w=>w.lat).join(',')}&longitude=${waypoints.map(w=>w.lon).join(',')}&current=temperature_2m,weather_code,precipitation&timezone=auto`);
                const data = await res.json();
                const weather = Array.isArray(data) ? data : [data];
                
                container.innerHTML = weather.map((p, i) => `
                    <div class="flex-shrink-0 w-36 ${p.current.precipitation > 0.1 ? 'bg-brand-red/10 border-brand-red/40' : 'bg-surface-800 border-surface-700'} border-2 rounded-xl p-4 flex flex-col items-center text-center">
                        <span class="text-[10px] font-black uppercase tracking-widest text-gray-500 mb-2">+${waypoints[i].offset}m Intercept</span>
                        <i class="fa-solid ${WMO_ICONS[p.current.weather_code]} ${p.current.precipitation > 0.1 ? 'text-brand-red' : 'text-white'} text-3xl mb-3"></i>
                        <div class="text-2xl font-black text-white font-mono">${Math.round(p.current.temperature_2m)}°</div>
                        <div class="mt-2 text-[10px] font-bold ${p.current.precipitation > 0.1 ? 'text-brand-red' : 'text-gray-400'} uppercase">${p.current.precipitation > 0 ? p.current.precipitation+'mm' : 'Dry Path'}</div>
                    </div>
                `).join('');
            } catch (e) { 
                container.innerHTML = `<div class="w-full text-center py-4 text-brand-red uppercase tracking-widest font-bold">Telemetry Sync Failed</div>`; 
            }
        }

        // --- LOCAL DATA FETCHING ---
        async function fetchData(lat, lon) {
            state.lastHudLat = lat; state.lastHudLon = lon;
            
            fetch(`${CONFIG.reverseGeoApi}?latitude=${lat}&longitude=${lon}`).then(r => r.json()).then(d => {
                document.getElementById('location-badge').innerHTML = `<i class="fa-solid fa-location-dot"></i> ${d.city || d.locality || 'Unknown'} <span class="ml-2 text-[8px] opacity-40">SYNCED</span>`;
            });
            
            try {
                const [rC, rF, rS] = await Promise.all([
                    fetch(`${CONFIG.weatherApi}?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,is_day&timezone=auto`),
                    fetch(`${CONFIG.weatherApi}?latitude=${lat}&longitude=${lon}&hourly=precipitation&models=ecmwf_ifs025,gfs_seamless,icon_seamless,jma_seamless&forecast_days=2&timezone=auto`),
                    fetch(`${CONFIG.weatherApi}?latitude=${lat}&longitude=${lon}&hourly=shortwave_radiation,uv_index&forecast_days=2&timezone=auto`)
                ]);
                
                const dC = await rC.json(), dF = await rF.json(), dS = await rS.json();
                const curr = dC.current, hF = dF.hourly, hS = dS.hourly;
                state.targetTimezone = dC.timezone;
                
                document.getElementById('metric-temp').innerText = Math.round(curr.temperature_2m) + '°';
                document.getElementById('metric-feels').innerText = Math.round(curr.apparent_temperature) + '°';
                document.getElementById('metric-hum').innerText = curr.relative_humidity_2m + '%';
                document.getElementById('metric-wind-speed').innerText = Math.round(curr.wind_speed_10m);
                document.getElementById('metric-wind-dir').innerHTML = `${getWindDirection(curr.wind_direction_10m)} <i class="fa-solid fa-arrow-up" style="transform: rotate(${curr.wind_direction_10m}deg);"></i>`;
                
                let ni = hF.time.findIndex(t => t.startsWith(curr.time.substring(0, 13)));
                if(ni < 0) ni = 0;

                const clean = (arr) => arr.map(v => v === null ? 0 : v);
                const rain = { 
                    eu: clean(hF.precipitation_ecmwf_ifs025.slice(ni, ni+24)), 
                    us: clean(hF.precipitation_gfs_seamless.slice(ni, ni+24)), 
                    de: clean(hF.precipitation_icon_seamless.slice(ni, ni+24)), 
                    jp: clean(hF.precipitation_jma_seamless.slice(ni, ni+24)) 
                };
                
                const uv = clean(hS.uv_index.slice(ni, ni+24));
                const sol = clean(hS.shortwave_radiation.slice(ni, ni+24));
                const times = hF.time.slice(ni, ni+24).map(t => { let s = t.slice(11, 16); return s === "00:00" ? "00:00 (+1d)" : s; });

                // RESTORED: Full 24-hour hourly agreement mapping
                const hourlyAgreement = [];
                for (let i = 0; i < 24; i++) {
                    let v = 0; 
                    if(rain.eu[i] > 0.1) v++; 
                    if(rain.us[i] > 0.1) v++; 
                    if(rain.de[i] > 0.1) v++; 
                    if(rain.jp[i] > 0.1) v++;
                    hourlyAgreement.push((v/4)*100);
                }

                const currentAgreement = hourlyAgreement[0] || 0;
                let currentVotes = (currentAgreement / 100) * 4;
                
                // RESTORED: Predictive 1-3 Hour Rain Warning Loop
                let incomingRain = false; 
                for (let i = 1; i <= 3; i++) { 
                    if (hourlyAgreement[i] >= 75) { incomingRain = true; break; } 
                }

                document.getElementById('metric-agree').innerText = `${currentAgreement.toFixed(0)}%`;
                
                const maxUV = Math.max(...uv);
                document.getElementById('metric-uv-val').innerText = maxUV.toFixed(1);
                document.getElementById('metric-uv-time').innerText = "@ " + times[uv.indexOf(maxUV)].replace(" (+1d)", "");

                ['eu','us','de','jp'].forEach((id, idx) => {
                    const el = document.getElementById(`stat-${id}`);
                    const arr = [hF.precipitation_ecmwf_ifs025, hF.precipitation_gfs_seamless, hF.precipitation_icon_seamless, hF.precipitation_jma_seamless][idx];
                    if(!arr || arr.every(v=>v===null)) { 
                        el.className="font-bold py-1 bg-brand-red border-brand-red text-black rounded"; 
                    } else { 
                        el.className="font-bold py-1 bg-brand-success/20 border-brand-success/50 text-brand-success rounded"; 
                    }
                });

                const card = document.getElementById('main-status-card'), icon = document.getElementById('status-icon'), txt = document.getElementById('status-text');
                const bIcon = WMO_ICONS[curr.weather_code] || 'fa-sun';
                card.className = "hud-card lg:col-span-5 rounded-2xl p-6 md:p-8 flex flex-col items-center justify-center text-center border-4 min-h-[350px] relative overflow-hidden ";
                
                if (currentVotes >= 3) { 
                    card.classList.add('bg-brand-red/20', 'border-brand-red'); 
                    icon.className = "text-8xl md:text-9xl mb-4 fa-solid fa-cloud-showers-heavy text-brand-red"; 
                    txt.innerText = "RAIN LIKELY"; 
                    if (currentAgreement >= CONFIG.sonarThreshold) playSonarPing(); 
                } else if (incomingRain) {
                    // RESTORED: UI feedback for incoming short-term rain
                    card.classList.add('bg-brand-warning/20', 'border-brand-warning'); 
                    icon.className = `text-8xl md:text-9xl mb-4 fa-solid fa-cloud-showers-heavy text-brand-warning`; 
                    txt.className = 'text-4xl md:text-6xl font-black tracking-tight text-brand-warning uppercase'; 
                    txt.innerText = "INCOMING RAIN (1-3H)";
                } else if (currentVotes >= 1) { 
                    card.classList.add('bg-brand-warning/10', 'border-brand-warning/50'); 
                    icon.className = "text-8xl md:text-9xl mb-4 fa-solid fa-cloud-sun-rain text-brand-warning"; 
                    txt.innerText = "RAIN POSSIBLE"; 
                } else { 
                    card.classList.add('bg-brand-success/10', 'border-brand-success/50'); 
                    icon.className = `text-8xl md:text-9xl mb-4 fa-solid ${curr.is_day?bIcon:bIcon.replace('sun','moon')} text-brand-success`; 
                    txt.innerText = "STABLE"; 
                }
                
                document.getElementById('weather-desc').innerText = WMO_CODES[curr.weather_code] || 'Unknown';
                
                // Pass hourlyAgreement to renderChart for advanced tooltips
                renderChart(times, rain, sol, uv, hourlyAgreement);
            } catch (e) { console.error(e); }
        }

        // --- AUDIO ENGINE ---
        window.toggleAudio = function() {
            state.audioEnabled = !state.audioEnabled;
            const b = document.getElementById('audio-btn'), i = document.getElementById('audio-icon'), t = document.getElementById('audio-text');
            if (state.audioEnabled) { 
                b.classList.replace('bg-surface-900', 'bg-brand-red/20');
                b.classList.replace('border-surface-700', 'border-brand-red');
                b.classList.replace('text-gray-100', 'text-brand-red');
                i.className = 'fa-solid fa-volume-high fa-beat-fade text-xl'; 
                t.innerText = "SONAR ACTIVE"; 
                const ac = new (window.AudioContext || window.webkitAudioContext)();
                ac.resume();
            } else { 
                b.classList.replace('bg-brand-red/20', 'bg-surface-900');
                b.classList.replace('border-brand-red', 'border-surface-700');
                b.classList.replace('text-brand-red', 'text-gray-100');
                i.className = 'fa-solid fa-volume-xmark text-xl'; 
                t.innerText = "SONAR OFF"; 
            }
        };

        function playSonarPing() {
            if (!state.audioEnabled || Date.now() - state.lastPing < 60000) return; 
            const ac = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ac.createOscillator();
            const gain = ac.createGain();
            osc.connect(gain); gain.connect(ac.destination);
            osc.frequency.setValueAtTime(1200, ac.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, ac.currentTime + 0.2);
            gain.gain.setValueAtTime(0, ac.currentTime);
            gain.gain.linearRampToValueAtTime(0.5, ac.currentTime + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.01, ac.currentTime + 0.5);
            osc.start(); osc.stop(ac.currentTime + 0.6);
            state.lastPing = Date.now();
        }

        // --- CHARTING ENGINE ---
        function renderChart(labels, rain, solar, uv, hourlyAgreement) {
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (state.chart) state.chart.destroy();
            const colors = tailwind.config.theme.extend.colors;
            
            state.chart = new Chart(ctx, {
                data: {
                    labels: labels,
                    datasets: [
                        { type: 'bar', label: 'Solar (W/m²)', data: solar, backgroundColor: colors.brand.orange + '40', borderColor: colors.brand.orange, borderWidth: 2, categoryPercentage: 0.6, barPercentage: 0.8, order: 3, yAxisID: 'y_solar' },
                        { type: 'bar', label: 'UV Index', data: uv, backgroundColor: colors.brand.purple + '40', borderColor: colors.brand.purple, borderWidth: 2, categoryPercentage: 0.6, barPercentage: 0.8, order: 2, yAxisID: 'y_uv' },
                        { type: 'line', label: 'ECMWF', data: rain.eu, borderColor: colors.brand.blue, backgroundColor: colors.brand.blue + '33', fill: true, borderWidth: 3, tension: 0.3, pointRadius: 0, order: 1, yAxisID: 'y_rain' },
                        { type: 'line', label: 'GFS', data: rain.us, borderColor: colors.brand.teal, backgroundColor: colors.brand.teal + '33', fill: true, borderDash: [6,6], borderWidth: 3, tension: 0.3, pointRadius: 0, order: 1, yAxisID: 'y_rain' },
                        { type: 'line', label: 'ICON', data: rain.de, borderColor: colors.brand.warning, borderWidth: 2, borderDash: [4,4], tension: 0.3, pointRadius: 0, order: 1, yAxisID: 'y_rain' },
                        { type: 'line', label: 'JMA', data: rain.jp, borderColor: '#ec4899', borderWidth: 2, tension: 0.3, pointRadius: 0, order: 1, yAxisID: 'y_rain' }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    plugins: { 
                        legend: { display: true, labels: { color: '#9ca3af', font: {family: 'Inter', weight: 'bold', size: 12} }, position: 'bottom' },
                        // RESTORED: Advanced Chart Tooltips combining Model Sync, UV, and Solar output on hover
                        tooltip: { backgroundColor: '#000', titleColor: '#fff', bodyColor: '#d1d5db', borderColor: '#333', borderWidth: 2, padding: 16, 
                            callbacks: {
                                label: function(c) { let l = c.dataset.label + ': ' || ''; if(c.parsed.y !== null) { l += c.parsed.y.toFixed(1); if(c.dataset.yAxisID==='y_solar') l+=' W/m²'; else if(c.dataset.yAxisID==='y_uv') l+=' Index'; else l+=' mm'; } return l; },
                                footer: function(t) { const i = t[0].dataIndex; return `\nRain Model Agreement: ${hourlyAgreement[i].toFixed(0)}%\nPeak UV: ${uv[i].toFixed(1)} | Solar: ${solar[i].toFixed(0)}W`; }
                            }, titleFont: { family: 'JetBrains Mono', size: 14, weight: 'bold' }, bodyFont: { family: 'JetBrains Mono', size: 12 }, footerFont: { family: 'JetBrains Mono', size: 12, weight: 'bold' }, footerColor: colors.brand.teal
                        }
                    }, 
                    scales: {
                        x: { grid: { display: false }, ticks: { color: '#6b7280', maxTicksLimit: 12 } },
                        y_rain: { type: 'linear', display: true, position: 'left', title: { display: true, text: 'Precipitation (mm)', color: '#6b7280' }, grid: { color: '#2a2a2a' }, suggestedMax: 2 },
                        y_solar: { type: 'linear', display: true, position: 'right', title: { display: true, text: 'Solar', color: colors.brand.orange }, grid: { drawOnChartArea: false }, suggestedMax: 1000 },
                        y_uv: { type: 'linear', display: false, min: 0, max: 15 }
                    }
                }
            });
        }

        // --- SYSTEM LOOP & UTILS ---
        function resetToAuto() {
            if (state.routeCtrl) state.mapObj.removeControl(state.routeCtrl);
            state.targetCoords = null; state.routeCtrl = null;
            localStorage.removeItem('ms_targetCoords'); toggleMapLock();
            document.getElementById('route-status').innerHTML = `<i class="fa-solid fa-satellite fa-fade mr-2"></i> GPS ACTIVE`;
            document.getElementById('route-status').className = "text-sm font-bold text-brand-success uppercase tracking-widest bg-brand-success/10 px-4 py-2 rounded-lg border-2 border-brand-success/50";
            document.getElementById('route-timeline-card').classList.add('hidden');
            document.getElementById('native-nav-btn').classList.add('hidden');
            if(state.autoCoords) fetchData(state.autoCoords.lat, state.autoCoords.lon);
        }

        function getWindDirection(deg) {
            const arr = ["N", "NNE", "NE", "ENE", "E", "ESE", "SE", "SSE", "S", "SSW", "SW", "WSW", "W", "WNW", "NW", "NNW"];
            return arr[Math.floor((deg / 22.5) + 0.5) % 16];
        }

        function runApp() {
            requestWakeLock(); startBackgroundTracking();
            setInterval(() => { if (state.autoCoords) fetchData(state.autoCoords.lat, state.autoCoords.lon); }, 60000);
        }

        setInterval(() => {
            if (!state.targetTimezone) return;
            try {
                document.getElementById('local-time-text').innerText = new Date().toLocaleTimeString('en-US', {
                    timeZone: state.targetTimezone, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
                });
            } catch(e){}
        }, 1000);

        if (state.targetCoords) { window.activateLiveNavigation(state.targetCoords.lat, state.targetCoords.lon); }
        runApp();
    </script>
</body>
