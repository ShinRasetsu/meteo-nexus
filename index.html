<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeteoNexus | Active Telemetry HUD</title>
    
    <link rel="manifest" id="manifest-placeholder">
    <meta name="theme-color" content="#000000">
    
    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
    
    <!-- Mapping Dependencies (Leaflet & Routing Machine) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <!-- Tailwind CSS Config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        brand: { teal: '#14b8a6', blue: '#3b82f6', purple: '#a855f7', orange: '#f59e0b', red: '#ef4444', success: '#22c55e', warning: '#eab308' },
                        surface: { 900: '#111111', 800: '#1a1a1a', 700: '#2a2a2a' }
                    }
                }
            }
        }
    </script>

    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; background-color: #000000; }
        
        /* High contrast focus rings for glove operation */
        input:focus, button:focus { outline: none; box-shadow: 0 0 0 4px #14b8a6; }
        
        /* Disable text selection on UI elements for touch interfaces */
        .no-select { user-select: none; -webkit-user-select: none; }

        /* Leaflet specific overrides for HUD look */
        .leaflet-routing-container { display: none !important; } /* Hide default text directions */
    </style>
</head>
<body class="text-gray-100 font-sans min-h-screen p-2 md:p-6 lg:p-8 selection:bg-brand-teal selection:text-black flex flex-col gap-4 max-w-7xl mx-auto no-select">

    <!-- Header -->
    <header class="flex justify-between items-center py-2 px-2 border-b-4 border-surface-800">
        <h1 class="text-2xl md:text-3xl font-black tracking-tight text-white flex items-center gap-3">
            <i class="fa-solid fa-satellite-dish text-brand-teal text-3xl"></i> 
            METEONEXUS <span class="font-bold text-gray-500 tracking-widest text-sm hidden sm:inline">HUD</span>
        </h1>
        
        <button id="audio-btn" onclick="toggleAudio()" class="flex items-center gap-3 px-6 py-3 rounded-xl border-4 border-surface-700 bg-surface-900 text-sm md:text-base font-bold tracking-widest transition-all">
            <i class="fa-solid fa-volume-xmark text-xl" id="audio-icon"></i> 
            <span id="audio-text" class="hidden sm:block">SONAR OFF</span>
        </button>
    </header>

    <!-- Top HUD Grid (Critical Glance Data) -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-4">
        
        <!-- Primary State Banner -->
        <div id="main-status-card" class="lg:col-span-5 rounded-2xl p-6 md:p-8 flex flex-col items-center justify-center text-center transition-colors duration-300 border-4 border-surface-800 bg-surface-900 min-h-[350px] relative overflow-hidden">
            
            <div class="absolute top-4 right-4 text-right">
                <div id="location-badge" class="text-sm font-bold text-gray-300 flex items-center gap-1.5 justify-end uppercase tracking-widest">
                    <i class="fa-solid fa-circle-notch fa-spin"></i> LOCATING
                </div>
                <div class="text-sm font-mono font-bold text-gray-500 mt-1 flex items-center gap-1 justify-end">
                    <i class="fa-regular fa-clock text-brand-blue opacity-80"></i> 
                    <span id="local-time-text">--:--:--</span>
                </div>
            </div>

            <i id="status-icon" class="text-8xl md:text-9xl mb-4 fa-solid fa-circle-notch fa-spin text-gray-600"></i>
            <span id="status-text" class="text-4xl md:text-6xl font-black tracking-tight text-gray-600 uppercase">WAITING</span>
            <div id="weather-desc" class="mt-4 text-gray-300 font-mono text-sm md:text-lg font-bold bg-black/50 px-6 py-2 rounded-xl border-2 border-surface-700 uppercase">AWAITING TELEMETRY</div>
        </div>

        <!-- Vital Metrics Grid -->
        <div class="lg:col-span-7 grid grid-cols-2 md:grid-cols-3 gap-4">
            
            <!-- Temp -->
            <div class="bg-surface-900 border-4 border-surface-800 rounded-2xl p-4 flex flex-col justify-center items-center text-center relative">
                <span class="text-sm font-bold text-gray-500 uppercase tracking-widest block mb-1">Temp</span>
                <div id="metric-temp" class="font-mono text-5xl md:text-6xl font-black text-white">--</div>
                <div class="text-xs font-bold text-gray-500 mt-2 tracking-widest">FEELS <span id="metric-feels" class="text-gray-300">--</span></div>
            </div>

            <!-- Wind -->
            <div class="bg-surface-900 border-4 border-surface-800 rounded-2xl p-4 flex flex-col justify-center items-center text-center relative">
                <span class="text-sm font-bold text-gray-500 uppercase tracking-widest block mb-1">Wind (km/h)</span>
                <div id="metric-wind-speed" class="font-mono text-5xl md:text-6xl font-black text-white">--</div>
                <div id="metric-wind-dir" class="text-sm font-bold text-brand-blue mt-2 flex items-center gap-2 justify-center tracking-widest">--</div>
            </div>

            <!-- Consensus -->
            <div class="bg-brand-teal/10 border-4 border-brand-teal/30 rounded-2xl p-4 flex flex-col justify-center items-center text-center relative">
                <span class="text-sm font-bold text-brand-teal uppercase tracking-widest block mb-1">Model Sync</span>
                <div id="metric-agree" class="font-mono text-5xl md:text-6xl font-black text-brand-teal">--</div>
            </div>

            <!-- Humid -->
            <div class="bg-surface-900 border-4 border-surface-800 rounded-2xl p-4 flex flex-col justify-center items-center text-center relative">
                <span class="text-sm font-bold text-gray-500 uppercase tracking-widest block mb-1">Humidity</span>
                <div id="metric-hum" class="font-mono text-4xl md:text-5xl font-black text-white">--</div>
            </div>

            <!-- Max UV -->
            <div class="bg-surface-900 border-4 border-surface-800 rounded-2xl p-4 flex flex-col justify-center items-center text-center relative">
                <span class="text-sm font-bold text-gray-500 uppercase tracking-widest block mb-1">Max UV</span>
                <div id="metric-uv-val" class="font-mono text-4xl md:text-5xl font-black text-brand-purple">--</div>
                <div id="metric-uv-time" class="text-sm font-bold text-gray-500 mt-2 tracking-widest">--</div>
            </div>

            <!-- Health Checks -->
            <div class="bg-surface-900 border-4 border-surface-800 rounded-2xl p-4 flex flex-col justify-center">
                <span class="text-sm font-bold text-gray-500 uppercase tracking-widest block mb-3 text-center">Node Health</span>
                <div class="grid grid-cols-2 gap-2 text-center">
                    <div id="stat-eu" class="font-mono text-sm font-bold py-2 bg-surface-800 rounded-lg text-gray-600 border border-surface-700">EU</div>
                    <div id="stat-us" class="font-mono text-sm font-bold py-2 bg-surface-800 rounded-lg text-gray-600 border border-surface-700">US</div>
                    <div id="stat-de" class="font-mono text-sm font-bold py-2 bg-surface-800 rounded-lg text-gray-600 border border-surface-700">DE</div>
                    <div id="stat-jp" class="font-mono text-sm font-bold py-2 bg-surface-800 rounded-lg text-gray-600 border border-surface-700">JP</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Tactical Map & Routing Layer -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-4 mt-2 mb-2">
        <div class="lg:col-span-12 bg-surface-900 border-4 border-surface-800 rounded-2xl p-4 md:p-6 flex flex-col">
            <div class="mb-4 flex flex-col lg:flex-row lg:items-center justify-between gap-4">
                <div class="flex flex-col sm:flex-row gap-3 items-start sm:items-center">
                    <span class="text-sm font-bold uppercase tracking-widest text-gray-500 whitespace-nowrap"><i class="fa-solid fa-crosshairs text-brand-teal"></i> Live Tracking</span>
                    <span id="route-status" class="text-sm font-bold text-gray-600 uppercase tracking-widest bg-surface-800 px-4 py-2 rounded-lg border-2 border-surface-700 whitespace-nowrap">STANDBY</span>
                </div>
                <!-- Native App Intent Button -->
                <button id="native-nav-btn" class="hidden text-sm font-bold bg-brand-blue/20 border-2 border-brand-blue text-brand-blue hover:bg-brand-blue hover:text-white px-5 py-2.5 rounded-xl transition-all uppercase tracking-widest shadow-[0_0_15px_rgba(59,130,246,0.3)]">
                    <i class="fa-solid fa-diamond-turn-right"></i> External Nav
                </button>
            </div>
            <!-- Map Container -->
            <div id="hud-map" class="w-full relative h-[400px] md:h-[550px] rounded-xl border-4 border-surface-700 z-0 bg-[#111111]"></div>
        </div>
    </div>

    <!-- Secondary Systems -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-4 mt-2 mb-8">
        
        <!-- Chart Card -->
        <div class="lg:col-span-8 bg-surface-900 border-4 border-surface-800 rounded-2xl p-4 md:p-6 flex flex-col">
            <div class="mb-4 flex items-center justify-between">
                <span class="text-sm font-bold uppercase tracking-widest text-gray-500">Atmospheric Telemetry Plot</span>
            </div>
            <div class="flex-grow w-full relative h-[300px]">
                <canvas id="mainChart"></canvas>
            </div>
        </div>

        <!-- Squad Link & Targeting -->
        <div class="lg:col-span-4 bg-surface-900 border-4 border-surface-800 rounded-2xl p-6 flex flex-col justify-between">
            <div>
                <h3 class="text-sm font-bold uppercase tracking-widest text-brand-blue mb-6 border-b-4 border-surface-800 pb-3">Squad Link & Targeting</h3>
                
                <!-- NEW: Live Squad Relay Database -->
                <div class="flex gap-3 mb-6">
                    <div class="relative w-full">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-users text-brand-blue text-xl"></i>
                        </div>
                        <input type="text" id="squad-id" placeholder="SQUAD CALLSIGN..." autocomplete="off" 
                            class="w-full bg-surface-800 border-4 border-surface-700 text-white text-base font-bold rounded-xl pl-12 pr-4 py-4 focus:border-brand-blue transition-colors placeholder-gray-600 uppercase">
                    </div>
                    <button id="squad-btn" onclick="joinSquad()" class="bg-brand-blue hover:bg-blue-400 border-4 border-brand-blue text-black font-black py-4 px-6 rounded-xl text-lg uppercase tracking-widest transition-colors flex items-center justify-center shadow-[0_0_15px_rgba(59,130,246,0.3)]">
                        LINK
                    </button>
                </div>

                <!-- Google Maps Import Module -->
                <div class="flex gap-3 mb-6">
                    <div class="relative w-full">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-map-location-dot text-brand-teal text-xl"></i>
                        </div>
                        <input type="text" id="gmaps-link" placeholder="PASTE GMAPS URL..." autocomplete="off" 
                            class="w-full bg-surface-800 border-4 border-surface-700 text-white text-base font-bold rounded-xl pl-12 pr-4 py-4 focus:border-brand-teal transition-colors placeholder-gray-600">
                    </div>
                    <button id="gmaps-btn" onclick="handlePasteAndLoad()" class="bg-surface-700 hover:bg-surface-600 border-4 border-surface-600 text-brand-teal font-bold py-4 px-6 rounded-xl text-lg uppercase tracking-widest transition-colors flex items-center justify-center">
                        <i class="fa-solid fa-bolt"></i>
                    </button>
                </div>

                <!-- City Search Targeting -->
                <div class="flex flex-col gap-4 mb-6">
                    <div id="city-wrapper" class="relative w-full">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-magnifying-glass text-gray-500 text-xl"></i>
                        </div>
                        <input type="text" id="search-city" placeholder="SEARCH LOCALITY..." autocomplete="off" 
                            class="w-full bg-surface-800 border-4 border-surface-700 text-white text-lg font-bold rounded-xl pl-12 pr-4 py-4 focus:border-brand-teal transition-colors placeholder-gray-600 uppercase">
                        <div id="city-results" class="absolute bottom-full mb-2 left-0 right-0 bg-surface-800 border-4 border-brand-teal rounded-xl shadow-2xl z-50 max-h-60 overflow-y-auto hidden"></div>
                    </div>
                </div>

                <!-- Manual Lat/Lon -->
                <div class="flex gap-4 mb-6">
                    <input type="number" id="manual-lat" placeholder="LAT" step="any" class="w-full bg-surface-800 border-4 border-surface-700 text-white text-base font-mono font-bold rounded-xl px-4 py-4 focus:border-brand-teal text-center">
                    <input type="number" id="manual-lon" placeholder="LON" step="any" class="w-full bg-surface-800 border-4 border-surface-700 text-white text-base font-mono font-bold rounded-xl px-4 py-4 focus:border-brand-teal text-center">
                </div>
            </div>
            
            <div class="flex gap-4 mt-auto">
                <button onclick="setManualLocation()" class="flex-[2] bg-brand-teal hover:bg-teal-400 text-black font-black py-4 px-4 rounded-xl text-lg uppercase tracking-widest transition-colors">
                    Inject Target
                </button>
                <button onclick="resetToAuto()" class="flex-1 bg-surface-700 hover:bg-surface-600 border-4 border-surface-600 text-white font-bold py-4 px-4 rounded-xl text-lg uppercase tracking-widest flex justify-center items-center gap-2 transition-colors">
                    <i class="fa-solid fa-location-crosshairs text-xl"></i> Clear
                </button>
            </div>
        </div>
    </div>

    <!-- MAIN ENGINE (Type Module for Secure DB connections) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- FAULT TOLERANT CLOUD INIT ---
        let app, auth, db;
        let isCloudActive = false;
        let appId = 'default-app-id';

        try {
            const configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
            if (configStr) {
                const firebaseConfig = JSON.parse(configStr);
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                isCloudActive = true;
            } else {
                console.warn("MeteoNexus: Cloud Keys Missing. Booting in Offline Local Mode.");
            }
        } catch (e) {
            console.warn("MeteoNexus: Cloud Connection Failed. Booting in Offline Local Mode.", e);
        }

        // --- GLOBAL STATE & CONFIG ---
        const CONFIG = {
            weatherApi: 'https://api.open-meteo.com/v1/forecast',
            geocoderApi: 'https://geocoding-api.open-meteo.com/v1/search',
            reverseGeoApi: 'https://api.bigdatacloud.net/data/reverse-geocode-client',
            sonarThreshold: 75,
            
            // ==========================================
            // REPLACE THIS WITH YOUR CLOUDFLARE WORKER URL
            // ==========================================
            edgeProxy: 'https://YOUR_WORKER_NAME.YOUR_USERNAME.workers.dev' 
        };

        const WMO_CODES = {
            0: 'Clear Sky', 1: 'Mainly Clear', 2: 'Partly Cloudy', 3: 'Overcast',
            45: 'Fog', 48: 'Depositing Rime Fog', 51: 'Light Drizzle', 53: 'Moderate Drizzle', 55: 'Dense Drizzle',
            56: 'Light Freezing Drizzle', 57: 'Dense Freezing Drizzle',
            61: 'Slight Rain', 63: 'Moderate Rain', 65: 'Heavy Rain',
            66: 'Light Freezing Rain', 67: 'Heavy Freezing Rain',
            71: 'Slight Snow Fall', 73: 'Moderate Snow Fall', 75: 'Heavy Snow Fall', 77: 'Snow Grains',
            80: 'Slight Rain Showers', 81: 'Moderate Rain Showers', 82: 'Violent Rain Showers',
            85: 'Slight Snow Showers', 86: 'Heavy Snow Showers',
            95: 'Thunderstorm', 96: 'Thunderstorm + Hail', 99: 'Heavy Thunderstorm + Hail'
        };

        const WMO_ICONS = {
            0: 'fa-sun', 1: 'fa-sun', 2: 'fa-cloud-sun', 3: 'fa-cloud',
            45: 'fa-smog', 48: 'fa-smog', 51: 'fa-cloud-rain', 53: 'fa-cloud-rain', 55: 'fa-cloud-showers-heavy',
            56: 'fa-cloud-meatball', 57: 'fa-cloud-meatball',
            61: 'fa-cloud-rain', 63: 'fa-cloud-showers-heavy', 65: 'fa-cloud-showers-water',
            66: 'fa-cloud-meatball', 67: 'fa-cloud-meatball',
            71: 'fa-snowflake', 73: 'fa-snowflake', 75: 'fa-snowflake', 77: 'fa-snowflake',
            80: 'fa-cloud-rain', 81: 'fa-cloud-showers-heavy', 82: 'fa-cloud-showers-water',
            85: 'fa-snowflake', 86: 'fa-snowflake',
            95: 'fa-cloud-bolt', 96: 'fa-cloud-bolt', 99: 'fa-cloud-bolt'
        };

        let state = {
            mode: localStorage.getItem('ms_mode') || 'auto',
            coords: JSON.parse(localStorage.getItem('ms_coords')) || { lat: null, lon: null },
            autoCoords: null,
            targetTimezone: null, 
            chart: null,
            audioEnabled: false,
            lastPing: 0,
            mapObj: null,
            routeCtrl: null,
            gpsWatchId: null, 
            userMarker: null, 
            userAuth: null,
            squadId: null,
            squadMarkers: {} 
        };

        // --- AUTHENTICATION ENGINE ---
        async function initAuth() {
            if (!isCloudActive) return;
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token).catch(e => signInAnonymously(auth));
            } else {
                await signInAnonymously(auth).catch(console.error);
            }
        }
        
        if (isCloudActive) {
            initAuth();
            onAuthStateChanged(auth, (user) => {
                state.userAuth = user;
                if (user && state.squadId) attachSquadListeners();
            });
        }

        // --- SQUAD RELAY ENGINE (CLOUD ONLY) ---
        window.joinSquad = function() {
            const squadInput = document.getElementById('squad-id');
            const btn = document.getElementById('squad-btn');
            
            if (!isCloudActive) {
                squadInput.value = "";
                squadInput.placeholder = "DB OFFLINE - LOCAL MODE";
                return;
            }

            const callsign = squadInput.value.trim().toUpperCase();

            if (!callsign) {
                state.squadId = null;
                squadInput.value = "";
                squadInput.placeholder = "SQUAD CALLSIGN...";
                btn.innerHTML = "LINK";
                btn.className = "bg-brand-blue hover:bg-blue-400 border-4 border-brand-blue text-black font-black py-4 px-6 rounded-xl text-lg uppercase tracking-widest transition-colors flex items-center justify-center shadow-[0_0_15px_rgba(59,130,246,0.3)]";
                
                Object.values(state.squadMarkers).forEach(m => state.mapObj.removeLayer(m));
                state.squadMarkers = {};
                return;
            }

            state.squadId = callsign;
            btn.innerHTML = "<i class='fa-solid fa-link-slash'></i>";
            btn.className = "bg-brand-red hover:bg-red-400 border-4 border-brand-red text-black font-black py-4 px-6 rounded-xl text-lg uppercase tracking-widest transition-colors flex items-center justify-center shadow-[0_0_15px_rgba(239,68,68,0.3)]";
            squadInput.placeholder = `LINKED: ${callsign}`;
            
            if (state.autoCoords && state.userAuth) pushLocationToRelay(state.autoCoords.lat, state.autoCoords.lon);
            attachSquadListeners();
        }

        function pushLocationToRelay(lat, lon) {
            if (!isCloudActive || !state.userAuth || !state.squadId) return;
            const riderRef = doc(db, 'artifacts', appId, 'public', 'data', 'riders', state.userAuth.uid);
            setDoc(riderRef, {
                squadId: state.squadId,
                lat: lat,
                lon: lon,
                timestamp: Date.now()
            }).catch(console.error);
        }

        let squadUnsubscribe = null;
        function attachSquadListeners() {
            if (!isCloudActive || !state.userAuth || !state.squadId) return;
            if (squadUnsubscribe) squadUnsubscribe();

            const ridersRef = collection(db, 'artifacts', appId, 'public', 'data', 'riders');
            
            squadUnsubscribe = onSnapshot(ridersRef, (snapshot) => {
                const now = Date.now();
                snapshot.forEach(docSnap => {
                    if (docSnap.id === state.userAuth.uid) return; 
                    
                    const data = docSnap.data();
                    if (data.squadId === state.squadId) {
                        if (now - data.timestamp < 300000) {
                            plotCoRider(docSnap.id, data.lat, data.lon);
                        } else {
                            removeCoRider(docSnap.id);
                        }
                    }
                });
            }, (err) => console.error("DB Relay Error", err));
        }

        function plotCoRider(id, lat, lon) {
            if (!state.mapObj) return;
            
            if (state.squadMarkers[id]) {
                state.squadMarkers[id].setLatLng([lat, lon]);
            } else {
                state.squadMarkers[id] = L.marker([lat, lon], {
                    icon: L.divIcon({
                        className: 'bg-brand-blue border-2 border-white rounded-full w-4 h-4 shadow-[0_0_15px_rgba(59,130,246,0.8)] animate-pulse',
                        iconSize: [16, 16]
                    }),
                    zIndexOffset: 900
                }).addTo(state.mapObj);
            }
        }

        function removeCoRider(id) {
            if (state.squadMarkers[id]) {
                state.mapObj.removeLayer(state.squadMarkers[id]);
                delete state.squadMarkers[id];
            }
        }

        // --- BACKGROUND TRACKING ENGINE ---
        function startBackgroundTracking() {
            if (state.gpsWatchId) return; 
            const statusEl = document.getElementById('route-status');

            state.gpsWatchId = navigator.geolocation.watchPosition(
                (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    state.autoCoords = { lat, lon };

                    if (state.squadId && state.userAuth) pushLocationToRelay(lat, lon);

                    if (!state.mapObj) {
                        initMap(lat, lon);
                    } else {
                        if (state.userMarker) state.userMarker.setLatLng([lat, lon]);

                        if (state.routeCtrl) {
                            const waypoints = state.routeCtrl.getWaypoints();
                            if(waypoints.length > 0 && waypoints[0]) {
                                waypoints[0].latLng = L.latLng(lat, lon);
                                state.routeCtrl.setWaypoints(waypoints);
                            }
                        } else if (state.mode === 'auto') {
                            state.mapObj.setView([lat, lon], state.mapObj.getZoom(), {animate: true});
                            statusEl.innerHTML = `<i class="fa-solid fa-satellite fa-fade mr-2"></i> GPS ACTIVE`;
                            statusEl.className = "text-sm font-bold text-brand-success uppercase tracking-widest bg-brand-success/10 px-4 py-2 rounded-lg border-2 border-brand-success/50";
                        }
                    }
                },
                (err) => {
                    statusEl.innerText = "GPS SIGNAL LOST";

        // --- CLOUDFLARE WORKER EXTRACTION ENGINE ---
        async function processGMapLink() {
            const input = document.getElementById('gmaps-link');
            const btn = document.getElementById('gmaps-btn');
            const url = input.value.trim();
            if (!url) return;
            
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin text-white"></i>';
            input.placeholder = "DECRYPTING TARGET...";

            // Guardrail: Ensure user setup their worker
            if (CONFIG.edgeProxy.includes("YOUR_WORKER_NAME")) {
                input.value = "";
                input.placeholder = "ERR: WORKER NOT CONFIGURED";
                btn.innerHTML = '<i class="fa-solid fa-bolt"></i>';
                return;
            }
            
            try {
                // Execute secure Edge Trace
                const res = await fetch(`${CONFIG.edgeProxy}?url=${encodeURIComponent(url)}`);
                const payloadData = await res.json();
                
                if (payloadData.error) throw new Error(payloadData.error);

                const cleanHtml = (payloadData.html || "").replace(/&amp;/g, '&').replace(/%2C/gi, ',');
                const cleanUrl = (payloadData.url || "").replace(/%2C/gi, ',');
                const payloadStr = cleanUrl + " " + cleanHtml;

                let lat = null, lon = null;

                // Priority Cascading Parser
                const regexes = [
                    /!3d(-?\d+\.\d+)[!|?]4d(-?\d+\.\d+)/i,             
                    /place\/.*\/@(-?\d+\.\d+),(-?\d+\.\d+)/i,          
                    /destination=(-?\d+\.\d+),(-?\d+\.\d+)/i,          
                    /search\/(-?\d+\.\d+),(-?\d+\.\d+)/i,              
                    /(?:query|q)=(-?\d+\.\d+),(-?\d+\.\d+)/i,          
                    /markers=(-?\d+\.\d+),(-?\d+\.\d+)/i,              
                    /ll=(-?\d+\.\d+),(-?\d+\.\d+)/i,                   
                    /@(-?\d+\.\d+),(-?\d+\.\d+)/i                      
                ];

                for (let rx of regexes) {
                    const match = payloadStr.match(rx);
                    if (match && match[1] && match[2]) {
                        const tempLat = parseFloat(match[1]);
                        const tempLon = parseFloat(match[2]);
                        if (!isNaN(tempLat) && !isNaN(tempLon) && tempLat !== 0 && tempLon !== 0 && tempLat >= -90 && tempLat <= 90 && tempLon >= -180 && tempLon <= 180) {
                            lat = tempLat; lon = tempLon; 
                            break; 
                        }
                    }
                }

                if (lat !== null && lon !== null) {
                    input.value = "";
                    input.placeholder = `ACQUIRED: ${lat.toFixed(4)}, ${lon.toFixed(4)}`;
                    window.activateLiveNavigation(lat, lon);
                } else {
                    input.value = ""; input.placeholder = "ERR: PIN NOT FOUND";
                }
            } catch(e) {
                input.value = ""; input.placeholder = "ERR: WORKER CONNECTION FAIL";
            } finally {
                btn.innerHTML = '<i class="fa-solid fa-bolt"></i>';
            }
        }

        function updateRouteStatus(e) {

            const statusEl = document.getElementById('route-status');
            statusEl.innerHTML = `<i class="fa-solid fa-satellite fa-fade mr-2"></i> INTERCEPT | DIST: ${distKm} KM | ETA: ${timeStr}`;
            statusEl.className = "text-sm font-bold text-brand-success uppercase tracking-widest bg-brand-success/10 px-4 py-2 rounded-lg border-2 border-brand-success/50 shadow-[0_0_15px_rgba(34,197,94,0.2)]";

                new (window.AudioContext || window.webkitAudioContext)().resume().then(() => playSonarPing());
            } else {
                btn.className = 'flex items-center gap-3 px-6 py-3 rounded-xl border-4 border-surface-700 bg-surface-900 text-gray-100 text-sm md:text-base font-bold tracking-widest transition-all';

        function playSonarPing() {
            if (!state.audioEnabled) return;
            if (Date.now() - state.lastPing < 60000) return; 
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator(); const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.frequency.setValueAtTime(1200, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.2);
            gain.gain.setValueAtTime(0, ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0.5, ctx.currentTime + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
            osc.start(); osc.stop(ctx.currentTime + 0.6);
            state.lastPing = Date.now();
        }

        // --- PRIMARY TELEMETRY FETCH ---
        async function fetchData(lat, lon, skipReverseGeo = false) {
            document.getElementById('manual-lat').value = lat.toFixed(5);
            document.getElementById('manual-lon').value = lon.toFixed(5);

            if (!skipReverseGeo) {
                fetch(`${CONFIG.reverseGeoApi}?latitude=${lat}&longitude=${lon}&localityLanguage=en`)
                    .then(r => r.json())
                    .then(d => {
                        const city = d.city || d.locality || d.principalSubdivision || 'Unknown';
                        document.getElementById('location-badge').innerHTML = `<i class="fa-solid fa-location-dot"></i> ${city}`;
                    }).catch(() => {});
            }

            try {
                const [rCurr, rFore, rSolar] = await Promise.all([
                    fetch(`${CONFIG.weatherApi}?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m,wind_direction_10m,is_day&timezone=auto`),
                    fetch(`${CONFIG.weatherApi}?latitude=${lat}&longitude=${lon}&hourly=precipitation&models=ecmwf_ifs025,gfs_seamless,icon_seamless,jma_seamless&forecast_days=2&timezone=auto`),
                    fetch(`${CONFIG.weatherApi}?latitude=${lat}&longitude=${lon}&hourly=shortwave_radiation,uv_index&forecast_days=2&timezone=auto`)
                ]);
                const dCurr = await rCurr.json(); const dFore = await rFore.json(); const dSolar = await rSolar.json();

                if (dCurr.timezone) state.targetTimezone = dCurr.timezone;
                const curr = dCurr.current; const h = dFore.hourly; const hSol = dSolar.hourly;
                
                let nowIndex = h.time.findIndex(t => t.startsWith(curr.time.substring(0, 13)));
                if (nowIndex === -1) nowIndex = new Date().getHours();

                const clean = (arr) => arr.map(v => v === null ? 0 : v);
                const rEU = h.precipitation_ecmwf_ifs025; const rUS = h.precipitation_gfs_seamless;
                const rDE = h.precipitation_icon_seamless; const rJP = h.precipitation_jma_seamless;
                
                ['eu','us','de','jp'].forEach((id, idx) => {
                    const el = document.getElementById(`stat-${id}`);
                    const arr = [rEU, rUS, rDE, rJP][idx];
                    if(!arr || arr.every(v=>v===null)) { el.className="font-mono text-sm font-bold py-2 bg-brand-red border-2 border-brand-red text-black rounded-lg uppercase tracking-widest"; el.innerHTML = `<i class="fa-solid fa-triangle-exclamation mr-1"></i> ${id.toUpperCase()}`; }
                    else { el.className="font-mono text-sm font-bold py-2 bg-brand-success/20 border-2 border-brand-success/50 text-brand-success rounded-lg uppercase tracking-widest"; el.innerHTML = id.toUpperCase(); }
                });

                const rainData = { eu: clean(rEU.slice(nowIndex, nowIndex + 24)), us: clean(rUS.slice(nowIndex, nowIndex + 24)), de: clean(rDE.slice(nowIndex, nowIndex + 24)), jp: clean(rJP.slice(nowIndex, nowIndex + 24)) };
                const uvData = hSol.uv_index.slice(nowIndex, nowIndex + 24).map(v => v === null ? 0 : v);
                const solarData = clean(hSol.shortwave_radiation.slice(nowIndex, nowIndex + 24));
                const times = h.time.slice(nowIndex, nowIndex + 24).map(t => { let s = t.slice(11, 16); return s === "00:00" ? "00:00 (+1d)" : s; });

                const hourlyAgreement = [];
                for (let i = 0; i < 24; i++) {
                    let v = 0; if(rainData.eu[i]>0.1)v++; if(rainData.us[i]>0.1)v++; if(rainData.de[i]>0.1)v++; if(rainData.jp[i]>0.1)v++;
                    hourlyAgreement.push((v/4)*100);
                }

                const currentAgreement = hourlyAgreement[0] || 0;
                let currentVotes = (currentAgreement / 100) * 4;
                let incomingRain = false; for (let i=1; i<=3; i++) { if (hourlyAgreement[i] >= 75) { incomingRain = true; break; } }

                document.getElementById('metric-temp').innerText = Math.round(curr.temperature_2m) + '°';
                document.getElementById('metric-feels').innerText = Math.round(curr.apparent_temperature) + '°';
                document.getElementById('metric-hum').innerText = curr.relative_humidity_2m + '%';
                document.getElementById('metric-agree').innerText = `${currentAgreement.toFixed(0)}%`;
                document.getElementById('metric-wind-speed').innerText = Math.round(curr.wind_speed_10m);
                document.getElementById('metric-wind-dir').innerHTML = `${getWindDirection(curr.wind_direction_10m)} <i class="fa-solid fa-arrow-up" style="transform: rotate(${curr.wind_direction_10m}deg);"></i>`;
                
                const maxUV = Math.max(...uvData);
                document.getElementById('metric-uv-val').innerText = maxUV.toFixed(1);
                document.getElementById('metric-uv-time').innerText = "@ " + times[uvData.indexOf(maxUV)].replace(" (+1d)", "");
                document.getElementById('weather-desc').innerText = WMO_CODES[curr.weather_code] || `Code: ${curr.weather_code}`;

                const mainCard = document.getElementById('main-status-card'); const icon = document.getElementById('status-icon'); const text = document.getElementById('status-text');
                let bIcon = WMO_ICONS[curr.weather_code] || 'fa-circle-notch fa-spin'; if (curr.is_day === 0) { bIcon = bIcon.replace('sun', 'moon'); }

                mainCard.className = "lg:col-span-5 rounded-2xl p-6 md:p-8 flex flex-col items-center justify-center text-center transition-colors duration-500 border-4 min-h-[350px] relative overflow-hidden ";

                if (currentVotes >= 3) { 
                    mainCard.classList.add('bg-brand-red/20', 'border-brand-red'); icon.className = `text-8xl md:text-9xl mb-4 fa-solid fa-cloud-showers-heavy text-brand-red`; text.className = 'text-4xl md:text-6xl font-black tracking-tight text-brand-red uppercase'; text.innerText = "RAIN LIKELY";
                    if (currentAgreement >= CONFIG.sonarThreshold) playSonarPing();
                } else if (incomingRain) {
                    mainCard.classList.add('bg-brand-warning/20', 'border-brand-warning'); icon.className = `text-8xl md:text-9xl mb-4 fa-solid fa-cloud-showers-heavy text-brand-warning`; text.className = 'text-4xl md:text-6xl font-black tracking-tight text-brand-warning uppercase'; text.innerText = "INCOMING RAIN (1-3H)";
                } else if (currentVotes >= 1) {
                    mainCard.classList.add('bg-brand-warning/10', 'border-brand-warning/50'); icon.className = `text-8xl md:text-9xl mb-4 fa-solid fa-cloud-sun-rain text-brand-warning`; text.className = 'text-4xl md:text-6xl font-black tracking-tight text-brand-warning uppercase'; text.innerText = "RAIN POSSIBLE";
                } else {
                    mainCard.classList.add('bg-brand-success/10', 'border-brand-success/50'); icon.className = `text-8xl md:text-9xl mb-4 fa-solid ${bIcon} text-brand-success`; text.className = 'text-4xl md:text-6xl font-black tracking-tight text-brand-success uppercase'; text.innerText = "STABLE";
                }

                renderChart(times, rainData, solarData, uvData, currentAgreement, hourlyAgreement);
            } catch (e) { console.error(e); }
        }

        // --- CONTROL SYSTEMS ---
        window.setManualLocation = function() {

        function runApp() {
            startBackgroundTracking();
            if (state.mode === 'manual' && state.coords.lat) {
                initMap(state.coords.lat, state.coords.lon); fetchData(state.coords.lat, state.coords.lon, false); 
            } else if (state.autoCoords) {
                initMap(state.autoCoords.lat, state.autoCoords.lon); fetchData(state.autoCoords.lat, state.autoCoords.lon, false);
            } else if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(p => { 
                    state.autoCoords = { lat: p.coords.latitude, lon: p.coords.longitude };
                    initMap(p.coords.latitude, p.coords.longitude); fetchData(p.coords.latitude, p.coords.longitude, false); 
                }, () => {
                    document.getElementById('main-status-card').className = "lg:col-span-5 rounded-2xl p-6 md:p-8 flex flex-col items-center justify-center text-center border-4 border-brand-orange/50 bg-brand-orange/10 min-h-[350px] relative overflow-hidden";
                    document.getElementById('status-icon').className = 'text-8xl md:text-9xl mb-4 fa-solid fa-map-location-dot text-brand-orange';
                    document.getElementById('status-text').innerText = "SEARCH LOCATION";
                    document.getElementById('status-text').className = "text-4xl md:text-5xl font-black tracking-tight text-brand-orange uppercase";
                    document.getElementById('weather-desc').innerText = "GPS BLOCKED.";
                    document.getElementById('location-badge').innerHTML = `<i class="fa-solid fa-location-crosshairs text-brand-red"></i> GPS BLOCKED`;
                }, { timeout: 10000, enableHighAccuracy: true });
            }
        }

        runApp(); setInterval(runApp, 60000); 
    </script>
</body>
</html>
