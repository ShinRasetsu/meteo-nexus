<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeteoNexus</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
  body { background-color: #0d1117; color: #39ff14; font-family: monospace; padding: 20px; }
  #auth-overlay { display: flex; flex-direction: column; gap: 10px; max-width: 300px; }
  #app { display: none; border: 1px solid #39ff14; padding: 15px; max-width: 300px;}
  input, button { padding: 10px; background: #21262d; color: #39ff14; border: 1px solid #39ff14; }
  button { cursor: pointer; font-weight: bold; }
  button:hover { background: #39ff14; color: #0d1117; }
</style>
</head>
<body>

<div id="auth-overlay">
  <h2>System Gateway</h2>
  <input type="email" id="auth-email" placeholder="Email" required>
  <input type="password" id="auth-password" placeholder="Passkey" required>
  <button id="btn-login">Login</button>
  <button id="btn-register">Register</button>
</div>

<div id="app">
  <h3>Telemetry HUD</h3>
  <div>Ambient Temp: <span id="status-text">Awaiting...</span></div>
  <div>Current Spd: <span id="hud-speed">0.0</span> km/h</div>
  <div>Peak Spd: <span id="hud-max">0.0</span> km/h</div>
  <br>
  <button id="btn-logout">Terminate Session</button>
</div>

<script type="module" src="js/app.js"></script>

</body>
</html>
